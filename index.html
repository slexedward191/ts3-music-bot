<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GameArea TS3 Music Bot</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <header class="navbar">
    <nav>
      <a href="#">Ana Sayfa</a>
      <a href="#">Durum</a>
      <a href="#">Panel</a>
    </nav>
  </header>

  <!-- HERO -->
  <main class="hero-wrap">
    <section class="hero-left">
      <span class="pill">TS3 CONNECT • GET YAZ GİR</span>
      <h1>Am Yok <span>GameArea</span> Var.</h1>
      <p>
        Bize Yanlış Yapanı Affetmeyiz, Eğer Bize Kahpelik Yapıcaksanız Barınamazsınız.
      </p>

      <div class="cta">
        <a class="join-ts" href="ts3server://get:9987">🎧 TS3 Katıl</a>
        <button id="guestLogin" class="guest-btn">⚡ Misafir Giriş</button>
      </div>

      <p id="guestWelcome" class="guest-welcome hidden"></p>

      <div class="ts3-status">
        <a href="https://www.gametracker.com/server_info/51.210.203.176:9987/" target="_blank" rel="noreferrer">
          <img 
            src="https://cache.gametracker.com/server_info/51.210.203.176:9987/b_560_95_1.png"
            alt="TS3 Server Status"
          />
        </a>
      </div>

      <div class="stats">
        <div class="stat"><b>500+</b><small>Aktif Oyuncu</small></div>
        <div class="stat"><b>20ms</b><small>Düşük Gecikme</small></div>
        <div class="stat"><b>%99.9</b><small>Uptime</small></div>
        <div class="stat"><b>7/24</b><small>Destek</small></div>
      </div>
    </section>

    <aside class="hero-right">
      <div class="owners">
        <div class="owner-card">
          <img src="assets/owner.png" alt="Owner Avatar">
          <div class="owner-name">embrace ur pain</div>
          <div class="owner-role">
            TS3 Owner <span class="owner-motto">DDoS Protection</span>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- MUSIC -->
  <div class="music-controls">
    <button id="musicToggle" class="music-btn">🔊 Müziği Başlat</button>
    <input type="range" id="volumeControl" min="0" max="100" value="70">
  </div>
  <audio id="bgMusic" src="assets/gamearea.mp3" preload="auto"></audio>

  <!-- EFFECT -->
  <canvas id="snow"></canvas>

  <!-- JS -->
  <script src="js/main.js"></script>
</body>
</html>
