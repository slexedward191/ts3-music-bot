<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test</title>
</head>
<body style="background:#111;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh">

  <audio id="bgm" src="assets/gamearea.mp3"></audio>

  <button id="testBtn" style="padding:14px 18px;font-size:16px;">
    Tıkla – Müzik Çalsın
  </button>

  <script>
    const btn = document.getElementById("testBtn");
    const bgm = document.getElementById("bgm");

    btn.addEventListener("click", async () => {
      try {
        await bgm.play();
        alert("Çalıyor mu? Eğer duyuyorsan OK");
      } catch (e) {
        alert("Hata: " + e);
        console.log(e);
      }
    });
  </script>

</body>
</html>
