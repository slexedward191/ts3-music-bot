<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameArea Fight - Kayıt Ol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --neon-purple: #bc13fe;
            --neon-gold: #FFD700;
            --neon-yellow: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan - Kullanıcının Eklediği Resim (Saydam Efektli) */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;
        }

        .background-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0.35;
            filter: blur(3px) contrast(1.1) brightness(0.8);
            transform: scale(1.05);
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(0, 0, 0, 0.7) 0%,
                rgba(0, 0, 0, 0.5) 50%,
                rgba(0, 0, 0, 0.7) 100%);
        }

        /* Ana Container - Cam Efektli */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            background: rgba(15, 15, 25, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2),
                        0 0 80px rgba(188, 19, 254, 0.1),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }

        /* Başlık */
        .auth-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .game-logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--neon-blue), var(--neon-purple), var(--neon-red), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            text-shadow: none;
            margin-bottom: 5px;
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .auth-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* Bayraklar */
        .lang-flags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .flag-btn {
            width: 40px;
            height: 28px;
            cursor: pointer;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            opacity: 0.5;
            object-fit: cover;
        }

        .flag-btn:hover {
            transform: scale(1.15);
            opacity: 0.9;
            border-color: rgba(255, 255, 255, 0.3);
        }

        .flag-btn.active {
            opacity: 1;
            border-color: var(--neon-gold);
            box-shadow: 0 0 15px var(--neon-gold);
        }

        /* Sekme Sistemi */
        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            border: none;
            background: transparent;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            color: white;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.5);
        }

        /* Form Alanları */
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* Uyarı Kutusu */
        .warning-box {
            background: rgba(255, 69, 0, 0.15);
            border: 1px solid rgba(255, 69, 0, 0.4);
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
        }

        .warning-text {
            color: #ff6b35;
            font-size: 11px;
            text-align: center;
            line-height: 1.5;
        }

        /* Captcha */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .captcha-display {
            flex: 1;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            color: var(--neon-gold);
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-gold);
        }

        .captcha-refresh {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .captcha-refresh:hover {
            background: var(--neon-blue);
            color: black;
        }

        .captcha-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            margin-top: 10px;
            outline: none;
        }

        .captcha-input:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* Butonlar */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-primary {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--neon-gold), #FFA500);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6),
                        0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--neon-purple), #9b59b6);
            color: white;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.6);
        }

        .btn-guest {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            padding: 14px;
        }

        .btn-guest:hover {
            border-color: white;
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Hata Mesajı */
        .error-message {
            background: rgba(255, 0, 60, 0.2);
            border: 1px solid var(--neon-red);
            border-radius: 8px;
            padding: 10px;
            color: var(--neon-red);
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Başarı Mesajı */
        .success-message {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid #00ff64;
            border-radius: 8px;
            padding: 10px;
            color: #00ff64;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Kullanıcı Adı Var Uyarısı */
        .user-exists {
            color: var(--neon-gold);
            font-size: 11px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }

        .user-exists.show {
            display: block;
        }

        @media (max-width: 500px) {
            .auth-container {
                padding: 25px;
                width: 95%;
            }

            .game-logo {
                font-size: 24px;
            }

            .flag-btn {
                width: 32px;
                height: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- Arka Plan Resmi (Kullanıcının Eklediği) -->
    <div class="background-wrapper">
        <img src="unnamed (4).jpg" alt="GameArea Fight Background">
        <div class="background-overlay"></div>
    </div>

    <div class="auth-container">
        <!-- Başlık -->
        <div class="auth-header">
            <h1 class="game-logo">GAMEAREA FIGHT</h1>
            <p class="auth-subtitle" data-i18n="fullEdition">Full Edition</p>
        </div>

        <!-- Bayraklar -->
        <div class="lang-flags">
            <img src="https://flagcdn.com/w80/tr.png" alt="Türkçe" class="flag-btn active" data-lang="tr" onclick="changeLanguage('tr')">
            <img src="https://flagcdn.com/w80/fr.png" alt="Français" class="flag-btn" data-lang="fr" onclick="changeLanguage('fr')">
            <img src="https://flagcdn.com/w80/de.png" alt="Deutsch" class="flag-btn" data-lang="de" onclick="changeLanguage('de')">
            <img src="https://flagcdn.com/w80/gb.png" alt="English" class="flag-btn" data-lang="en" onclick="changeLanguage('en')">
            <img src="https://flagcdn.com/w80/ru.png" alt="Русский" class="flag-btn" data-lang="ru" onclick="changeLanguage('ru')">
        </div>

        <!-- Sekmeler -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')" data-i18n="tabLogin">Giriş Yap</button>
            <button class="auth-tab" onclick="switchTab('register')" data-i18n="tabRegister">Kayıt Ol</button>
        </div>

        <!-- Giriş Formu -->
        <form class="auth-form active" id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" class="form-input" id="login-username" data-i18n-placeholder="usernamePlaceholder" placeholder="Kullanıcı Adı" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="login-password" data-i18n-placeholder="passwordPlaceholder" placeholder="Şifre" required>
            </div>

            <!-- Captcha -->
            <div class="captcha-container">
                <div class="captcha-display" id="login-captcha-display">ABC123</div>
                <button type="button" class="captcha-refresh" onclick="generateCaptcha('login')">↻</button>
            </div>
            <input type="text" class="captcha-input" id="login-captcha-input" data-i18n-placeholder="captchaPlaceholder" placeholder="Captcha Kodu" maxlength="6">

            <div class="error-message" id="login-error"></div>

            <div class="btn-group">
                <button type="submit" class="btn-primary btn-login" data-i18n="loginBtn">Giriş Yap</button>
                <button type="button" class="btn-primary btn-guest" onclick="handleGuest()" data-i18n="guestBtn">Misafir Olarak Oyna</button>
            </div>
        </form>

        <!-- Kayıt Formu -->
        <form class="auth-form" id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <input type="text" class="form-input" id="reg-username" data-i18n-placeholder="usernamePlaceholder" placeholder="Kullanıcı Adı" required minlength="3">
                <div class="user-exists" id="user-exists" data-i18n="userExists">Bu kullanıcı adı zaten alınmış!</div>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="reg-password" data-i18n-placeholder="passwordPlaceholder" placeholder="Şifre" required minlength="4">
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="reg-confirm-password" data-i18n-placeholder="confirmPasswordPlaceholder" placeholder="Tekrar Şifre" required>
            </div>

            <!-- Uyarı -->
            <div class="warning-box">
                <p class="warning-text" data-i18n="passwordWarning">⚠️ DİKKAT: Şifrenizi unutursanız hesabınızı kurtaramazsınız! Şifrenizi güvenli bir yerde saklayın.</p>
            </div>

            <!-- Captcha -->
            <div class="captcha-container">
                <div class="captcha-display" id="reg-captcha-display">XYZ789</div>
                <button type="button" class="captcha-refresh" onclick="generateCaptcha('register')">↻</button>
            </div>
            <input type="text" class="captcha-input" id="reg-captcha-input" data-i18n-placeholder="captchaPlaceholder" placeholder="Captcha Kodu" maxlength="6">

            <div class="error-message" id="register-error"></div>
            <div class="success-message" id="register-success"></div>

            <div class="btn-group">
                <button type="submit" class="btn-primary btn-register" data-i18n="registerBtn">Kayıt Ol</button>
                <button type="button" class="btn-primary btn-guest" onclick="handleGuest()" data-i18n="guestBtn">Misafir Olarak Oyna</button>
            </div>
        </form>
    </div>

    <script>
        // Dil Sistemleri
        const translations = {
            tr: {
                fullEdition: "Full Edition",
                tabLogin: "Giriş Yap",
                tabRegister: "Kayıt Ol",
                usernamePlaceholder: "Kullanıcı Adı",
                passwordPlaceholder: "Şifre",
                confirmPasswordPlaceholder: "Tekrar Şifre",
                captchaPlaceholder: "Captcha Kodu",
                loginBtn: "Giriş Yap",
                guestBtn: "Misafir Olarak Oyna",
                registerBtn: "Kayıt Ol",
                passwordWarning: "⚠️ DİKKAT: Şifrenizi unutursanız hesabınızı kurtaramazsınız! Şifrenizi güvenli bir yerde saklayın.",
                userExists: "Bu kullanıcı adı zaten alınmış!",
                wrongPassword: "Şifre yanlış!",
                wrongCaptcha: "Captcha kodu yanlış!",
                passwordMismatch: "Şifreler eşleşmiyor!",
                fillInfo: "Lütfen tüm alanları doldurun!",
                registerSuccess: "Kayıt başarılı! Yönlendiriliyorsunuz...",
                userNotFound: "Kullanıcı bulunamadı!",
                guestWelcome: "Misafir olarak hoş geldiniz!"
            },
            fr: {
                fullEdition: "Édition Complète",
                tabLogin: "Connexion",
                tabRegister: "S'inscrire",
                usernamePlaceholder: "Nom d'utilisateur",
                passwordPlaceholder: "Mot de passe",
                confirmPasswordPlaceholder: "Confirmer le mot de passe",
                captchaPlaceholder: "Code Captcha",
                loginBtn: "Connexion",
                guestBtn: "Jouer en tant qu'invité",
                registerBtn: "S'inscrire",
                passwordWarning: "⚠️ ATTENTION: Si vous oubliez votre mot de passe, vous ne pourrez pas récupérer votre compte! Conservez-le en lieu sûr.",
                userExists: "Ce nom d'utilisateur est déjà pris!",
                wrongPassword: "Mot de passe incorrect!",
                wrongCaptcha: "Code captcha incorrect!",
                passwordMismatch: "Les mots de passe ne correspondent pas!",
                fillInfo: "Veuillez remplir tous les champs!",
                registerSuccess: "Inscription réussie! Redirection...",
                userNotFound: "Utilisateur non trouvé!",
                guestWelcome: "Bienvenue en tant qu'invité!"
            },
            de: {
                fullEdition: "Vollständige Ausgabe",
                tabLogin: "Anmelden",
                tabRegister: "Registrieren",
                usernamePlaceholder: "Benutzername",
                passwordPlaceholder: "Passwort",
                confirmPasswordPlaceholder: "Passwort bestätigen",
                captchaPlaceholder: "Captcha-Code",
                loginBtn: "Anmelden",
                guestBtn: "Als Gast spielen",
                registerBtn: "Registrieren",
                passwordWarning: "⚠️ WARNUNG: Wenn Sie Ihr Passwort vergessen, können Sie Ihr Konto nicht wiederherstellen! Bewahren Sie es sicher auf.",
                userExists: "Dieser Benutzername ist bereits vergeben!",
                wrongPassword: "Falsches Passwort!",
                wrongCaptcha: "Falscher Captcha-Code!",
                passwordMismatch: "Passwörter stimmen nicht überein!",
                fillInfo: "Bitte füllen Sie alle Felder aus!",
                registerSuccess: "Erfolgreich registriert! Weiterleitung...",
                userNotFound: "Benutzer nicht gefunden!",
                guestWelcome: "Willkommen als Gast!"
            },
            en: {
                fullEdition: "Full Edition",
                tabLogin: "Login",
                tabRegister: "Register",
                usernamePlaceholder: "Username",
                passwordPlaceholder: "Password",
                confirmPasswordPlaceholder: "Confirm Password",
                captchaPlaceholder: "Captcha Code",
                loginBtn: "Login",
                guestBtn: "Play as Guest",
                registerBtn: "Register",
                passwordWarning: "⚠️ WARNING: If you forget your password, you cannot recover your account! Keep it in a safe place.",
                userExists: "This username is already taken!",
                wrongPassword: "Wrong password!",
                wrongCaptcha: "Wrong captcha code!",
                passwordMismatch: "Passwords do not match!",
                fillInfo: "Please fill in all fields!",
                registerSuccess: "Registration successful! Redirecting...",
                userNotFound: "User not found!",
                guestWelcome: "Welcome as guest!"
            },
            ru: {
                fullEdition: "Полная Версия",
                tabLogin: "Вход",
                tabRegister: "Регистрация",
                usernamePlaceholder: "Имя пользователя",
                passwordPlaceholder: "Пароль",
                confirmPasswordPlaceholder: "Подтвердите пароль",
                captchaPlaceholder: "Код Captcha",
                loginBtn: "Войти",
                guestBtn: "Играть как гость",
                registerBtn: "Регистрация",
                passwordWarning: "⚠️ ПРЕДУПРЕЖДЕНИЕ: Если вы забудете пароль, вы не сможете восстановить аккаунт! Храните его в безопасном месте.",
                userExists: "Это имя пользователя уже занято!",
                wrongPassword: "Неверный пароль!",
                wrongCaptcha: "Неверный код капчи!",
                passwordMismatch: "Пароли не совпадают!",
                fillInfo: "Пожалуйста, заполните все поля!",
                registerSuccess: "Регистрация успешна! Перенаправление...",
                userNotFound: "Пользователь не найден!",
                guestWelcome: "Добро пожаловать как гость!"
            }
        };

        let currentLang = localStorage.getItem('game_lang') || 'tr';
        let loginCaptchaCode = '';
        let registerCaptchaCode = '';

        // Sayfa yüklendiğinde
        document.addEventListener('DOMContentLoaded', function() {
            changeLanguage(currentLang);
            generateCaptcha('login');
            generateCaptcha('register');
        });

        // Dil Değiştirme
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('game_lang', lang);

            document.querySelectorAll('.flag-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.flag-btn[data-lang="${lang}"]`).classList.add('active');

            updateUIText();
        }

        function t(key) {
            return translations[currentLang][key] || key;
        }

        function updateUIText() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerHTML = translations[currentLang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[currentLang][key]) {
                    el.placeholder = translations[currentLang][key];
                }
            });
        }

        // Sekme Değiştirme
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }

            // Hata mesajlarını temizle
            document.getElementById('login-error').classList.remove('show');
            document.getElementById('register-error').classList.remove('show');
            document.getElementById('register-success').classList.remove('show');
        }

        // Captcha Üretme
        function generateCaptcha(type) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 5; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            if (type === 'login') {
                loginCaptchaCode = code;
                document.getElementById('login-captcha-display').textContent = code;
                document.getElementById('login-captcha-input').value = '';
            } else {
                registerCaptchaCode = code;
                document.getElementById('reg-captcha-display').textContent = code;
                document.getElementById('reg-captcha-input').value = '';
            }
        }

        // Giriş Yap
        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const captcha = document.getElementById('login-captcha-input').value.trim().toUpperCase();
            const errorEl = document.getElementById('login-error');

            // Captcha kontrolü
            if (captcha !== loginCaptchaCode) {
                errorEl.textContent = t('wrongCaptcha');
                errorEl.classList.add('show');
                generateCaptcha('login');
                return;
            }

            // Kullanıcı kontrolü
            let users = JSON.parse(localStorage.getItem('gf_users') || '{}');

            if (!users[username]) {
                errorEl.textContent = t('userNotFound');
                errorEl.classList.add('show');
                return;
            }

            if (users[username].password !== password) {
                errorEl.textContent = t('wrongPassword');
                errorEl.classList.add('show');
                generateCaptcha('login');
                return;
            }

            // Başarılı giriş
            errorEl.classList.remove('show');
            localStorage.setItem('game_session', JSON.stringify({
                username: username,
                isGuest: false,
                lang: currentLang
            }));

            // Bölüm seçim menüsünü otomatik aç
            sessionStorage.setItem('openChapterMenu', 'true');

            window.location.href = 'oyun.html';
        }

        // Kayıt Ol
        function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const captcha = document.getElementById('reg-captcha-input').value.trim().toUpperCase();
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            const userExistsEl = document.getElementById('user-exists');

            // Temel kontroller
            if (!username || !password || !confirmPassword) {
                errorEl.textContent = t('fillInfo');
                errorEl.classList.add('show');
                return;
            }

            // Kullanıcı adı kontrolü
            let users = JSON.parse(localStorage.getItem('gf_users') || '{}');
            if (users[username]) {
                userExistsEl.classList.add('show');
                return;
            }
            userExistsEl.classList.remove('show');

            // Şifre kontrolü
            if (password !== confirmPassword) {
                errorEl.textContent = t('passwordMismatch');
                errorEl.classList.add('show');
                generateCaptcha('register');
                return;
            }

            // Captcha kontrolü
            if (captcha !== registerCaptchaCode) {
                errorEl.textContent = t('wrongCaptcha');
                errorEl.classList.add('show');
                generateCaptcha('register');
                return;
            }

            // Kullanıcıyı kaydet
            const defaultState = {
                isRunning: false, wave: 0, xp: 0, xpRequired: 50, level: 1,
                gold: 0, ownedChars: ['std'], selectedChar: 'std', chapter: 1
            };

            users[username] = {
                password: password,
                state: defaultState
            };
            localStorage.setItem('gf_users', JSON.stringify(users));

            // Başarılı kayıt
            errorEl.classList.remove('show');
            successEl.textContent = t('registerSuccess');
            successEl.classList.add('show');

            // Session kaydet ve yönlendir
            localStorage.setItem('game_session', JSON.stringify({
                username: username,
                isGuest: false,
                lang: currentLang
            }));

            // Bölüm seçim menüsünü otomatik aç
            sessionStorage.setItem('openChapterMenu', 'true');

            setTimeout(() => {
                window.location.href = 'oyun.html';
            }, 1500);
        }

        // Misafir Girişi
        function handleGuest() {
            localStorage.setItem('game_session', JSON.stringify({
                username: 'Misafir',
                isGuest: true,
                lang: currentLang
            }));

            // Bölüm seçim menüsünü otomatik aç (misafir için de)
            sessionStorage.setItem('openChapterMenu', 'true');

            window.location.href = 'oyun.html';
        }
    </script>
</body>
