<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Neon Leap | Pro Platformer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff88;
            --bg-dark: #0a0b1e;
        }

        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg-dark); font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        /* UI Paneli */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; padding: 25px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .stats-top { display: flex; justify-content: space-between; color: white; text-shadow: 0 0 10px var(--neon-blue); }
        .lvl-tag { font-size: 32px; font-weight: 900; }
        
        #start-overlay {
            position: fixed; inset: 0; background: rgba(10, 11, 30, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
        }

        .btn {
            background: var(--neon-blue); color: #000; border: none; padding: 15px 40px;
            font-size: 20px; font-weight: 900; cursor: pointer; border-radius: 5px;
            box-shadow: 0 0 20px var(--neon-blue); transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 40px var(--neon-blue); }

        .hint { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="font-size: 60px; margin-bottom: 10px; color: var(--neon-blue);">NEON LEAP</h1>
    <p style="margin-bottom: 30px; letter-spacing: 2px;">SESLERİ AÇIN VE MACERAYA BAŞLAYIN</p>
    <button class="btn" onclick="Engine.init()">OYUNU BAŞLAT</button>
    <div class="hint">YÖN TUŞLARI VEYA WASD İLE HAREKET ET</div>
</div>

<div id="hud">
    <div class="stats-top">
        <div class="lvl-tag">BÖLÜM: <span id="cur-lvl">1</span></div>
        <div style="text-align: right;">CAN: <span id="deaths">0</span><br>SÜRE: <span id="timer">0.0</span>s</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * PROFESYONEL SES MOTORU (Web Audio API)
 */
const AudioEngine = {
    ctx: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(freq, type, decay, vol = 0.1) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + decay);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + decay);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + decay);
    },
    jump() { this.play(150, 'square', 0.2); },
    die() { this.play(100, 'sawtooth', 0.4, 0.2); },
    win() { this.play(440, 'sine', 0.5); setTimeout(() => this.play(660, 'sine', 0.5), 100); }
};

/**
 * OYUN MOTORU
 */
const Engine = {
    canvas: document.getElementById('gameCanvas'),
    ctx: null,
    level: 1,
    deaths: 0,
    startTime: 0,
    player: { x: 100, y: 100, vx: 0, vy: 0, w: 25, h: 25, ground: false },
    platforms: [],
    hazards: [],
    keys: {},
    camera: { x: 0, y: 0 },

    init() {
        document.getElementById('start-overlay').style.display = 'none';
        AudioEngine.init();
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        this.startTime = Date.now();
        
        window.addEventListener('keydown', e => this.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => this.keys[e.key.toLowerCase()] = false);
        
        this.loadLevel(this.level);
        this.loop();
    },

    loadLevel(num) {
        this.platforms = [];
        this.hazards = [];
        this.player.x = 50;
        this.player.y = 400;
        this.player.vx = 0;
        this.player.vy = 0;
        
        // --- LEVEL DESIGNER (Akıllı Seviye Tasarımı) ---
        // Başlangıç Platformu
        this.platforms.push({ x: 0, y: 500, w: 200, h: 40 });

        let lastX = 200;
        let lastY = 500;
        let count = 5 + num; // Seviye arttıkça parkur uzar

        for(let i = 0; i < count; i++) {
            let gap = 80 + (Math.min(num, 50) * 2) + Math.random() * 50;
            let width = 150 - (Math.min(num, 50) * 1.5);
            let diffY = (Math.random() - 0.5) * 120;
            
            lastX += gap;
            lastY += diffY;
            
            // Platform ekle
            this.platforms.push({ x: lastX, y: lastY, w: width, h: 20 });

            // Seviye 3'ten sonra dikenler başlar
            if(num > 2 && Math.random() > 0.6) {
                this.hazards.push({ x: lastX + 20, y: lastY - 15, w: width - 40, h: 15 });
            }
        }

        // Bitiş Platformu
        this.finish = { x: lastX + 200, y: lastY - 50, w: 60, h: 100 };
        document.getElementById('cur-lvl').innerText = num;
    },

    update() {
        const p = this.player;
        // Fizik
        if(this.keys['a'] || this.keys['arrowleft']) p.vx -= 0.8;
        if(this.keys['d'] || this.keys['arrowright']) p.vx += 0.8;
        if((this.keys['w'] || this.keys[' '] || this.keys['arrowup']) && p.ground) {
            p.vy = -12;
            p.ground = false;
            AudioEngine.jump();
        }

        p.vy += 0.6; // Yerçekimi
        p.vx *= 0.85; // Sürtünme
        p.x += p.vx;
        p.y += p.vy;

        p.ground = false;
        // Platform Çarpışma
        this.platforms.forEach(plat => {
            if(p.x < plat.x + plat.w && p.x + p.w > plat.x && p.y + p.h > plat.y && p.y < plat.y + plat.h) {
                if(p.vy > 0 && p.y < plat.y) {
                    p.y = plat.y - p.h;
                    p.vy = 0;
                    p.ground = true;
                }
            }
        });

        // Ölüm Kontrolü
        this.hazards.forEach(h => {
            if(p.x < h.x + h.w && p.x + p.w > h.x && p.y + p.h > h.y && p.y < h.y + h.h) {
                this.die();
            }
        });

        if(p.y > window.innerHeight + 500) this.die();

        // Bölüm Geçme
        if(p.x < this.finish.x + this.finish.w && p.x + p.w > this.finish.x && p.y < this.finish.y + this.finish.h && p.y + p.h > this.finish.y) {
            AudioEngine.win();
            this.level++;
            this.loadLevel(this.level);
        }

        // Kamera Takibi
        this.camera.x += (p.x - window.innerWidth/2 - this.camera.x) * 0.1;
        this.camera.y += (p.y - window.innerHeight/2 - this.camera.y) * 0.1;

        document.getElementById('timer').innerText = ((Date.now() - this.startTime) / 1000).toFixed(1);
    },

    die() {
        AudioEngine.die();
        this.deaths++;
        document.getElementById('deaths').innerText = this.deaths;
        this.loadLevel(this.level);
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0a0b1e';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        ctx.save();
        ctx.translate(-this.camera.x, -this.camera.y);

        // Platformlar
        ctx.fillStyle = '#1a1c3a';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00f2ff';
        this.platforms.forEach(p => {
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        // Dikenler
        ctx.fillStyle = '#ff00ff';
        ctx.shadowColor = '#ff00ff';
        this.hazards.forEach(h => {
            ctx.beginPath();
            ctx.moveTo(h.x, h.y + h.h);
            ctx.lineTo(h.x + h.w/2, h.y);
            ctx.lineTo(h.x + h.w, h.y + h.h);
            ctx.fill();
        });

        // Bitiş (Kapı)
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(this.finish.x, this.finish.y, this.finish.w, this.finish.h);
        ctx.globalAlpha = 1;
        ctx.strokeRect(this.finish.x, this.finish.y, this.finish.w, this.finish.h);

        // Oyuncu
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#fff';
        ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);

        ctx.restore();
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    }
};

window.addEventListener('resize', () => {
    if(Engine.ctx) {
        Engine.canvas.width = window.innerWidth;
        Engine.canvas.height = window.innerHeight;
    }
});
</script>
</body>
</html>
