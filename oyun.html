<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Eternal Lordz MMORPG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Cinzel', serif; color: white; }
        canvas { display: block; }
        
        /* Gelişmiş Arayüz (HUD) */
        #game-ui { position: absolute; inset: 0; pointer-events: none; }
        
        #top-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 20px; }
        .stat-card { background: rgba(0,0,0,0.7); border: 2px solid #c9a227; padding: 10px 20px; border-radius: 5px; box-shadow: 0 0 15px rgba(201,162,39,0.3); }
        
        #skill-bar { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 15px; pointer-events: auto;
        }
        .skill {
            width: 70px; height: 70px; background: #222; border: 3px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .skill.ready { border-color: #3498db; box-shadow: 0 0 10px #3498db; cursor: pointer; }
        .skill span { font-size: 24px; margin-bottom: 2px; }
        .skill small { font-size: 10px; color: #aaa; }
        .cd-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); transition: height 0.1s linear; }

        #level-up-notif {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; color: #f1c40f; text-shadow: 0 0 20px gold;
            opacity: 0; pointer-events: none; transition: 0.5s;
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="top-bar">
        <div class="stat-card">
            <div style="font-size: 12px; color: #f1c40f;">LEVEL</div>
            <div id="lvl-val" style="font-size: 24px; font-weight: bold;">1</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 12px; color: #e74c3c;">HP</div>
            <div id="hp-val" style="font-size: 24px; font-weight: bold;">100 / 100</div>
        </div>
    </div>

    <div id="level-up-notif">SEVİYE ATLADIN!</div>

    <div id="skill-bar">
        <div class="skill" id="s1"><span>🔥</span><small>[1] Alev</small><div id="cd1" class="cd-overlay"></div></div>

        <div class="skill" id="s3"><span>❄️</span><small>[3] Buz</small><div id="cd3" class="cd-overlay"></div></div>
    </div>
</div>
