<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Bakımdayız | SeaWolf Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --neon: #00f2ff;
            --deep-ocean: #000a1a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--deep-ocean);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Pirata One', cursive;
        }

        /* --- ARKA PLAN DALGA EFEKTİ --- */
        .ocean-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #001a33 0%, #00050a 100%);
            z-index: -1;
        }

        /* --- SOL ÜST ANASAYFA BUTONU --- */
        .home-btn {
            position: absolute; top: 30px; left: 30px;
            background: linear-gradient(45deg, #ff0044, #ff8800);
            color: white; border: 2px solid var(--gold);
            padding: 12px 30px; font-size: 24px; border-radius: 50px;
            cursor: pointer; text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 0, 68, 0.5);
            transition: 0.3s all; z-index: 100;
            font-family: 'Orbitron', sans-serif;
        }
        .home-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 40px var(--gold);
            filter: brightness(1.2);
        }

        /* --- MERKEZ YAZI VE EFEKT --- */
        .maintenance-container {
            text-align: center; z-index: 10;
        }

        .main-text {
            font-size: 80px;
            background: linear-gradient(to right, #00f2ff, #ffd700, #ff0044, #00f2ff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite, float 4s ease-in-out infinite;
            text-transform: uppercase;
            letter-spacing: 5px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
        }

        .sub-text {
            font-family: 'Orbitron', sans-serif;
            color: white; font-size: 18px; letter-spacing: 10px;
            margin-top: 20px; opacity: 0.7;
            animation: blink 1.5s infinite;
        }

        /* --- ANİMASYONLAR --- */
        @keyframes shine {
            to { background-position: 200% center; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes blink {
            50% { opacity: 0.2; }
        }

        /* --- MÜZİK KONTROLÜ (GİZLİ BAŞLATICI) --- */
        #music-trigger {
            position: fixed; bottom: 20px; color: rgba(255,255,255,0.2);
            font-size: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>

    <a href="#" class="home-btn" onclick="location.reload()">🏠 ANASAYFAYA DÖN</a>

    <div class="maintenance-container">
        <h1 class="main-text">YAKINDA YAPILICAK<br>ŞUANLIK BAKIMDAYIZ</h1>
        <div class="sub-text">SİSTEMLER GÜNCELLENİYOR...</div>
    </div>

    <div id="music-trigger">Sesi açmak için ekrana tıkla 🎵</div>

    <script>
        // Arka Plan Müzik Modülü (Web Audio API)
        let audioStarted = false;
        
        window.onclick = () => {
            if (audioStarted) return;
            audioStarted = true;
            document.getElementById('music-trigger').style.display = 'none';
            
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            
            // Derin Deniz Uğultusu ve Melodi
            function playNote(freq, type, startTime, duration, vol) {
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(vol, startTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.start(startTime);
                osc.stop(startTime + duration);
            }

            // Sonsuz Döngü Müziği
            setInterval(() => {
                const now = ac.currentTime;
                // Derin baslar
                playNote(60, 'sine', now, 4, 0.2);
                // Hafif mistik melodi
                playNote(220, 'triangle', now + 1, 3, 0.05);
                playNote(261, 'triangle', now + 2, 3, 0.05);
            }, 4000);
        };
    </script>
</body>
</html>
