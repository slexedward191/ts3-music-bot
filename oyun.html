<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Arena</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#0f172a;
  font-family:Arial;
}

canvas{
  display:block;
}

.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
  z-index: 1000;
}

.back-btn:hover {
  transform: translateY(-3px);
}
.score{
  position:fixed;
  top:20px;
  right:20px;
  color:white;
  font-weight:bold;
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
<div class="score" id="score">Skor: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width/2;
let centerY = canvas.height/2;

let bullets = [];
let enemies = [];
let score = 0;

let fireRate = 500;
let enemySpeed = 1.5;

function drawPlayer(){
  ctx.beginPath();
  ctx.arc(centerX, centerY, 25, 0, Math.PI*2);
  ctx.fillStyle="#22c55e";
  ctx.fill();
}

function spawnEnemy(){
  let angle = Math.random()*Math.PI*2;
  let radius = Math.max(canvas.width, canvas.height)/2 + 50;
  let x = centerX + Math.cos(angle)*radius;
  let y = centerY + Math.sin(angle)*radius;
  enemies.push({x,y});
}

function shoot(){
  let angle = Math.random()*Math.PI*2;
  bullets.push({
    x:centerX,
    y:centerY,
    dx:Math.cos(angle)*5,
    dy:Math.sin(angle)*5
  });
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();

  bullets.forEach((b,i)=>{
    b.x += b.dx;
    b.y += b.dy;

    ctx.beginPath();
    ctx.arc(b.x,b.y,5,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    enemies.forEach((e,j)=>{
      let dist = Math.hypot(b.x-e.x,b.y-e.y);
      if(dist < 20){
        enemies.splice(j,1);
        bullets.splice(i,1);
        score++;
        document.getElementById("score").innerText="Skor: "+score;
      }
    });
  });

  enemies.forEach((e,i)=>{
    let angle = Math.atan2(centerY-e.y, centerX-e.x);
    e.x += Math.cos(angle)*enemySpeed;
    e.y += Math.sin(angle)*enemySpeed;

    ctx.beginPath();
    ctx.arc(e.x,e.y,20,0,Math.PI*2);
    ctx.fillStyle="#ef4444";
    ctx.fill();

    let dist = Math.hypot(centerX-e.x,centerY-e.y);
    if(dist < 40){
      alert("Oyun Bitti! Skor: "+score);
      location.reload();
    }
  });

  requestAnimationFrame(update);
}

setInterval(spawnEnemy, 1000);

setInterval(()=>{
  shoot();
}, fireRate);

setInterval(()=>{
  enemySpeed += 0.2;
  if(fireRate > 100){
    fireRate -= 30;
  }
},5000);

update();
</script>

</body>
</html>
