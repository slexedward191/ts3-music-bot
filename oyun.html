<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameArea Fight - Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');
        :root { --neon-blue: #00f2ff; --neon-red: #ff003c; --neon-purple: #bc13fe; --neon-gold: #ffcc00; }
        body { margin: 0; background-color: #050505; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 1250px; height: 800px; display: flex; justify-content: center; align-items: center; }
        #arena-wrapper { position: relative; width: 1250px; height: 800px; border: 10px solid; border-image: linear-gradient(90deg, var(--neon-red) 50%, #ffffff 50%) 1; box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); background: #111; overflow: hidden; z-index: 5; }
        canvas { display: block; }
        .ui-panel { position: absolute; background: rgba(0, 0, 0, 0.85); border: 2px solid var(--neon-blue); padding: 10px; border-radius: 8px; z-index: 10; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn-gif { width: 180px; height: 60px; background: #ff003c; color: white; border: 3px solid #fff; cursor: pointer; display: flex; justify-content: center; align-items: center; margin: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="arena-wrapper">
        <canvas id="gameCanvas" width="1250" height="800"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- GÖRSELLERİ BURAYA EKLEDİM ---
    const imgNinja = new Image(); imgNinja.src = 'https://r.jina.ai/i/6c21e69da59846399c546e339f993319';
    const imgEnemy = new Image(); imgEnemy.src = 'https://r.jina.ai/i/9e0bb662fb1642c6b328a8d11d013ac0';
    const imgBoss = new Image(); imgBoss.src = 'https://r.jina.ai/i/05e10e7ca10f443586c57f2ca29388c3';

    // Senin oyun mantığın ve kayıt sistemin burada başlıyor (orijinal kodundan alıp buraya koyuyorum)
    // ... [Buraya senin o uzun kod bloğunu yapıştıracaksın] ...

    // ÇİZİM KISMINDA ŞUNU KULLAN:
    function drawEntities() {
        // Ninja (Oyuncu)
        ctx.drawImage(imgNinja, player.x - 25, player.y - 25, 50, 50);
        
        // Düşmanlar
        enemies.forEach(e => {
            if(e.boss) {
                ctx.drawImage(imgBoss, e.x - 50, e.y - 50, 100, 100);
            } else {
                ctx.drawImage(imgEnemy, e.x - 25, e.y - 25, 50, 50);
            }
        });
    }
</script>
</body>
</html>
