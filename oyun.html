<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRIMAL DEVOUR</title>
<style>
body{margin:0;overflow:hidden;background:#0a0f0a;font-family:Arial}
canvas{display:block}
#ui{position:absolute;top:10px;left:10px;color:white}
#overlay{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
flex-direction:column;
background:rgba(0,0,0,.7);
color:white;visibility:hidden}
button{padding:10px 20px;margin:6px;background:#111;color:#0f0;border:1px solid #0f0}
button:hover{background:#0f0;color:#000}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<div id="overlay"></div>

<script>
const canvas=c;
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let mouse={x:0,y:0};
canvas.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

function rand(a,b){return Math.random()*(b-a)+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

let camera={x:0,y:0};

let player={
x:0,y:0,
mass:40,
hp:100,
maxHp:100,
level:1,
xp:0,
nextXp:80,
speed:120,
evolution:[],
dashCD:0,
regen:0
};

let entities=[];
let worldSize=5000;
let gameOver=false;
let paused=false;
let spawnTimer=0;
let bossActive=false;

function radius(m){return Math.sqrt(m)*2}

function spawnEntity(){
let e={
x:rand(-worldSize,worldSize),
y:rand(-worldSize,worldSize),
mass:rand(20,150+player.level*10),
hp:100,
type:"normal"
};
if(Math.random()<0.05 && player.level>5){
e.mass=400+player.level*50;
e.type="elite";
}
entities.push(e);
}

function spawnBoss(){
bossActive=true;
entities.push({
x:rand(-2000,2000),
y:rand(-2000,2000),
mass:1500+player.level*200,
hp:3000,
type:"boss",
spawnTimer:0
});
}

function gainXP(v){
player.xp+=v;
if(player.xp>=player.nextXp){
player.xp=0;
player.level++;
player.nextXp*=1.5;
player.mass+=20;
showEvolution();
}
}

function update(dt){
if(gameOver||paused)return;

let angle=Math.atan2(mouse.y-canvas.height/2,mouse.x-canvas.width/2);
let moveSpeed=player.speed/(Math.sqrt(player.mass)*0.1);
player.x+=Math.cos(angle)*moveSpeed*dt;
player.y+=Math.sin(angle)*moveSpeed*dt;

camera.x=player.x;
camera.y=player.y;

entities.forEach((e,i)=>{
let dx=player.x-e.x;
let dy=player.y-e.y;
let dist=Math.hypot(dx,dy);

if(e.type==="boss"){
e.spawnTimer+=dt;
if(e.spawnTimer>5){
spawnEntity();
e.spawnTimer=0;
}
}

if(e.mass < player.mass*0.85){
if(dist<radius(player.mass)){
player.mass+=e.mass*0.4;
gainXP(e.mass*0.5);
entities.splice(i,1);
}
}else if(e.mass > player.mass*1.15){
let a=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(a)*50*dt;
e.y+=Math.sin(a)*50*dt;
if(dist<radius(e.mass)){
player.hp-=40*dt;
if(player.hp<=0)endGame();
}
}else{
if(dist<radius(player.mass)){
player.hp-=10*dt;
}
}
});

spawnTimer-=dt;
if(spawnTimer<=0){
spawnEntity();
spawnTimer=0.5;
}

if(player.level%7===0 && !bossActive){
spawnBoss();
}

player.hp=clamp(player.hp+player.regen*dt,0,player.maxHp);
}

function draw(){
ctx.fillStyle="rgba(10,15,10,0.3)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(canvas.width/2-player.x,canvas.height/2-player.y);

entities.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,radius(e.mass),0,Math.PI*2);
if(e.type==="boss")ctx.fillStyle="purple";
else if(e.type==="elite")ctx.fillStyle="orange";
else ctx.fillStyle="red";
ctx.fill();
});

ctx.beginPath();
ctx.arc(player.x,player.y,radius(player.mass),0,Math.PI*2);
ctx.fillStyle="lime";
ctx.fill();

ctx.restore();

document.getElementById("ui").innerHTML=
"Mass: "+Math.floor(player.mass)+
"<br>HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+Math.floor(player.xp)+"/"+player.nextXp;
}

function showEvolution(){
paused=true;
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h2>EVOLUTION</h2>"+
"<button onclick='evo(\"regen\")'>Regeneration</button>"+
"<button onclick='evo(\"speed\")'>Metabolic Boost</button>"+
"<button onclick='evo(\"armor\")'>Armor Skin</button>"+
"<button onclick='evo(\"spike\")'>Spiked Body</button>";
}

function evo(type){
if(type==="regen")player.regen+=5;
if(type==="speed")player.speed+=30;
if(type==="armor")player.maxHp+=50;
if(type==="spike")player.mass+=10;
paused=false;
document.getElementById("overlay").style.visibility="hidden";
}

function endGame(){
gameOver=true;
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h1>EXTINCT</h1>"+
"<button onclick='location.reload()'>Restart</button>";
}

let last=0;
function loop(t){
let dt=(t-last)/1000;
last=t;
update(dt);
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
