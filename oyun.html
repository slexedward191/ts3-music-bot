<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korsanlar Kralı - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Pirata+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #0a141d;
            --button-red: #8b0000;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-color);
            overflow: hidden;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516339901600-2e1a62986307?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Ana Panel */
        .login-box {
            background: rgba(10, 20, 29, 0.9);
            border: 3px solid var(--gold);
            border-radius: 10px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(212, 175, 55, 0.2);
            text-align: center;
            position: relative;
        }

        .game-title {
            font-family: 'Pirata One', cursive;
            font-size: 50px;
            color: var(--gold);
            text-shadow: 3px 3px 5px #000;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            background: #1a2a3a;
            border: 1px solid #3d4a5a;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* Butonlar */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-login {
            flex: 2;
            background: linear-gradient(to bottom, #7d5a2d, #4e361a);
            border: 1px solid var(--gold);
            color: white;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-login:hover {
            filter: brightness(1.2);
        }

        .btn-fb {
            flex: 1;
            background: #3b5998;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-register {
            display: block;
            width: 100%;
            margin-top: 25px;
            background: linear-gradient(to bottom, #a00, #600);
            border: 2px solid #ff4500;
            color: white;
            padding: 15px;
            font-family: 'Cinzel', serif;
            font-size: 18px;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff4500;
        }

        /* Kayıt Modal */
        #register-form {
            display: none;
        }

        .footer-links {
            margin-top: 15px;
            font-size: 12px;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: var(--gold);
        }

        .status-msg {
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-box">
        <h1 class="game-title">KORSANLAR KRALI</h1>

        <div id="login-form">
            <div class="form-group">
                <label>Kullanıcı adı:</label>
                <input type="text" id="login-user" placeholder="Adınızı girin...">
            </div>
            <div class="form-group">
                <label>Şifre:</label>
                <input type="password" id="login-pass" placeholder="******">
            </div>
            <div class="form-group">
                <label>Server / Client:</label>
                <select>
                    <option>KRAL-TR1 (Global)</option>
                    <option>KRAL-TR2 (Yeni)</option>
                </select>
            </div>

            <div class="btn-row">
                <button class="btn-login" onclick="attemptLogin()">Giriş</button>
                <button class="btn-fb">f</button>
            </div>

            <div class="footer-links">
                <input type="checkbox" id="remember"> <label style="display:inline;" for="remember">Beni Hatırla</label><br><br>
                <a href="#">Parolamı Unuttum</a>
            </div>

            <button class="btn-register" onclick="toggleForms()">ÜCRETSİZ KAYIT OL</button>
        </div>

        <div id="register-form">
            <h2 style="color: var(--gold); font-family: 'Cinzel';">Yeni Kaptan Kaydı</h2>
            <div class="form-group">
                <label>Kullanıcı Adı Seçin:</label>
                <input type="text" id="reg-user">
            </div>
            <div class="form-group">
                <label>Şifre Belirleyin:</label>
                <input type="password" id="reg-pass">
            </div>
            <button class="btn-login" style="width: 100%;" onclick="saveUser()">KAPTANLIĞA BAŞLA</button>
            <p onclick="toggleForms()" style="cursor:pointer; margin-top:15px; font-size:13px;">Geri Dön</p>
        </div>

        <p class="status-msg" id="msg"></p>
    </div>
</div>

<script>
    // Formlar arası geçiş
    function toggleForms() {
        const login = document.getElementById('login-form');
        const reg = document.getElementById('register-form');
        const msg = document.getElementById('msg');
        
        msg.innerText = "";
        if(login.style.display === "none") {
            login.style.display = "block";
            reg.style.display = "none";
        } else {
            login.style.display = "none";
            reg.style.display = "block";
        }
    }

    // Kullanıcı Kayıt Fonksiyonu (Local Storage)
    function saveUser() {
        const user = document.getElementById('reg-user').value;
        const pass = document.getElementById('reg-pass').value;
        const msg = document.getElementById('msg');

        if(user && pass) {
            localStorage.setItem('pirateUser', user);
            localStorage.setItem('piratePass', pass);
            msg.style.color = "#4CAF50";
            msg.innerText = "Kayıt Başarılı! Giriş yapabilirsiniz.";
            setTimeout(toggleForms, 1500);
        } else {
            msg.style.color = "#f44336";
            msg.innerText = "Lütfen tüm alanları doldurun!";
        }
    }

    // Giriş Fonksiyonu
    function attemptLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const msg = document.getElementById('msg');

        const savedUser = localStorage.getItem('pirateUser');
        const savedPass = localStorage.getItem('piratePass');

        if(user === savedUser && pass === savedPass && user !== null) {
            msg.style.color = "#4CAF50";
            msg.innerText = "Giriş yapılıyor... Gemi hazırlanıyor!";
            // Burada oyun sahnesine geçiş yapılacak
        } else {
            msg.style.color = "#f44336";
            msg.innerText = "Hatalı kullanıcı adı veya şifre!";
        }
    }
</script>

</body>
</html>
