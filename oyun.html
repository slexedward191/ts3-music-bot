<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SURVIVOR PROTOCOL: INFINITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #03040a; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #fff; }
        canvas { display: block; }

        /* PROFESYONEL HUD */
        #main-hud {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
        }
        .hud-top { display: flex; justify-content: space-between; }
        .bar-wrapper { width: 350px; background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 4px; border-radius: 4px; }
        .bar-inner { height: 12px; transition: width 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #hp-bar { background: linear-gradient(90deg, #ff0055, #ff5e00); width: 100%; }
        #xp-bar { background: linear-gradient(90deg, var(--neon), #bd00ff); width: 0%; }
        
        /* KARAKTER PANELİ */
        #char-panel {
            position: absolute; right: 20px; top: 100px; background: rgba(0,0,0,0.85);
            border: 1px solid var(--neon); padding: 15px; border-radius: 10px; min-width: 150px;
            backdrop-filter: blur(10px); display: none;
        }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid #222; }
        .stat-val { color: var(--neon); font-weight: bold; }

        /* SKILL TREE (UPGRADE) */
        #upgrade-menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: none; align-items: center; justify-content: center; flex-direction: column;
        }
        .cards { display: flex; gap: 20px; margin-top: 30px; }
        .card {
            width: 280px; background: #0a0c14; border: 2px solid #1a1e2e; border-radius: 15px;
            padding: 30px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); transform: translateY(-10px); box-shadow: 0 0 30px rgba(0,242,255,0.2); }
        .card h2 { color: var(--neon); text-transform: uppercase; margin-bottom: 15px; }
        .card p { color: #888; line-height: 1.5; font-size: 14px; }

        /* MESAJLAR */
        #announcer {
            position: absolute; top: 30%; width: 100%; text-align: center;
            font-size: 80px; font-weight: 700; color: #fff; text-shadow: 0 0 20px var(--neon);
            pointer-events: none; opacity: 0; transition: 0.5s;
        }

        #inventory-btn { pointer-events: all; cursor: pointer; color: var(--neon); border: 1px solid var(--neon); padding: 5px 10px; }
    </style>
</head>
<body>

<div id="main-hud">
    <div class="hud-top">
        <div class="status">
            <div style="font-size: 14px; letter-spacing: 2px;">PILOT_STATUS: ACTIVE</div>
            <div class="bar-wrapper"><div id="hp-bar" class="bar-inner"></div></div>
            <div style="font-size: 14px; margin-top: 10px; letter-spacing: 2px;">SYNC_LEVEL: <span id="lvl-ui">1</span></div>
            <div class="bar-wrapper"><div id="xp-bar" class="bar-inner"></div></div>
        </div>
        <div class="counters" style="text-align: right;">
            <div style="font-size: 30px; color: #ff0055;" id="kill-ui">000</div>
            <div style="font-size: 12px; color: #555;">KILLED_HOSTILES</div>
            <div id="inventory-btn" onclick="togglePanel()">STATS [TAB]</div>
        </div>
    </div>
</div>

<div id="char-panel">
    <h3 style="color: var(--neon); margin: 0 0 10px 0;">CORE_STATS</h3>
    <div class="stat-row">Damage: <span class="stat-val" id="st-dmg">45</span></div>
    <div class="stat-row">Fire Rate: <span class="stat-val" id="st-rate">0.4s</span></div>
    <div class="stat-row">Speed: <span class="stat-val" id="st-spd">4.0</span></div>
    <div class="stat-row">Crit: <span class="stat-val" id="st-crit">5%</span></div>
</div>

<div id="announcer">WAVE 1</div>

<div id="upgrade-menu">
    <h1 style="font-size: 50px; letter-spacing: 15px;">EVOLUTION_AVAILABLE</h1>
    <div class="cards" id="upgrade-cards"></div>
</div>

<canvas id="game"></canvas>

<script>
/**
 * OYUN MOTORU YAPISI (Advanced Modular Pattern)
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const Game = {
    frame: 0,
    wave: 1,
    kills: 0,
    isPaused: false,
    shake: 0,
    entities: { player: null, enemies: [], bullets: [], items: [], fx: [] },
    config: {
        enemyBaseHp: 60,
        spawnRate: 120,
        nightMode: false
    }
};

class Player {
    constructor() {
        this.x = canvas.width/2; this.y = canvas.height/2;
        this.r = 20; this.hp = 100; this.maxHp = 100;
        this.lvl = 1; this.xp = 0; this.nextXp = 100;
        this.stats = { dmg: 45, rate: 350, spd: 4.5, crit: 0.08, projectiles: 1 };
        this.lastShot = 0;
    }

    update() {
        let mx = 0, my = 0;
        if (keys['w']) my -= this.stats.spd;
        if (keys['s']) my += this.stats.spd;
        if (keys['a']) mx -= this.stats.spd;
        if (keys['d']) mx += this.stats.spd;
        this.x += mx; this.y += my;

        if (mouse.down) this.shoot();
        this.draw();
    }

    draw() {
        const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
        
        // Işık Hüzmesi
        ctx.save();
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 250);
        g.addColorStop(0, 'rgba(0, 242, 255, 0.08)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(0,0, canvas.width, canvas.height);

        ctx.translate(this.x, this.y);
        ctx.rotate(angle);
        
        // Gövde
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(15, 0); ctx.lineTo(-12, -15); ctx.lineTo(-12, 15); ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    shoot() {
        const now = Date.now();
        if (now - this.lastShot > this.stats.rate) {
            Game.shake = 5;
            const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
            
            for(let i=0; i<this.stats.projectiles; i++) {
                const offset = (i - (this.stats.projectiles-1)/2) * 0.15;
                Game.entities.bullets.push(new Bullet(this.x, this.y, angle + offset, this.stats.dmg, Math.random() < this.stats.crit));
            }
            this.lastShot = now;
        }
    }
}

class Enemy {
    constructor(isBoss = false) {
        this.isBoss = isBoss;
        const ang = Math.random() * Math.PI * 2;
        const dist = canvas.width;
        this.x = canvas.width/2 + Math.cos(ang) * dist;
        this.y = canvas.height/2 + Math.sin(ang) * dist;
        
        this.r = isBoss ? 65 : 22;
        this.hp = (isBoss ? 2000 : 60) * (1 + Game.wave * 0.3);
        this.maxHp = this.hp;
        this.speed = isBoss ? 1.5 : 2.5 + Math.random();
        this.color = isBoss ? '#ff0055' : '#111';
    }

    update() {
        const angle = Math.atan2(Game.entities.player.y - this.y, Game.entities.player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;

        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = this.isBoss ? '#ff0055' : '#76ff03';
        ctx.strokeStyle = this.isBoss ? '#ff0055' : '#76ff03';
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        
        // HP Bar
        ctx.fillStyle = '#222';
        ctx.fillRect(this.x - this.r, this.y - this.r - 12, this.r*2, 5);
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(this.x - this.r, this.y - this.r - 12, (this.r*2) * (this.hp/this.maxHp), 5);
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, ang, dmg, crit) {
        this.x = x; this.y = y;
        this.dmg = crit ? dmg * 2.5 : dmg;
        this.crit = crit;
        this.vx = Math.cos(ang) * 16;
        this.vy = Math.sin(ang) * 16;
        this.life = 100;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        ctx.fillStyle = this.crit ? '#ff00ff' : '#00f2ff';
        ctx.shadowBlur = this.crit ? 15 : 0;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.crit ? 6 : 4, 0, Math.PI*2); ctx.fill();
        this.life--;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.c = color;
        this.v = {x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10};
        this.a = 1;
    }
    update() {
        this.x += this.v.x; this.y += this.v.y; this.a -= 0.02;
        ctx.globalAlpha = this.a;
        ctx.fillStyle = this.c;
        ctx.fillRect(this.x, this.y, 3, 3);
        ctx.globalAlpha = 1;
    }
}

/**
 * MANTIK DÖNGÜSÜ
 */

function spawnWave() {
    announce(`WAVE ${Game.wave}`);
    const count = 5 + Game.wave * 4;
    for(let i=0; i<count; i++) {
        setTimeout(() => Game.entities.enemies.push(new Enemy()), i * 300);
    }
    if(Game.wave % 5 === 0) Game.entities.enemies.push(new Enemy(true));
}

function announce(txt) {
    const el = document.getElementById('announcer');
    el.innerText = txt; el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, 2000);
}

function showUpgradeMenu() {
    Game.isPaused = true;
    const cards = [
        { t: "HEAVY BOLTS", d: "Hasarı %40 artırır ama hızı %10 azaltır.", f: () => { Game.entities.player.stats.dmg *= 1.4; Game.entities.player.stats.spd *= 0.9; }},
        { t: "SPLIT SHOT", d: "Aynı anda ekstra mermi ateşler.", f: () => { Game.entities.player.stats.projectiles++; }},
        { t: "OVERCLOCK", d: "Ateş hızını %25 artırır.", f: () => { Game.entities.player.stats.rate *= 0.75; }},
        { t: "NANO-REPAIR", d: "Maksimum canı 50 artırır ve tamir eder.", f: () => { Game.entities.player.maxHp += 50; Game.entities.player.hp = Game.entities.player.maxHp; }},
        { t: "DEADLY FOCUS", d: "Kritik vuruş şansını %15 artırır.", f: () => { Game.entities.player.stats.crit += 0.15; }}
    ];

    const menu = document.getElementById('upgrade-menu');
    const container = document.getElementById('upgrade-cards');
    container.innerHTML = '';
    menu.style.display = 'flex';

    cards.sort(() => Math.random() - 0.5).slice(0, 3).forEach(c => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h2>${c.t}</h2><p>${c.d}</p>`;
        div.onclick = () => {
            c.f(); Game.isPaused = false; menu.style.display = 'none'; spawnWave();
        };
        container.appendChild(div);
    });
}

function loop() {
    if(!Game.isPaused) {
        ctx.fillStyle = 'rgba(3, 4, 10, 0.4)';
        ctx.fillRect(0,0, canvas.width, canvas.height);

        if(Game.shake > 0) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*Game.shake, (Math.random()-0.5)*Game.shake);
            Game.shake *= 0.9;
        }

        Game.entities.player.update();

        // Mermi & Düşman Etkileşimi
        Game.entities.bullets.forEach((b, bi) => {
            b.update();
            if(b.life <= 0) Game.entities.bullets.splice(bi, 1);
            
            Game.entities.enemies.forEach((en, ei) => {
                const d = Math.hypot(b.x - en.x, b.y - en.y);
                if(d < en.r) {
                    en.hp -= b.dmg;
                    Game.entities.bullets.splice(bi, 1);
                    for(let i=0; i<5; i++) Game.entities.fx.push(new Particle(b.x, b.y, en.isBoss ? '#ff0055' : '#76ff03'));
                    
                    if(en.hp <= 0) {
                        Game.kills++;
                        Game.entities.player.xp += en.isBoss ? 500 : 25;
                        Game.entities.enemies.splice(ei, 1);
                        if(Game.entities.player.xp >= Game.entities.player.nextXp) {
                            Game.entities.player.lvl++;
                            Game.entities.player.xp = 0;
                            Game.entities.player.nextXp *= 1.4;
                            showUpgradeMenu();
                        }
                    }
                }
            });
        });

        // Düşman & Oyuncu Etkileşimi
        Game.entities.enemies.forEach((en, ei) => {
            en.update();
            const d = Math.hypot(en.x - Game.entities.player.x, en.y - Game.entities.player.y);
            if(d < en.r + Game.entities.player.r) {
                Game.entities.player.hp -= 0.5;
                if(Game.entities.player.hp <= 0) {
                    alert("PROTOCOL FAILED. TOTAL KILLS: " + Game.kills);
                    location.reload();
                }
            }
        });

        Game.entities.fx.forEach((f, i) => {
            f.update();
            if(f.a <= 0) Game.entities.fx.splice(i, 1);
        });

        if(Game.entities.enemies.length === 0 && !Game.isPaused) {
            Game.wave++;
            spawnWave();
        }

        updateUI();
        if(Game.shake > 0) ctx.restore();
    }
    Game.frame++;
    requestAnimationFrame(loop);
}

function updateUI() {
    const p = Game.entities.player;
    document.getElementById('hp-bar').style.width = (p.hp / p.maxHp * 100) + '%';
    document.getElementById('xp-bar').style.width = (p.xp / p.nextXp * 100) + '%';
    document.getElementById('kill-ui').innerText = Game.kills.toString().padStart(3, '0');
    document.getElementById('lvl-ui').innerText = p.lvl;
    
    document.getElementById('st-dmg').innerText = p.stats.dmg.toFixed(0);
    document.getElementById('st-rate').innerText = (p.stats.rate/1000).toFixed(2) + 's';
    document.getElementById('st-spd').innerText = p.stats.spd.toFixed(1);
    document.getElementById('st-crit').innerText = (p.stats.crit*100).toFixed(0) + '%';
}

function togglePanel() {
    const p = document.getElementById('char-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

// Kontroller
const keys = {};
const mouse = {x:0, y:0, down:false};
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(e.key === 'Tab') { e.preventDefault(); togglePanel(); } };
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

Game.entities.player = new Player();
spawnWave();
loop();
</script>
</body>
</html>
