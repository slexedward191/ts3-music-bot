<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Zombi</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
}
canvas{
    background:#181818;
    border:4px solid #333;
}
#overlay{
    position:absolute;
    width:1200px;
    height:700px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.85);
    visibility:hidden;
}
button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}
#waveText{
    position:absolute;
    top:20px;
    width:1200px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    color:#f1c40f;
    pointer-events:none;
}
</style>
</head>
<body>

<div id="waveText"></div>
<canvas id="game" width="1200" height="700"></canvas>
<div id="overlay"></div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const waveText = document.getElementById("waveText");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime = 0;
let deltaTime = 0;
let gameOver = false;
let paused = false;

let wave = 1;
let zombiesToSpawn = 0;
let zombiesSpawned = 0;
let spawnTimer = 0;
let waveDelay = 3;
let waveCooldown = 0;

let keys = {};
let mouse = {x:0,y:0};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

/* PLAYER */

class Player{
    constructor(){
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.r = 16;
        this.speed = 220;

        this.maxHp = 100;
        this.hp = 100;

        this.maxAmmo = 30;
        this.ammo = 30;
        this.reloadTime = 1.2;
        this.reloadTimer = 0;

        this.fireRate = 0.15;
        this.fireTimer = 0;

        this.damage = 15;
        this.critChance = 0.15;

        this.level = 1;
        this.xp = 0;
        this.xpNeeded = 100;
    }

    update(dt){
        let vx=0, vy=0;
        if(keys["w"]) vy-=1;
        if(keys["s"]) vy+=1;
        if(keys["a"]) vx-=1;
        if(keys["d"]) vx+=1;

        let len=Math.hypot(vx,vy);
        if(len>0){vx/=len;vy/=len;}

        this.x+=vx*this.speed*dt;
        this.y+=vy*this.speed*dt;

        this.x=clamp(this.x,this.r,WIDTH-this.r);
        this.y=clamp(this.y,this.r,HEIGHT-this.r);

        if(this.reloadTimer>0){
            this.reloadTimer-=dt;
            if(this.reloadTimer<=0) this.ammo=this.maxAmmo;
        }

        if(this.ammo<=0 && this.reloadTimer<=0){
            this.reloadTimer=this.reloadTime;
        }

        this.fireTimer-=dt;
        if(this.fireTimer<=0 && this.ammo>0 && this.reloadTimer<=0){
            this.shoot();
            this.fireTimer=this.fireRate;
        }
    }

    shoot(){
        this.ammo--;
        let angle=Math.atan2(mouse.y-this.y,mouse.x-this.x);
        let crit=Math.random()<this.critChance;
        bullets.push(new Bullet(
            this.x,this.y,
            Math.cos(angle),Math.sin(angle),
            this.damage*(crit?2:1),crit
        ));
    }

    gainXP(amount){
        this.xp+=amount;
        if(this.xp>=this.xpNeeded){
            this.level++;
            this.xp=0;
            this.xpNeeded+=50;
            levelUp();
        }
    }

    draw(){
        ctx.fillStyle="#3498db";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="red";
        ctx.fillRect(this.x-25,this.y-30,50,6);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-25,this.y-30,50*(this.hp/this.maxHp),6);
    }
}

class Bullet{
    constructor(x,y,dx,dy,damage,crit){
        this.x=x;this.y=y;
        this.dx=dx;this.dy=dy;
        this.speed=600;
        this.r=crit?6:4;
        this.damage=damage;
        this.crit=crit;
    }
    update(dt){
        this.x+=this.dx*this.speed*dt;
        this.y+=this.dy*this.speed*dt;
    }
    draw(){
        ctx.fillStyle=this.crit?"gold":"yellow";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

class Zombie{
    constructor(type){

        this.type=type;
        this.damageReduction = 0;

        if(type==="normal"){
            this.r=18; this.speed=100; this.maxHp=50;
            this.color="green"; this.damage=30;
        }

        if(type==="fast"){
            this.r=14; this.speed=170; this.maxHp=35;
            this.color="#2ecc71"; this.damage=20;
        }

        if(type==="tank"){
            this.r=32; 
            this.speed=45; 
            this.color="#063d06"; 
            this.damage=60;

            let hpTier = Math.floor((wave-4) / 5);
            if(hpTier < 0) hpTier = 0;

            this.maxHp = 3000 + (hpTier * 5000);

            let reductionBonus = Math.floor(wave / 10) * 0.05;
            this.damageReduction = 0.35 + reductionBonus;
            if(this.damageReduction > 0.60)
                this.damageReduction = 0.60;
        }

        this.hp=this.maxHp;
        this.x=Math.random()<0.5?0:WIDTH;
        this.y=Math.random()*HEIGHT;
    }

    update(dt){
        let angle=Math.atan2(player.y-this.y,player.x-this.x);
        this.x+=Math.cos(angle)*this.speed*dt;
        this.y+=Math.sin(angle)*this.speed*dt;

        if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
            player.hp-=this.damage*dt;
            if(player.hp<=0){
                player.hp=0;
                triggerGameOver();
            }
        }
    }

    draw(){
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="red";
        ctx.fillRect(this.x-30,this.y-this.r-14,60,6);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-30,this.y-this.r-14,60*(this.hp/this.maxHp),6);
    }
}

const player = new Player();
let bullets=[];
let zombies=[];

/* GAME LOOP TAM */

function startWave(){
    zombiesToSpawn = 5 + wave*3;
    zombiesSpawned = 0;
    spawnTimer = 0;
}

function spawnZombie(){
    let type="normal";
    if(wave>=2 && Math.random()<0.3) type="fast";
    if(wave>=4 && Math.random()<0.25) type="tank";
    zombies.push(new Zombie(type));
}

function update(timestamp){
    deltaTime=(timestamp-lastTime)/1000;
    lastTime=timestamp;

    if(!gameOver){

        player.update(deltaTime);

        if(zombiesSpawned<zombiesToSpawn){
            spawnTimer-=deltaTime;
            if(spawnTimer<=0){
                spawnZombie();
                zombiesSpawned++;
                spawnTimer=1;
            }
        }

        bullets.forEach((b,i)=>{
            b.update(deltaTime);
            if(b.x<0||b.x>WIDTH||b.y<0||b.y>HEIGHT)
                bullets.splice(i,1);
        });

        zombies.forEach((z,zi)=>{
            z.update(deltaTime);

            bullets.forEach((b,bi)=>{
                if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
                    let finalDamage=b.damage;
                    if(z.type==="tank")
                        finalDamage*= (1 - z.damageReduction);

                    z.hp-=finalDamage;
                    bullets.splice(bi,1);

                    if(z.hp<=0){
                        zombies.splice(zi,1);
                    }
                }
            });
        });

        if(zombiesSpawned===zombiesToSpawn && zombies.length===0){
            wave++;
            startWave();
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    bullets.forEach(b=>b.draw());
    zombies.forEach(z=>z.draw());
    player.draw();
}

startWave();
requestAnimationFrame(update);

</script>
</body>
</html>
