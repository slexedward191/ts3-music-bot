<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>THE LAST STAND: REBORN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff004c; --gold: #ffcc00; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Orbitron', sans-serif; color: #fff; user-select: none; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,1); border: 4px solid #1a1a1a; }

        /* --- UI MODULLERI --- */
        #game-ui { position: absolute; inset: 0; pointer-events: none; }
        
        /* Sağlık Barı */
        .hp-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; }
        .hp-bar { height: 20px; background: rgba(0,0,0,0.8); border: 2px solid var(--neon); border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,242,255,0.3); }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--danger), #ff8000); transition: width 0.2s ease-out; }

        /* Dalga Duyurusu (Animasyonlu) */
        #wave-announcer { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 70px; font-weight: 900; 
            color: #fff; text-shadow: 0 0 30px var(--neon); opacity: 0; transform: scale(0.5); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #wave-announcer.show { opacity: 1; transform: scale(1); }

        /* Menü ve Butonlar */
        .btn { pointer-events: all; background: rgba(0,242,255,0.1); border: 2px solid var(--neon); color: var(--neon); 
            padding: 10px 25px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; border-radius: 5px; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        #guide-btn { position: absolute; top: 20px; right: 20px; }
        
        /* Modal (Kılavuz ve Ölüm Ekranı) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; pointer-events: all; }
        .modal h2 { color: var(--neon); font-size: 40px; margin-bottom: 20px; }
        .modal p { color: #ccc; max-width: 500px; text-align: center; line-height: 1.8; margin-bottom: 30px; }

        #boss-hp-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 60%; display: none; }
        .boss-bar { height: 10px; background: #222; border: 1px solid var(--danger); }
        #boss-fill { width: 100%; height: 100%; background: var(--danger); }
    </style>
</head>
<body>

<div id="game-ui">
    <button id="guide-btn" class="btn" onclick="showGuide()">KLAVUZ (P)</button>
    <div id="wave-announcer">DALGA 1</div>
    
    <div id="boss-hp-ui">
        <div style="color: var(--danger); font-size: 12px; margin-bottom: 5px;">BOSS PROTOKOLÜ AKTİF</div>
        <div class="boss-bar"><div id="boss-fill"></div></div>
    </div>

    <div class="hp-container">
        <div style="margin-bottom: 8px; font-size: 14px; letter-spacing: 3px;">ZIRH DURUMU: <span id="hp-pct">100</span>%</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>
</div>

<div id="guide-modal" class="modal">
    <h2>OYUN KLAVUZU</h2>
    <p>WASD ile hareket et. Mouse ile hedef al ve ateş et.<br>
    Dalgalar halinde gelen düşmanları temizle.<br>
    Her 5 dalgada bir BOSS gelecek.<br>
    Alan dışına çıkamazsın, köşeye sıkışmamaya çalış!</p>
    <button class="btn" onclick="closeGuide()">DEVAM ET</button>
</div>

<div id="death-modal" class="modal">
    <h2 style="color: var(--danger);">SİSTEM ÇÖKTÜ</h2>
    <p id="final-stats">Skor: 0 | Dalga: 1</p>
    <button class="btn" onclick="resetGame()">YENİDEN BAŞLAT</button>
</div>

<canvas id="game"></canvas>

<script>
/** * AUDIO ENGINE (Sentezlenmiş Ses Efektleri) */
const AudioFX = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(freq, type, dur, vol) {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
    },
    shoot() { this.play(150, 'square', 0.1, 0.1); },
    hit() { this.play(60, 'sawtooth', 0.2, 0.2); },
    explosion() { this.play(40, 'triangle', 0.5, 0.3); },
    wave() { this.play(300, 'sine', 1, 0.2); }
};

/** * GAME CORE */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
// Kısıtlı Harita Boyutu
const MAP_W = 1000; const MAP_H = 800;
canvas.width = MAP_W; canvas.height = MAP_H;

let player, enemies, bullets, particles, wave, score, isPaused, gameActive;
const keys = {}; const mouse = {x:0, y:0, down:false};

class Player {
    constructor() {
        this.x = MAP_W/2; this.y = MAP_H/2; this.r = 20;
        this.hp = 100; this.maxHp = 100; this.speed = 5;
    }
    update() {
        if(keys['w'] && this.y > this.r) this.y -= this.speed;
        if(keys['s'] && this.y < MAP_H - this.r) this.y += this.speed;
        if(keys['a'] && this.x > this.r) this.x -= this.speed;
        if(keys['d'] && this.x < MAP_W - this.r) this.x += this.speed;
    }
    draw() {
        const ang = Math.atan2(mouse.y - this.y, mouse.x - this.x);
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(ang);
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,-12); ctx.lineTo(-10,12); ctx.closePath(); ctx.stroke();
        ctx.restore();
    }
}

class Enemy {
    constructor(isBoss = false) {
        this.isBoss = isBoss;
        this.r = isBoss ? 60 : 20;
        this.hp = isBoss ? 1000 + (wave * 500) : 50 + (wave * 10);
        this.maxHp = this.hp;
        this.speed = isBoss ? 1.5 : 2 + Math.random();
        
        // Kenarlarda doğma
        if(Math.random() > 0.5) {
            this.x = Math.random() > 0.5 ? -50 : MAP_W + 50;
            this.y = Math.random() * MAP_H;
        } else {
            this.x = Math.random() * MAP_W;
            this.y = Math.random() > 0.5 ? -50 : MAP_H + 50;
        }
    }
    update() {
        const ang = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(ang) * this.speed;
        this.y += Math.sin(ang) * this.speed;
        
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = this.isBoss ? '#ff004c' : '#76ff03';
        ctx.fillStyle = this.isBoss ? '#ff004c' : '#1a1a1a';
        ctx.strokeStyle = this.isBoss ? '#fff' : '#76ff03';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.restore();
    }
}

class Bullet {
    constructor(x, y, ang) {
        this.x = x; this.y = y;
        this.vx = Math.cos(ang) * 12; this.vy = Math.sin(ang) * 12;
        this.life = 60;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.life--;
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
    }
}

/** * MANTIK SİSTEMLERİ */

function init() {
    player = new Player(); enemies = []; bullets = []; particles = [];
    wave = 0; score = 0; isPaused = false; gameActive = true;
    nextWave();
    animate();
}

function nextWave() {
    wave++;
    const announcer = document.getElementById('wave-announcer');
    announcer.innerText = `DALGA ${wave}`;
    announcer.classList.add('show');
    AudioFX.wave();
    
    setTimeout(() => {
        announcer.classList.remove('show');
        const count = wave * 3 + 5;
        for(let i=0; i<count; i++) enemies.push(new Enemy(false));
        if(wave % 5 === 0) {
            enemies.push(new Enemy(true));
            document.getElementById('boss-hp-ui').style.display = 'block';
        }
    }, 2000);
}

function resetGame() {
    document.getElementById('death-modal').style.display = 'none';
    init();
}

function showGuide() { isPaused = true; document.getElementById('guide-modal').style.display = 'flex'; }
function closeGuide() { isPaused = false; document.getElementById('guide-modal').style.display = 'none'; }

function animate() {
    if(!gameActive) return;
    if(isPaused) { requestAnimationFrame(animate); return; }

    // Arka Plan (Animasyonlu Izgara)
    ctx.fillStyle = '#050505'; ctx.fillRect(0,0, MAP_W, MAP_H);
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
    for(let i=0; i<MAP_W; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, MAP_H); ctx.stroke(); }
    for(let i=0; i<MAP_H; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(MAP_W, i); ctx.stroke(); }

    player.update();
    player.draw();

    // Ateş Etme
    if(mouse.down && GameFrame % 10 === 0) {
        const ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        bullets.push(new Bullet(player.x, player.y, ang));
        AudioFX.shoot();
    }

    // Düşman İşleme
    let bossAlive = false;
    enemies.forEach((en, ei) => {
        en.update();
        if(en.isBoss) { bossAlive = true; document.getElementById('boss-fill').style.width = (en.hp/en.maxHp*100)+'%'; }

        // Oyuncuyla çarpışma
        const d = Math.hypot(en.x - player.x, en.y - player.y);
        if(d < en.r + player.r) {
            player.hp -= en.isBoss ? 1 : 0.3;
            if(player.hp <= 0) {
                gameActive = false;
                document.getElementById('death-modal').style.display = 'flex';
                document.getElementById('final-stats').innerText = `Skor: ${score} | Dalga: ${wave}`;
                AudioFX.explosion();
            }
        }

        // Mermi çarpışma
        bullets.forEach((b, bi) => {
            const bd = Math.hypot(en.x - b.x, en.y - b.y);
            if(bd < en.r) {
                en.hp -= 20; bullets.splice(bi, 1);
                AudioFX.hit();
                if(en.hp <= 0) {
                    if(en.isBoss) { score += 1000; document.getElementById('boss-hp-ui').style.display = 'none'; }
                    else score += 100;
                    enemies.splice(ei, 1);
                }
            }
        });
    });

    if(!bossAlive) document.getElementById('boss-hp-ui').style.display = 'none';
    bullets.forEach((b, i) => { b.update(); if(b.life <= 0) bullets.splice(i,1); });

    if(enemies.length === 0 && gameActive) nextWave();

    // UI Güncelleme
    document.getElementById('hp-fill').style.width = player.hp + '%';
    document.getElementById('hp-pct').innerText = Math.max(0, Math.floor(player.hp));

    GameFrame++;
    requestAnimationFrame(animate);
}

let GameFrame = 0;
window.onkeydown = e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase()==='p') showGuide(); };
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { 
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
};
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

init();
</script>
</body>
</html>
