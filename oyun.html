<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Zombi v2.2</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
}
canvas{
    background:#181818;
    border:4px solid #333;
}
#overlay{
    position:absolute;
    width:1200px;
    height:700px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.85);
    visibility:hidden;
}
button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<canvas id="game" width="1200" height="700"></canvas>

<div id="overlay"></div>

<script>

/* ================= CORE ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime = 0;
let deltaTime = 0;
let gameOver = false;
let paused = false;

/* ================= INPUT ================= */

let keys = {};
let mouse = {x:0,y:0};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

/* ================= UTILS ================= */

function clamp(value,min,max){
    return Math.max(min,Math.min(max,value));
}

/* ================= PLAYER ================= */

class Player{
    constructor(){
        this.x = WIDTH/2;
        this.y = HEIGHT/2;
        this.r = 16;

        this.speed = 220;

        this.maxHp = 100;
        this.hp = 100;

        this.maxAmmo = 30;
        this.ammo = 30;

        this.reloadTime = 1.2;
        this.reloadTimer = 0;

        this.fireRate = 0.15;
        this.fireTimer = 0;

        this.damage = 15;
        this.critChance = 0.15;

        this.level = 1;
        this.xp = 0;
        this.xpNeeded = 100;
    }

    update(dt){

        let vx=0, vy=0;

        if(keys["w"]) vy-=1;
        if(keys["s"]) vy+=1;
        if(keys["a"]) vx-=1;
        if(keys["d"]) vx+=1;

        let len = Math.hypot(vx,vy);
        if(len>0){ vx/=len; vy/=len; }

        this.x += vx*this.speed*dt;
        this.y += vy*this.speed*dt;

        this.x = clamp(this.x,this.r,WIDTH-this.r);
        this.y = clamp(this.y,this.r,HEIGHT-this.r);

        if(this.reloadTimer>0){
            this.reloadTimer-=dt;
            if(this.reloadTimer<=0){
                this.ammo=this.maxAmmo;
            }
        }

        if(this.ammo<=0 && this.reloadTimer<=0){
            this.reloadTimer=this.reloadTime;
        }

        this.fireTimer-=dt;
        if(this.fireTimer<=0 && this.ammo>0 && this.reloadTimer<=0){
            this.shoot();
            this.fireTimer=this.fireRate;
        }
    }

    shoot(){
        this.ammo--;
        let angle = Math.atan2(mouse.y-this.y, mouse.x-this.x);
        let crit = Math.random()<this.critChance;

        bullets.push(new Bullet(
            this.x,
            this.y,
            Math.cos(angle),
            Math.sin(angle),
            this.damage*(crit?2:1),
            crit
        ));
    }

    gainXP(amount){
        this.xp += amount;
        if(this.xp >= this.xpNeeded){
            this.level++;
            this.xp = 0;
            this.xpNeeded += 50;
            levelUp();
        }
    }

    draw(){
        ctx.fillStyle="#3498db";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        // HP bar
        ctx.fillStyle="red";
        ctx.fillRect(this.x-25,this.y-30,50,6);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-25,this.y-30,50*(this.hp/this.maxHp),6);
    }
}

const player = new Player();

/* ================= BULLET ================= */

class Bullet{
    constructor(x,y,dx,dy,damage,crit){
        this.x=x;
        this.y=y;
        this.dx=dx;
        this.dy=dy;
        this.speed=600;
        this.r=crit?6:4;
        this.damage=damage;
        this.crit=crit;
    }

    update(dt){
        this.x+=this.dx*this.speed*dt;
        this.y+=this.dy*this.speed*dt;
    }

    draw(){
        ctx.fillStyle=this.crit?"gold":"yellow";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

let bullets=[];

/* ================= ZOMBIE ================= */

class Zombie{
    constructor(){
        this.x=Math.random()<0.5?0:WIDTH;
        this.y=Math.random()*HEIGHT;
        this.r=18;
        this.speed=100;
        this.maxHp=50;
        this.hp=50;
    }

    update(dt){
        let angle=Math.atan2(player.y-this.y,player.x-this.x);
        this.x+=Math.cos(angle)*this.speed*dt;
        this.y+=Math.sin(angle)*this.speed*dt;

        if(Math.hypot(player.x-this.x,player.y-this.y)<player.r+this.r){
            player.hp-=30*dt;
            if(player.hp<=0){
                player.hp=0;
                triggerGameOver();
            }
        }
    }

    draw(){
        ctx.fillStyle="green";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle="red";
        ctx.fillRect(this.x-20,this.y-25,40,4);
        ctx.fillStyle="lime";
        ctx.fillRect(this.x-20,this.y-25,40*(this.hp/this.maxHp),4);
    }
}

let zombies=[];
let spawnTimer=0;

/* ================= LEVEL UP ================= */

function levelUp(){
    paused=true;
    overlay.style.visibility="visible";
    overlay.innerHTML="<h1>LEVEL UP!</h1>";

    let upgrades=[
        {text:"+20 Hasar", apply:()=>player.damage+=20},
        {text:"+%20 Ateş Hızı", apply:()=>player.fireRate*=0.8},
        {text:"+30 Max HP", apply:()=>{player.maxHp+=30; player.hp+=30}},
        {text:"+%10 Kritik", apply:()=>player.critChance+=0.1}
    ];

    upgrades.sort(()=>0.5-Math.random());
    upgrades.slice(0,3).forEach(up=>{
        let btn=document.createElement("button");
        btn.textContent=up.text;
        btn.onclick=()=>{
            up.apply();
            overlay.style.visibility="hidden";
            paused=false;
        };
        overlay.appendChild(btn);
    });
}

/* ================= GAME OVER ================= */

function triggerGameOver(){
    gameOver=true;
    overlay.style.visibility="visible";
    overlay.innerHTML="<h1>GAME OVER</h1>";

    let btn=document.createElement("button");
    btn.textContent="Yeniden Başlat";
    btn.onclick=restartGame;
    overlay.appendChild(btn);
}

function restartGame(){
    player.hp=player.maxHp;
    player.x=WIDTH/2;
    player.y=HEIGHT/2;
    player.level=1;
    player.xp=0;
    player.xpNeeded=100;
    zombies=[];
    bullets=[];
    gameOver=false;
    paused=false;
    overlay.style.visibility="hidden";
}

/* ================= LOOP ================= */

function update(timestamp){
    deltaTime=(timestamp-lastTime)/1000;
    lastTime=timestamp;

    if(!gameOver && !paused){

        player.update(deltaTime);

        spawnTimer-=deltaTime;
        if(spawnTimer<=0){
            zombies.push(new Zombie());
            spawnTimer=2;
        }

        bullets.forEach((b,i)=>{
            b.update(deltaTime);
            if(b.x<0||b.x>WIDTH||b.y<0||b.y>HEIGHT){
                bullets.splice(i,1);
            }
        });

        zombies.forEach((z,zi)=>{
            z.update(deltaTime);

            bullets.forEach((b,bi)=>{
                if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){
                    z.hp-=b.damage;
                    bullets.splice(bi,1);
                    if(z.hp<=0){
                        player.gainXP(40);
                        zombies.splice(zi,1);
                    }
                }
            });
        });
    }

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);

    bullets.forEach(b=>b.draw());
    zombies.forEach(z=>z.draw());
    player.draw();

    // XP BAR
    ctx.fillStyle="#333";
    ctx.fillRect(200,660,800,20);
    ctx.fillStyle="#9b59b6";
    ctx.fillRect(200,660,800*(player.xp/player.xpNeeded),20);

    ctx.fillStyle="white";
    ctx.fillText("Level: "+player.level,20,20);
    ctx.fillText("Ammo: "+player.ammo,20,40);
}

requestAnimationFrame(update);

</script>
</body>
</html>
