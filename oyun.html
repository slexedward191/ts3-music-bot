<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Zombie Survivor: Ultimate Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; width: 100%; }
        .stat { background: rgba(0,0,0,0.8); padding: 8px 15px; border-left: 4px solid #00ffcc; margin-bottom: 5px; font-weight: bold; width: fit-content; }
        
        #upgrade-menu {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); padding: 40px; border: 3px solid #00ffcc; text-align: center;
            z-index: 100; border-radius: 15px; box-shadow: 0 0 50px rgba(0, 255, 204, 0.2);
        }
        .upgrade-card {
            display: inline-block; width: 200px; padding: 20px; margin: 10px; background: #1a1a1a;
            border: 1px solid #444; cursor: pointer; transition: 0.3s; vertical-align: top;
        }
        .upgrade-card:hover { border-color: #00ffcc; transform: translateY(-10px); background: #252525; }
        .upgrade-card h3 { color: #00ffcc; font-size: 16px; }
        .upgrade-card p { font-size: 12px; color: #ccc; }

        #wave-screen {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; color: #ff004c; font-weight: 900; pointer-events: none; opacity: 0;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">CAN: <span id="hp">100</span></div>
    <div class="stat">DALGA: <span id="wave">1</span></div>
    <div class="stat">HASAR: <span id="dmg">25</span></div>
    <div class="stat">HIZ: <span id="spd">4</span></div>
</div>

<div id="wave-screen">DALGA BAŞLIYOR</div>

<div id="upgrade-menu">
    <h1 style="color:#00ffcc">GELİŞTİRME SEÇ</h1>
    <p>Hayatta kalmak için bir özellik seçmelisin.</p>
    <div id="cards-container"></div>
</div>

<canvas id="game"></canvas>

<script>
/** * OYUN MOTORU AYARLARI 
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Oyuncu Özellikleri (Mutable)
let stats = {
    hp: 100,
    maxHp: 100,
    speed: 4,
    damage: 25,
    fireRate: 300, // ms
    bulletSize: 5,
    lastShot: 0,
    score: 0,
    wave: 0
};

let enemies = [];
let projectiles = [];
let particles = [];
let keys = {};
let gameActive = true;
let isPaused = false;
const mouse = { x: 0, y: 0 };

// Geliştirme Havuzu
const upgrades = [
    { title: "Keskin Nişancı", desc: "Hasarı %40 artırır", action: () => stats.damage *= 1.4 },
    { title: "Hafif Ayakkabı", desc: "Koşu hızını %20 artırır", action: () => stats.speed += 0.8 },
    { title: "Seri Atış", desc: "Atış hızını %25 artırır", action: () => stats.fireRate *= 0.75 },
    { title: "Zırh Plaka", desc: "Maksimum canı 50 artırır", action: () => { stats.maxHp += 50; stats.hp += 50; } },
    { title: "Ağır Mermi", desc: "Mermi boyutunu büyütür", action: () => stats.bulletSize += 3 },
    { title: "Acil Yardım", desc: "Canını tamamen doldurur", action: () => stats.hp = stats.maxHp }
];

class Player {
    draw() {
        const angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
        
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(angle);
        
        // Silah
        ctx.fillStyle = "#333";
        ctx.fillRect(15, -6, 25, 12);
        
        // Gövde
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.fillStyle = "#00ffcc";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#00ffcc";
        ctx.fill();
        ctx.restore();
    }
}

class Enemy {
    constructor(x, y, level, isBoss = false) {
        this.x = x;
        this.y = y;
        this.isBoss = isBoss;
        this.radius = isBoss ? 60 : 20;
        this.hp = (isBoss ? 1000 : 50) + (level * 20);
        this.maxHp = this.hp;
        this.speed = isBoss ? 1 : 1.5 + (level * 0.1);
        this.color = isBoss ? "#ff004c" : `hsl(${100 - level*5}, 100%, 50%)`;
    }

    update(playerX, playerY) {
        const dx = playerX - this.x;
        const dy = playerY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        this.x += (dx/dist) * this.speed;
        this.y += (dy/dist) * this.speed;

        // Çizim
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // HP Bar
        ctx.fillStyle = "#222";
        ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, this.radius*2, 6);
        ctx.fillStyle = "#ff004c";
        ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, (this.radius*2) * (this.hp/this.maxHp), 6);
    }
}

// Mermi ve Parçacık sınıfları benzer mantıkla güncellendi...
class Bullet {
    constructor(x, y, tx, ty) {
        this.x = x; this.y = y;
        const angle = Math.atan2(ty - y, tx - x);
        this.vx = Math.cos(angle) * 12;
        this.vy = Math.sin(angle) * 12;
        this.size = stats.bulletSize;
    }
    update() { this.x += this.vx; this.y += this.vy; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
}

/** * OYUN DÖNGÜSÜ VE MANTIK 
 */

let worldX = 0, worldY = 0;

function showUpgradeMenu() {
    isPaused = true;
    const container = document.getElementById('cards-container');
    container.innerHTML = '';
    
    // Rastgele 3 kart seç
    const shuffled = [...upgrades].sort(() => 0.5 - Math.random()).slice(0, 3);
    
    shuffled.forEach(upg => {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        card.innerHTML = `<h3>${upg.title}</h3><p>${upg.desc}</p>`;
        card.onclick = () => {
            upg.action();
            document.getElementById('upgrade-menu').style.display = 'none';
            isPaused = false;
            startNextWave();
        };
        container.appendChild(card);
    });
    
    document.getElementById('upgrade-menu').style.display = 'block';
}

function startNextWave() {
    stats.wave++;
    const screen = document.getElementById('wave-screen');
    screen.innerText = `DALGA ${stats.wave}`;
    screen.style.opacity = 1;
    setTimeout(() => screen.style.opacity = 0, 2000);

    const count = 5 + (stats.wave * 4);
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const d = 800 + Math.random() * 200;
        enemies.push(new Enemy(Math.cos(angle)*d + canvas.width/2, Math.sin(angle)*d + canvas.height/2, stats.wave));
    }
    if(stats.wave % 3 === 0) enemies.push(new Enemy(0, 0, stats.wave, true));
}

function gameLoop() {
    if(!isPaused) {
        ctx.fillStyle = "rgba(5, 5, 5, 0.2)"; // Motion blur efekti
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Hareket (Dünya koordinatları üzerinden oyuncu merkezde kalır)
        if(keys['w']) worldY += stats.speed;
        if(keys['s']) worldY -= stats.speed;
        if(keys['a']) worldX += stats.speed;
        if(keys['d']) worldX -= stats.speed;

        // Düşman Yönetimi
        enemies.forEach((en, i) => {
            en.update(canvas.width/2 - worldX, canvas.height/2 - worldY);
            
            // Render düzeltmesi (Dünya kaymasına göre)
            ctx.save(); ctx.translate(worldX, worldY);
            en.update(canvas.width/2 - worldX, canvas.height/2 - worldY);
            ctx.restore();

            const d = Math.hypot(en.x + worldX - canvas.width/2, en.y + worldY - canvas.height/2);
            if(d < en.radius + 20) stats.hp -= 0.2;

            projectiles.forEach((p, pi) => {
                const pd = Math.hypot(p.x - (en.x + worldX), p.y - (en.y + worldY));
                if(pd < en.radius) {
                    en.hp -= stats.damage;
                    projectiles.splice(pi, 1);
                    if(en.hp <= 0) enemies.splice(i, 1);
                }
            });
        });

        projectiles.forEach(p => p.update());
        new Player().draw();

        // UI Güncelle
        document.getElementById('hp').innerText = Math.floor(stats.hp);
        document.getElementById('wave').innerText = stats.wave;
        document.getElementById('dmg').innerText = Math.floor(stats.damage);
        document.getElementById('spd').innerText = stats.speed.toFixed(1);

        if(enemies.length === 0 && gameActive) showUpgradeMenu();
        if(stats.hp <= 0) { alert("ÖLDÜN! Skorun: " + stats.wave); location.reload(); }
    }
    requestAnimationFrame(gameLoop);
}

// Kontroller
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => {
    const now = Date.now();
    if(now - stats.lastShot > stats.fireRate && !isPaused) {
        projectiles.push(new Bullet(canvas.width/2, canvas.height/2, mouse.x, mouse.y));
        stats.lastShot = now;
    }
};

startNextWave();
gameLoop();

</script>
</body>
</html>
