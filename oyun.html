<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emoji Arena Hardcore</title>
<style>
body{margin:0;overflow:hidden;background:#0f172a;font-family:Arial;color:white}
canvas{display:block}
#hud{position:fixed;top:10px;left:10px;font-size:14px}
#upgradePanel{
position:fixed;
right:10px;
bottom:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
width:200px;
}
.upg{
background:#1f2937;
margin:5px 0;
padding:8px;
border-radius:8px;
cursor:pointer;
}
.upg:hover{background:#374151}
#menu{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}
button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
}
button:hover{background:#16a34a}
</style>
</head>
<body>

<!-- ✅ KRAL FM TÜRKÇE POP -->
<audio id="radio">
<source src="https://dygedge.radyotvonline.net/kralfm/playlist.m3u8" type="application/x-mpegURL">
</audio>

<div id="menu">
<h1>🔥 Emoji Arena Hardcore</h1>
<button id="startBtn">Başlat</button>
</div>

<div id="hud"></div>
<div id="upgradePanel"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

window.onresize=()=>{canvas.width=innerWidth;canvas.height=innerHeight;}

let gameStarted=false;
let particles=[];
let bullets=[];
let enemies=[];
let bosses=0;

document.getElementById("startBtn").onclick=()=>{
document.getElementById("menu").style.display="none";
let radio=document.getElementById("radio");
radio.volume=0.4;
radio.play().catch(()=>{});
gameStarted=true;
};

const arena={x:100,y:100,w:canvas.width-200,h:canvas.height-200};

function rand(a,b){return Math.random()*(b-a)+a;}

let player={
x:canvas.width/2,
y:canvas.height/2,
size:25,
speed:4,
hp:100,
maxHp:100,
damage:20,
fireRate:400,
lastShot:0,
xp:0,
level:1,
score:0
};

let keys={},mouse={x:0,y:0,down:false};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
canvas.onmousemove=e=>{mouse.x=e.clientX;mouse.y=e.clientY};
canvas.onmousedown=()=>mouse.down=true;
canvas.onmouseup=()=>mouse.down=false;

function spawnEnemy(){
if(enemies.length>60)return;
let scale=1+player.level*0.3;
enemies.push({
x:rand(arena.x,arena.x+arena.w),
y:rand(arena.y,arena.y+arena.h),
size:rand(20,35),
hp:100*scale,
maxHp:100*scale,
speed:1.5+player.level*0.1,
boss:false
});
}
setInterval(()=>{if(gameStarted)spawnEnemy()},700);

function spawnBoss(){
bosses++;
let scale=player.level*4;
enemies.push({
x:rand(arena.x,arena.x+arena.w),
y:rand(arena.y,arena.y+arena.h),
size:130,
hp:2000*scale,
maxHp:2000*scale,
speed:2,
boss:true,
rage:false
});
}

function shoot(){
let now=Date.now();
if(now-player.lastShot<player.fireRate)return;
player.lastShot=now;

let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);

if(player.level<5){
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*10,
dy:Math.sin(angle)*10,
bounce:4,
enemy:false
});
}else{
for(let i=-1;i<=1;i++){
let spread=angle+i*0.25;
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(spread)*10,
dy:Math.sin(spread)*10,
bounce:4,
enemy:false
});
}
}
}

function update(){

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

player.x=Math.max(arena.x,Math.min(arena.x+arena.w,player.x));
player.y=Math.max(arena.y,Math.min(arena.y+arena.h,player.y));

if(mouse.down)shoot();

bullets.forEach((b,i)=>{
b.x+=b.dx;
b.y+=b.dy;

// DUVAR SEKMESİ
if(b.x<=arena.x||b.x>=arena.x+arena.w){b.dx*=-1;b.bounce--;}
if(b.y<=arena.y||b.y>=arena.y+arena.h){b.dy*=-1;b.bounce--;}
if(b.bounce<=0)bullets.splice(i,1);
});

enemies.forEach((e,ei)=>{
let angle=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

if(e.boss && e.hp<e.maxHp/2 && !e.rage){
e.speed*=2;
e.rage=true;
}

let dx=e.x-player.x,dy=e.y-player.y;
if(Math.sqrt(dx*dx+dy*dy)<e.size+player.size){
player.hp-=0.8;
if(player.hp<=0)gameOver();
}

bullets.forEach((b,bi)=>{
if(b.enemy)return;
let dx=e.x-b.x,dy=e.y-b.y;
if(Math.sqrt(dx*dx+dy*dy)<e.size){
e.hp-=player.damage;
bullets.splice(bi,1);
if(e.hp<=0){
player.score+=20;
player.xp+=30;
if(e.boss)bosses--;
enemies.splice(ei,1);
}
}
});

if(e.boss && Math.random()<0.015){
let a=Math.atan2(player.y-e.y,player.x-e.x);
bullets.push({
x:e.x,
y:e.y,
dx:Math.cos(a)*6,
dy:Math.sin(a)*6,
bounce:2,
enemy:true
});
}
});

bullets.forEach((b,i)=>{
if(b.enemy){
let dx=player.x-b.x,dy=player.y-b.y;
if(Math.sqrt(dx*dx+dy*dy)<player.size){
player.hp-=5;
bullets.splice(i,1);
}
}
});

if(player.xp>=player.level*150){
player.xp=0;
player.level++;
player.maxHp+=30;
player.hp=player.maxHp;
player.damage+=10;
player.fireRate=Math.max(80,player.fireRate-30);
if(player.level%7===0)spawnBoss();
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle="white";
ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

ctx.font="30px Arial";
ctx.fillText("😀",player.x-15,player.y+10);

bullets.forEach(b=>{
ctx.fillStyle=b.enemy?"purple":"yellow";
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

enemies.forEach(e=>{
ctx.fillStyle=e.boss?"purple":"red";
ctx.beginPath();
ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="green";
ctx.fillRect(e.x-e.size,e.y-e.size-10,(e.hp/e.maxHp)*e.size*2,6);
});

document.getElementById("hud").innerHTML=
"HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+player.xp+"/"+(player.level*150)+
"<br>Damage: "+player.damage+
"<br>Score: "+player.score;
}

function gameOver(){
gameStarted=false;
document.body.innerHTML+=`
<div style="
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:30px;">
💀 GAME OVER<br>
Score: ${player.score}<br><br>
<button onclick="location.reload()">Tekrar Oyna</button>
</div>`;
}

function loop(){
if(gameStarted){
update();
draw();
}
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
