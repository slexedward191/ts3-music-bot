<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emoji Arena X</title>
<style>
body{margin:0;overflow:hidden;background:#0b1020;font-family:Arial;color:white}
canvas{display:block}

#hud{position:fixed;top:10px;left:10px;font-size:14px}

#topLeft{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:20;
}

#topRight{
position:fixed;
top:10px;
right:10px;
z-index:20;
}

#upgradePanel{
position:fixed;
right:10px;
bottom:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
width:220px;
}

.upg{
background:#1f2937;
margin:5px 0;
padding:8px;
border-radius:8px;
cursor:pointer;
}
.upg:hover{background:#374151}

#menu{
position:fixed;
inset:0;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

button{
padding:10px 20px;
font-size:14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}
button:hover{background:#16a34a}

#infoBox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:30;
}
</style>
</head>
<body>

<audio id="radio" loop>
<source src="gamearea.mp3" type="audio/mpeg">
</audio>

<div id="menu">
<h1>🔥 Emoji Arena X</h1>
<button id="startBtn">Başlat</button>
</div>

<div id="topLeft">
<button onclick="location.href='../index.html'">⬅ Anasayfa</button>
<button onclick="toggleInfo()">ℹ Oyun Hakkında</button>
</div>

<div id="topRight">
Eklenti: <span id="upgradeCount">0</span>x
</div>

<div id="infoBox">
<h2>Oyun Nasıl Oynanır?</h2>
<p>
WASD = Hareket<br>
Sol Tık = Ateş<br>
Sağ Tık = Ulti (Yaratıkların %50 canını götürür)<br>
Shift = Dash<br><br>
Her 5 levelde boss gelir.<br>
Level atladıkça eklenti birikir.
</p>
<button onclick="toggleInfo()">Kapat</button>
</div>

<div id="upgradePanel"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameStarted=false;
let paused=false;
let upgradeStack=0;
let bossWave=false;

document.getElementById("startBtn").onclick=function(){
document.getElementById("menu").style.display="none";
document.getElementById("radio").play();
gameStarted=true;
};

function toggleInfo(){
paused=!paused;
document.getElementById("infoBox").style.display=paused?"flex":"none";
}

let keys={},mouse={x:0,y:0,down:false,right:false};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
canvas.addEventListener("mousedown",e=>{
if(e.button===0)mouse.down=true;
if(e.button===2){e.preventDefault();mouse.right=true;}
});
canvas.addEventListener("mouseup",e=>{
if(e.button===0)mouse.down=false;
if(e.button===2)mouse.right=false;
});
canvas.addEventListener("contextmenu",e=>e.preventDefault());

function rand(a,b){return Math.random()*(b-a)+a;}

let player={
x:canvas.width/2,
y:canvas.height/2,
size:30,
speed:4,
hp:100,
maxHp:100,
damage:20,
fireRate:400,
lastShot:0,
xp:0,
level:1,
ultiCD:0,
score:0
};

let enemies=[];
let bullets=[];
let bossBullets=[];
let particles=[];

/* ✅ EKLENEN KISIM — DÜŞMAN SPAWN */
setInterval(()=>{
if(gameStarted && !bossWave){
spawnEnemy();
}
},1000);

function spawnEnemy(){
if(bossWave)return;
enemies.push({
x:rand(0,canvas.width),
y:rand(0,canvas.height),
size:25,
hp:80,
maxHp:80,
speed:1.5,
boss:false
});
}

function spawnBoss(){
bossWave=true;
enemies=[];
enemies.push({
x:canvas.width/2,
y:100,
size:80,
hp:800,
maxHp:800,
speed:0.8,
boss:true,
shootCD:0
});
}

function shoot(){
let now=Date.now();
if(now-player.lastShot<player.fireRate)return;
player.lastShot=now;

let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
let spread = player.level>=5 ? 0.2 : 0;

[-spread,spread].forEach(offset=>{
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle+offset)*8,
dy:Math.sin(angle+offset)*8,
bounce:3
});
});
}

function ulti(){
if(player.ultiCD>0)return;
player.ultiCD=600;
enemies.forEach(e=>e.hp*=0.5);
createExplosion(player.x,player.y);
}

function createExplosion(x,y){
for(let i=0;i<40;i++){
particles.push({
x,y,
dx:rand(-4,4),
dy:rand(-4,4),
life:40
});
}
}

function update(){

if(paused)return;

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

if(mouse.down)shoot();
if(mouse.right)ulti();

if(player.ultiCD>0)player.ultiCD--;

bullets.forEach((b,i)=>{
b.x+=b.dx;
b.y+=b.dy;
if(b.x<0||b.x>canvas.width){b.dx*=-1;b.bounce--;}
if(b.y<0||b.y>canvas.height){b.dy*=-1;b.bounce--;}
if(b.bounce<=0)bullets.splice(i,1);
});

enemies.forEach((e,ei)=>{
if(!e.boss){
let ang=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(ang)*e.speed;
e.y+=Math.sin(ang)*e.speed;
}

bullets.forEach((b,bi)=>{
let dx=e.x-b.x,dy=e.y-b.y;
if(Math.sqrt(dx*dx+dy*dy)<e.size){
e.hp-=player.damage;
bullets.splice(bi,1);
if(e.hp<=0){
player.xp+=25;
player.score+=10;
enemies.splice(ei,1);
}
}
});
});

if(player.xp>=player.level*120){
player.xp=0;
player.level++;
upgradeStack++;
document.getElementById("upgradeCount").innerText=upgradeStack;
if(player.level%5===0)spawnBoss();
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.font="40px Arial";
ctx.fillText("😢",player.x-20,player.y+15);
ctx.fillText("🔫",player.x+15,player.y+10);

bullets.forEach(b=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(b.x,b.y,6,0,Math.PI*2);
ctx.fill();
});

enemies.forEach(e=>{
ctx.fillStyle=e.boss?"purple":"red";
ctx.beginPath();
ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
ctx.fill();
ctx.font="25px Arial";
ctx.fillText("🪓",e.x-10,e.y+10);
});
}

function loop(){
if(gameStarted){
update();
draw();
}
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
