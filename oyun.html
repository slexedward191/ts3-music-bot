<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lordz RPG - Fixed Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0e1a10; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background: #1a2e1c; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; display: none; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border-left: 5px solid #f1c40f; margin-bottom: 10px; }
        
        #skill-bar { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; }
        .skill {
            width: 60px; height: 60px; background: #222; border: 2px solid #555; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
            position: relative; overflow: hidden;
        }
        .skill.ready { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .cd-mask { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.7); height: 0%; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100;
        }
        button { padding: 15px 40px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold; font-size: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="status-title">LORDZ RPG</h1>
        <p>Dünya yüklenmeye hazır...</p>
        <button onclick="startGame()">OYUNU BAŞLAT</button>
    </div>

    <div id="hud">
        <div class="stat-box">
            <div>👑 SEVİYE: <span id="lvl">1</span></div>
            <div style="font-size: 12px; color: #3498db;">XP: <span id="xp">0</span></div>
        </div>
        <div class="stat-box" style="border-left-color: #e74c3c;">
            <div>❤️ CAN: <span id="hp">100</span></div>
            <div>🛡️ ORDU: <span id="army">1</span></div>
        </div>
    </div>

    <div id="skill-bar">
        <div class="skill ready" id="s1">1<div id="cd1" class="cd-mask"></div></div>
        <div class="skill ready" id="s2">2<div id="cd2" class="cd-mask"></div></div>
        <div class="skill ready" id="s3">3<div id="cd3" class="cd-mask"></div></div>
    </div>
