<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VOID PROTOCOL</title>
<style>
body{margin:0;overflow:hidden;background:#070b14;font-family:Arial}
canvas{display:block}
#ui{
position:absolute;top:10px;left:10px;
color:white;font-size:14px
}
#overlay{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
background:rgba(0,0,0,.75);
color:white;visibility:hidden
}
button{
padding:10px 20px;margin:6px;
background:#111;color:#0ff;
border:1px solid #0ff;cursor:pointer
}
button:hover{background:#0ff;color:#000}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="ui"></div>
<div id="overlay"></div>

<script>
const canvas=c;
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let keys={};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mouse={x:0,y:0};
canvas.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function rand(a,b){return Math.random()*(b-a)+a}

let time=0;
let cameraShake=0;

const player={
x:canvas.width/2,
y:canvas.height/2,
r:18,
hp:150,
maxHp:150,
speed:220,
dashCD:0,
damage:18,
fireRate:0.2,
bulletSpeed:500,
crit:0.15,
burn:0,
xp:0,
level:1,
nextXp:120,
skillPoints:0,
combo:0,
comboTimer:0
};

let bullets=[];
let enemies=[];
let dmgTexts=[];
let wave=1;
let spawnTimer=0;
let bossActive=false;
let gameOver=false;
let paused=false;

function spawnEnemy(){
let edge=Math.floor(Math.random()*4);
let x,y;
if(edge===0){x=0;y=rand(0,canvas.height)}
if(edge===1){x=canvas.width;y=rand(0,canvas.height)}
if(edge===2){x=rand(0,canvas.width);y=0}
if(edge===3){x=rand(0,canvas.width);y=canvas.height}

let type=Math.random();
let e={
x,y,
r:20,
hp:80+wave*25,
maxHp:80+wave*25,
speed:80+wave*8,
type,
burn:0
};

if(type<0.2){ e.speed*=1.8;e.r=14 } // fast
else if(type<0.4){ e.hp*=2;e.r=30 } // tank
else if(type<0.6){ e.r=18;e.speed*=1.3 } // chaser
else if(type<0.8){ e.hp*=1.5;e.speed*=0.7 } // heavy
else { e.r=26;e.hp*=1.3 } // elite

enemies.push(e);
}

function spawnBoss(){
bossActive=true;
enemies.push({
x:canvas.width/2,
y:-100,
r:60,
hp:3000+wave*300,
maxHp:3000+wave*300,
speed:40,
type:"boss",
burn:0,
patternTimer:0
});
}

function shoot(){
if(player.fireCD>0)return;
player.fireCD=player.fireRate;
let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({
x:player.x,
y:player.y,
dx:Math.cos(angle)*player.bulletSpeed,
dy:Math.sin(angle)*player.bulletSpeed,
life:2
});
cameraShake=5;
}

function dash(){
if(player.dashCD>0)return;
let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
player.x+=Math.cos(angle)*180;
player.y+=Math.sin(angle)*180;
player.dashCD=1.5;
cameraShake=15;
}

function gainXP(v){
player.combo++;
player.comboTimer=2;
player.xp+=v*(1+player.combo*0.08);
if(player.xp>=player.nextXp){
player.xp=0;
player.level++;
player.skillPoints++;
player.nextXp*=1.4;
paused=true;
showUpgrade();
}
}

function update(dt){
if(gameOver||paused)return;

time+=dt;

if(keys["w"])player.y-=player.speed*dt;
if(keys["s"])player.y+=player.speed*dt;
if(keys["a"])player.x-=player.speed*dt;
if(keys["d"])player.x+=player.speed*dt;

if(keys[" "])dash();
if(keys["f"]||keys["mouse0"])shoot();

player.fireCD=clamp(player.fireCD-dt,0,10);
player.dashCD=clamp(player.dashCD-dt,0,10);

player.comboTimer-=dt;
if(player.comboTimer<=0)player.combo=0;

bullets.forEach((b,i)=>{
b.x+=b.dx*dt;
b.y+=b.dy*dt;
b.life-=dt;
if(b.life<=0)bullets.splice(i,1);
});

enemies.forEach((e,i)=>{
if(e.type==="boss"){
e.patternTimer+=dt;
if(e.patternTimer>3){
for(let a=0;a<Math.PI*2;a+=Math.PI/8){
bullets.push({
x:e.x,y:e.y,
dx:Math.cos(a)*250,
dy:Math.sin(a)*250,
life:3
});
}
e.patternTimer=0;
}
}

let angle=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(angle)*e.speed*dt;
e.y+=Math.sin(angle)*e.speed*dt;

if(e.burn>0){
e.hp-=10*dt;
e.burn-=dt;
}

let dist=Math.hypot(e.x-player.x,e.y-player.y);
if(dist<e.r+player.r){
player.hp-=40*dt;
cameraShake=8;
if(player.hp<=0)endGame();
}
});

bullets.forEach((b,bi)=>{
enemies.forEach((e,ei)=>{
if(Math.hypot(b.x-e.x,b.y-e.y)<e.r){
let dmg=player.damage;
if(Math.random()<player.crit)dmg*=2;
if(player.burn>0)e.burn=2;
e.hp-=dmg;
dmgTexts.push({x:e.x,y:e.y,text:Math.floor(dmg),life:1});
bullets.splice(bi,1);
if(e.hp<=0){
gainXP(50);
cameraShake=10;
if(e.type==="boss"){bossActive=false;wave++}
enemies.splice(ei,1);
}
}
});
});

spawnTimer-=dt;
if(spawnTimer<=0 && !bossActive){
spawnEnemy();
spawnTimer=1.2-Math.min(wave*0.05,0.8);
}

if(wave%5===0 && !bossActive){
spawnBoss();
}

dmgTexts.forEach((d,i)=>{
d.y-=30*dt;
d.life-=dt;
if(d.life<=0)dmgTexts.splice(i,1);
});
}

function draw(){
ctx.save();
ctx.translate(rand(-cameraShake,cameraShake),rand(-cameraShake,cameraShake));
ctx.fillStyle="rgba(7,11,20,.4)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fillStyle="#0ff";
ctx.fill();

bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,4,0,Math.PI*2);
ctx.fillStyle="#ff0";
ctx.fill();
});

enemies.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fillStyle=e.type==="boss"?"purple":"red";
ctx.fill();

ctx.fillStyle="lime";
ctx.fillRect(e.x-e.r,e.y-e.r-8,(e.hp/e.maxHp)*e.r*2,4);
});

dmgTexts.forEach(d=>{
ctx.fillStyle="white";
ctx.fillText(d.text,d.x,d.y);
});

ctx.restore();
cameraShake*=0.9;

document.getElementById("ui").innerHTML=
"HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+Math.floor(player.xp)+"/"+Math.floor(player.nextXp)+
"<br>Wave: "+wave+
"<br>Combo: "+player.combo+
"<br>Skill Points: "+player.skillPoints;
}

function showUpgrade(){
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h2>LEVEL UP</h2>"+
"<button onclick='upgrade(\"damage\")'>+Damage</button>"+
"<button onclick='upgrade(\"speed\")'>+Speed</button>"+
"<button onclick='upgrade(\"firerate\")'>+Fire Rate</button>"+
"<button onclick='upgrade(\"crit\")'>+Crit</button>"+
"<button onclick='upgrade(\"burn\")'>Burn Bullets</button>";
}

function upgrade(s){
player.skillPoints--;
if(s==="damage")player.damage+=6;
if(s==="speed")player.speed+=30;
if(s==="firerate")player.fireRate*=0.85;
if(s==="crit")player.crit+=0.05;
if(s==="burn")player.burn=1;
document.getElementById("overlay").style.visibility="hidden";
paused=false;
}

function endGame(){
gameOver=true;
let o=document.getElementById("overlay");
o.style.visibility="visible";
o.innerHTML="<h1>GAME OVER</h1>"+
"<p>Level: "+player.level+"</p>"+
"<button onclick='location.reload()'>Restart</button>";
}

let last=0;
function loop(t){
let dt=(t-last)/1000;
last=t;
update(dt);
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
