<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oyun</title>
<style>
body{
margin:0;
background:#111;
font-family:Arial, sans-serif;
overflow:hidden;
}

.center-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:48px;
font-weight:bold;
color:#ff4444;
text-shadow:0 0 20px red;
text-align:center;
}

.home-button{
position:absolute;
top:20px;
left:20px;
padding:12px 20px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
box-shadow:0 0 10px #00c6ff;
transition:0.2s;
}

.home-button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00c6ff;
}
</style>
</head>
<body>

<button class="home-button" onclick="goHome()">🏠 Anasayfaya Dön</button>

<div class="center-text">
BAKIMDA<br>HENÜZ YAPILMADI
</div>

<script>
function goHome(){
window.location.href="index.html"; 
}
</script>

</body>
</html>
