<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #003366; overflow: hidden; color: white; font-family: Arial; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Okyanus Avı</h1>
        <p>Puan: <span id="score">0</span></p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    const fishList = [];
    const fishTypes = [
        { name: "Palyaço Balığı", color: "orange", speed: 2, size: 20 },
        { name: "Köpekbalığı", color: "gray", speed: 4, size: 50 },
        { name: "Vatoz", color: "darkblue", speed: 1.5, size: 40 }
    ];

    class Fish {
        constructor() {
            this.type = fishTypes[Math.floor(Math.random() * fishTypes.length)];
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * this.type.speed * 2;
        }
        draw() {
            ctx.fillStyle = this.type.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.type.size, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.x += this.vx;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        }
    }

    // Balıkları oluştur
    for(let i=0; i<10; i++) fishList.push(new Fish());

    canvas.addEventListener('click', (e) => {
        // Oltayı atma mekaniği: Tıklanan noktaya en yakın balığı bul
        fishList.forEach((fish, index) => {
            const dist = Math.hypot(e.clientX - fish.x, e.clientY - fish.y);
            if(dist < 50) {
                score += 10;
                document.getElementById('score').innerText = score;
                fishList.splice(index, 1);
                fishList.push(new Fish()); // Yeni balık ekle
            }
        });
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fishList.forEach(f => { f.update(); f.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
