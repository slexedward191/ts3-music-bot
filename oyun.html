<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NEON SURVIVOR: PRO-EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --danger: #ff004c; --gold: #ffcc00; --void: #020205; }
        body { margin: 0; overflow: hidden; background: var(--void); font-family: 'Orbitron', sans-serif; color: #fff; user-select: none; }
        canvas { display: block; margin: 0 auto; background: #000; }

        /* --- UI OVERLAY --- */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; padding: 20px; }
        
        /* Sağ Alt Envanter (Eklentiler) */
        #inventory { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; flex-wrap: wrap; max-width: 300px; justify-content: flex-end; }
        .inv-slot { width: 45px; height: 45px; border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.1); }

        /* Gelişmiş Seçim Ekranı */
        #upgrade-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; pointer-events: all; backdrop-filter: blur(10px); }
        .upgrade-container { display: flex; gap: 30px; margin-top: 40px; }
        .up-card { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--neon); background: rgba(0,242,255,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; padding: 20px; box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        .up-card:hover { transform: scale(1.1) rotate(5deg); background: var(--neon); color: #000; box-shadow: 0 0 50px var(--neon); }
        .up-card h4 { margin: 10px 0 5px 0; font-size: 14px; }
        .up-card p { font-size: 10px; font-family: sans-serif; font-weight: bold; }

        /* Klasik HUD Elemanları */
        .bar-container { width: 250px; height: 10px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #333; margin: 5px 0; }
        .fill { height: 100%; transition: width 0.3s; }
        #hp-fill { background: var(--danger); }
        #xp-fill { background: var(--neon); }
        #wave-announcer { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); opacity: 0; transition: 0.5s; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="hud">
        <div class="bar-container"><div id="hp-fill" class="fill" style="width: 100%;"></div></div>
        <div class="bar-container"><div id="xp-fill" class="fill" style="width: 0%;"></div></div>
        <div style="font-size: 12px; color: var(--neon);">DALGA: <span id="wave-txt">1</span> | SKOR: <span id="score-txt">0</span></div>
    </div>
    <div id="wave-announcer">DALGA 1</div>
    <div id="inventory"></div>
</div>

<div id="upgrade-modal">
    <h1 style="letter-spacing: 10px;">GELİŞTİRME SEÇ</h1>
    <div class="upgrade-container" id="up-options"></div>
</div>

<canvas id="game"></canvas>

<script>
/** 🔊 PROFESYONEL SES MOTORU **/
const SFX = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(f, t, d, v, slide = 0) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
        if(slide) o.frequency.exponentialRampToValueAtTime(slide, this.ctx.currentTime + d);
        g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + d);
    },
    shoot() { this.play(400, 'square', 0.1, 0.03, 100); },
    hit() { this.play(100, 'sawtooth', 0.1, 0.05); },
    bossSpawn() { // Tok ve korkutucu zombi/canavar efekti
        this.play(80, 'sawtooth', 1.5, 0.15, 20);
        this.play(60, 'sine', 1.0, 0.1, 10);
    },
    levelUp() { this.play(600, 'sine', 0.5, 0.1, 900); }
};

/** ⚙️ OYUN AYARLARI **/
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1000; canvas.height = 700;

let player, enemies = [], bullets = [], particles = [], gems = [], inventory = [];
let wave = 0, score = 0, isPaused = false, frame = 0;
const keys = {}; const mouse = { x: 0, y: 0, down: false };

const UPGRADES = [
    { id: 'dmg', n: 'GÜÇ', d: '+%20 Hasar', c: '#ff004c', f: () => player.dmg *= 1.2 },
    { id: 'spd', n: 'HIZ', d: '+%15 Hareket', c: '#00f2ff', f: () => player.speed *= 1.15 },
    { id: 'rate', n: 'SERİ', d: '-%15 Bekleme', c: '#ffcc00', f: () => player.rate *= 0.85 },
    { id: 'hp', n: 'ZIRH', d: '+30 Maks HP', c: '#76ff03', f: () => { player.maxHp += 30; player.hp = player.maxHp; } },
    { id: 'size', n: 'MENZİL', d: '+%20 Mermi', c: '#bd00ff', f: () => player.bSize *= 1.2 }
];

class Player {
    constructor() {
        this.x = 500; this.y = 350; this.r = 18; this.hp = 100; this.maxHp = 100;
        this.xp = 0; this.nextXp = 100; this.speed = 4; this.rate = 300; this.lastFire = 0;
        this.dmg = 25; this.bSize = 4;
    }
    update() {
        if(keys['w'] && this.y > this.r) this.y -= this.speed;
        if(keys['s'] && this.y < 700 - this.r) this.y += this.speed;
        if(keys['a'] && this.x > this.r) this.x -= this.speed;
        if(keys['d'] && this.x < 1000 - this.r) this.x += this.speed;
        if(mouse.down && Date.now() - this.lastFire > this.rate) {
            const ang = Math.atan2(mouse.y - (canvas.offsetTop + this.y), mouse.x - (canvas.offsetLeft + this.x));
            bullets.push({x: this.x, y: this.y, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10});
            this.lastFire = Date.now(); SFX.shoot();
        }
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,-12); ctx.lineTo(-10,12); ctx.closePath(); ctx.stroke();
        ctx.restore();
    }
}

class Enemy {
    constructor(isBoss = false) {
        this.isBoss = isBoss; this.r = isBoss ? 60 : 20;
        this.hp = (isBoss ? 1000 : 50) + (wave * 20);
        this.maxHp = this.hp; this.speed = isBoss ? 1.5 : 2 + Math.random();
        const ang = Math.random() * Math.PI * 2;
        this.x = 500 + Math.cos(ang) * 700; this.y = 350 + Math.sin(ang) * 700;
    }
    update() {
        const ang = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(ang) * this.speed; this.y += Math.sin(ang) * this.speed;
        ctx.strokeStyle = this.isBoss ? '#ff004c' : '#76ff03';
        ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.stroke();
    }
}

/** 🚀 LOGIC **/

function showUpgradeMenu() {
    isPaused = true;
    const modal = document.getElementById('upgrade-modal');
    const container = document.getElementById('up-options');
    container.innerHTML = '';
    modal.style.display = 'flex';
    SFX.levelUp();

    // Rastgele 3 seçenek
    [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3).forEach(up => {
        const card = document.createElement('div');
        card.className = 'up-card';
        card.style.borderColor = up.c;
        card.innerHTML = `<h4>${up.n}</h4><p>${up.d}</p>`;
        card.onclick = () => {
            up.f(); inventory.push(up);
            updateInventoryUI();
            modal.style.display = 'none';
            isPaused = false;
        };
        container.appendChild(card);
    });
}

function updateInventoryUI() {
    const inv = document.getElementById('inventory');
    inv.innerHTML = '';
    inventory.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.style.borderColor = item.c;
        slot.innerText = item.id.toUpperCase();
        inv.appendChild(slot);
    });
}

function nextWave() {
    wave++;
    const ann = document.getElementById('wave-announcer');
    ann.innerText = `DALGA ${wave}`; ann.style.opacity = 1;
    setTimeout(() => ann.style.opacity = 0, 1500);

    let count = 5 + wave * 2;
    for(let i=0; i<count; i++) enemies.push(new Enemy(false));
    
    // 5 ve katlarında Boss
    if(wave % 5 === 0) {
        enemies.push(new Enemy(true));
        SFX.bossSpawn();
    }
}

function gameLoop() {
    if(!isPaused) {
        ctx.fillStyle = 'rgba(2,2,5,0.3)'; ctx.fillRect(0,0,1000,700);
        
        player.update(); player.draw();

        bullets.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, player.bSize, 0, Math.PI*2); ctx.fill();
            if(b.x<0 || b.x>1000 || b.y<0 || b.y>700) bullets.splice(bi, 1);

            enemies.forEach((en, ei) => {
                if(Math.hypot(b.x-en.x, b.y-en.y) < en.r) {
                    en.hp -= player.dmg; bullets.splice(bi, 1); SFX.hit();
                    if(en.hp <= 0) {
                        score += en.isBoss ? 1000 : 100;
                        player.xp += en.isBoss ? 100 : 25;
                        enemies.splice(ei, 1);
                        if(player.xp >= player.nextXp) {
                            player.xp = 0; player.nextXp *= 1.2;
                            showUpgradeMenu();
                        }
                    }
                }
            });
        });

        enemies.forEach(en => {
            en.update();
            if(Math.hypot(en.x-player.x, en.y-player.y) < en.r + player.r) {
                player.hp -= 0.5;
                if(player.hp <= 0) location.reload();
            }
        });

        if(enemies.length === 0) nextWave();

        document.getElementById('hp-fill').style.width = (player.hp/player.maxHp*100)+'%';
        document.getElementById('xp-fill').style.width = (player.xp/player.nextXp*100)+'%';
        document.getElementById('wave-txt').innerText = wave;
        document.getElementById('score-txt').innerText = score;
    }
    requestAnimationFrame(gameLoop);
}

// Input & Start
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => { mouse.down = true; SFX.ctx.resume(); };
window.onmouseup = () => mouse.down = false;

player = new Player();
nextWave();
gameLoop();
</script>
</body>
</html>
