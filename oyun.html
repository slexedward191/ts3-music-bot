<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Arena</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#0f172a;
  font-family:Arial;
}

canvas{
  display:block;
}

.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  font-weight: bold;
  z-index: 1000;
}

.score{
  position:fixed;
  top:20px;
  right:20px;
  color:white;
  font-weight:bold;
}

.game-over{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  text-align:center;
  color:white;
  display:none;
}

.game-over button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:#22c55e;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
<div class="score" id="score">Skor: 0</div>
<div class="game-over" id="gameOver">
  <h2>Oyun Bitti</h2>
  <p id="finalScore"></p>
  <button onclick="resetGame()">Tekrar Oyna</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: canvas.width/2,
  y: canvas.height/2,
  radius: 25,
  speed: 4
};

let bullets = [];
let enemies = [];
let keys = {};
let mouse = {x:0,y:0};
let score = 0;
let enemySpeed = 1.5;
let gameRunning = true;

document.addEventListener("keydown", e=> keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);
document.addEventListener("mousemove", e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
document.addEventListener("click", shoot);

function shoot(){
  if(!gameRunning) return;

  let angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);

  bullets.push({
    x:player.x,
    y:player.y,
    dx:Math.cos(angle)*7,
    dy:Math.sin(angle)*7
  });
}

function spawnEnemy(){
  let edge = Math.floor(Math.random()*4);
  let x,y;

  if(edge===0){ x=0; y=Math.random()*canvas.height; }
  if(edge===1){ x=canvas.width; y=Math.random()*canvas.height; }
  if(edge===2){ x=Math.random()*canvas.width; y=0; }
  if(edge===3){ x=Math.random()*canvas.width; y=canvas.height; }

  enemies.push({x,y});
}

function update(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Hareket
  if(keys["w"]) player.y -= player.speed;
  if(keys["s"]) player.y += player.speed;
  if(keys["a"]) player.x -= player.speed;
  if(keys["d"]) player.x += player.speed;

  // Oyuncu çiz
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
  ctx.fillStyle="#22c55e";
  ctx.fill();

  // Silah yönü
  let angle = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(player.x + Math.cos(angle)*40, player.y + Math.sin(angle)*40);
  ctx.strokeStyle="white";
  ctx.lineWidth=5;
  ctx.stroke();

  // Mermiler
  bullets.forEach((b,i)=>{
    b.x += b.dx;
    b.y += b.dy;

    ctx.beginPath();
    ctx.arc(b.x,b.y,5,0,Math.PI*2);
    ctx.fillStyle="#38bdf8";
    ctx.fill();

    enemies.forEach((e,j)=>{
      let dist = Math.hypot(b.x-e.x,b.y-e.y);
      if(dist < 20){
        enemies.splice(j,1);
        bullets.splice(i,1);
        score++;
        document.getElementById("score").innerText="Skor: "+score;
      }
    });
  });

  // Düşmanlar
  enemies.forEach((e,i)=>{
    let angle = Math.atan2(player.y-e.y, player.x-e.x);
    e.x += Math.cos(angle)*enemySpeed;
    e.y += Math.sin(angle)*enemySpeed;

    ctx.beginPath();
    ctx.arc(e.x,e.y,20,0,Math.PI*2);
    ctx.fillStyle="#ef4444";
    ctx.fill();

    let dist = Math.hypot(player.x-e.x,player.y-e.y);
    if(dist < player.radius+20){
      endGame();
    }
  });

  requestAnimationFrame(update);
}

function endGame(){
  gameRunning=false;
  document.getElementById("gameOver").style.display="block";
  document.getElementById("finalScore").innerText="Skor: "+score;
}

function resetGame(){
  bullets=[];
  enemies=[];
  score=0;
  enemySpeed=1.5;
  player.x=canvas.width/2;
  player.y=canvas.height/2;
  document.getElementById("score").innerText="Skor: 0";
  document.getElementById("gameOver").style.display="none";
  gameRunning=true;
  update();
}

setInterval(()=>{
  if(gameRunning){
    spawnEnemy();
    enemySpeed += 0.05;
  }
},1000);

update();
</script>

</body>
</html>
