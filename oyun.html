<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Derby Tycoon: Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --grass: #27ae60; --dirt: #e67e22; --gold: #f1c40f; --ui-bg: rgba(0,0,0,0.85); }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #2c3e50; font-family: 'Montserrat', sans-serif; }
        
        /* UI Katmanları */
        #game-ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .panel { background: var(--ui-bg); border: 2px solid var(--gold); padding: 20px; pointer-events: all; border-radius: 12px; }
        
        /* Bahis Ekranı */
        #betting-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; text-align: center; }
        .horse-option { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.1); margin: 10px 0; padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .horse-option:hover { background: var(--gold); color: #000; }
        .horse-option.selected { border: 2px solid var(--gold); background: rgba(241, 196, 15, 0.3); }

        /* Yarış İçi HUD */
        #hud { position: absolute; top: 20px; left: 20px; display: flex; gap: 20px; }
        .stat-box { background: var(--ui-bg); color: #fff; padding: 10px 20px; border-radius: 30px; border: 1px solid var(--gold); }

        /* Atlar ve Pist */
        #track-container { position: relative; width: 100%; height: 100vh; background: var(--grass); overflow: hidden; display: none; }
        .finish-line { position: absolute; right: 100px; top: 0; bottom: 0; width: 40px; background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px); border-left: 5px solid #ff0000; }

        .btn { background: var(--gold); border: none; padding: 10px 30px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 5px; font-family: 'Oswald'; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        #result-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="game-ui">
    <div id="betting-panel" class="panel">
        <h1 style="color: var(--gold); font-family: 'Oswald'; font-size: 40px; margin: 0 0 20px 0;">GAZİ KOŞUSU SIMULATOR</h1>
        <div id="balance-display" style="color: #fff; font-size: 24px; margin-bottom: 20px;">Bakiyeniz: 🪙<span id="player-money">1000</span></div>
        <div id="horse-list"></div>
        <div style="margin-top: 20px;">
            <input type="number" id="bet-amount" value="100" min="10" style="padding: 10px; border-radius: 5px; border: none; width: 100px;">
            <button class="btn" id="start-race-btn" onclick="Game.startRace()">YARIŞI BAŞLAT</button>
        </div>
    </div>

    <div id="hud">
        <div class="stat-box">KOŞU: <span id="race-status">BEKLENİYOR</span></div>
        <div class="stat-box">BAKİYE: 🪙<span id="hud-money">1000</span></div>
    </div>
</div>

<div id="track-container">
    <div class="finish-line"></div>
    <div id="horses-layer"></div>
</div>

<div id="result-screen">
    <h1 id="result-title" style="font-size: 60px; color: var(--gold);">1. ŞAHBATUR!</h1>
    <p id="payout-info" style="font-size: 30px; color: #fff;"></p>
    <button class="btn" onclick="Game.reset()">YENİ YARIŞ</button>
</div>

<script>
/**
 * DERBY ENGINE PRO
 */
const Game = {
    money: 1000,
    selectedHorse: null,
    betAmount: 0,
    horses: [
        { id: 0, name: "Şahbatur", color: "#e74c3c", speed: 0.8, stamina: 0.9, odds: 2.1 },
        { id: 1, name: "Bold Pilot", color: "#3498db", speed: 0.95, stamina: 0.7, odds: 1.8 },
        { id: 2, name: "Gülbatur", color: "#9b59b6", speed: 0.7, stamina: 0.95, odds: 3.5 },
        { id: 3, name: "Yelkenli", color: "#f1c40f", speed: 0.85, stamina: 0.8, odds: 2.5 },
        { id: 4, name: "Karayel", color: "#2ecc71", speed: 0.75, stamina: 0.85, odds: 3.0 }
    ],
    horseElements: [],
    isRacing: false,

    init() {
        const list = document.getElementById('horse-list');
        this.horses.forEach(h => {
            const div = document.createElement('div');
            div.className = 'horse-option';
            div.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <div style="width:20px; height:20px; background:${h.color}; margin-right:15px; border-radius:50%;"></div>
                    <strong>${h.name}</strong>
                </div>
                <span>Çarpan: x${h.odds} | Hız: %${h.speed*100}</span>
            `;
            div.onclick = () => this.selectHorse(h.id, div);
            list.appendChild(div);
        });
    },

    selectHorse(id, el) {
        this.selectedHorse = id;
        document.querySelectorAll('.horse-option').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
    },

    startRace() {
        this.betAmount = parseInt(document.getElementById('bet-amount').value);
        if(this.selectedHorse === null || this.betAmount > this.money || this.betAmount <= 0) {
            alert("Lütfen geçerli bir bahis yapın!");
            return;
        }

        this.money -= this.betAmount;
        this.updateUI();
        document.getElementById('betting-panel').style.display = 'none';
        document.getElementById('track-container').style.display = 'block';
        this.prepareTrack();
        this.isRacing = true;
        this.raceLoop();
    },

    prepareTrack() {
        const layer = document.getElementById('horses-layer');
        layer.innerHTML = '';
        this.horseElements = [];
        
        const trackHeight = window.innerHeight / this.horses.length;

        this.horses.forEach((h, i) => {
            const lane = document.createElement('div');
            lane.style.position = 'absolute';
            lane.style.top = (i * trackHeight) + 'px';
            lane.style.width = '100%';
            lane.style.height = trackHeight + 'px';
            lane.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
            lane.style.background = i % 2 === 0 ? 'rgba(0,0,0,0.05)' : 'transparent';
            
            const horse = document.createElement('div');
            horse.style.position = 'absolute';
            horse.style.left = '20px';
            horse.style.top = (trackHeight/2 - 20) + 'px';
            horse.style.width = '60px';
            horse.style.height = '40px';
            horse.style.background = h.color;
            horse.style.borderRadius = '5px';
            horse.style.display = 'flex';
            horse.style.alignItems = 'center';
            horse.style.justifyContent = 'center';
            horse.style.fontWeight = 'bold';
            horse.style.color = '#fff';
            horse.style.fontSize = '12px';
            horse.innerText = h.name.substring(0,2).toUpperCase();
            horse.style.boxShadow = '0 5px 15px rgba(0,0,0,0.3)';

            lane.appendChild(horse);
            layer.appendChild(lane);
            
            this.horseElements.push({
                id: h.id,
                el: horse,
                pos: 20,
                speedBase: h.speed,
                stamina: h.stamina,
                currentSpeed: 0
            });
        });
    },

    raceLoop() {
        if(!this.isRacing) return;

        let winner = null;
        const finishLine = window.innerWidth - 150;

        this.horseElements.forEach(h => {
            // İleri matematiksel hız simülasyonu (rastgelelik + stamina etkisi)
            const noise = Math.random() * 2;
            const staminaEffect = (1 - (h.pos / finishLine)) * h.stamina;
            h.currentSpeed = (h.speedBase * 5) + noise + staminaEffect;
            
            h.pos += h.currentSpeed;
            h.el.style.left = h.pos + 'px';

            // Kazanan kontrolü
            if(h.pos >= finishLine && !winner) {
                winner = this.horses.find(x => x.id === h.id);
            }
        });

        if(winner) {
            this.isRacing = false;
            this.finishRace(winner);
        } else {
            requestAnimationFrame(() => this.raceLoop());
        }
    },

    finishRace(winner) {
        setTimeout(() => {
            const screen = document.getElementById('result-screen');
            const title = document.getElementById('result-title');
            const info = document.getElementById('payout-info');
            
            screen.style.display = 'flex';
            title.innerText = `1. ${winner.name.toUpperCase()}!`;
            
            if(winner.id === this.selectedHorse) {
                const winAmount = Math.floor(this.betAmount * winner.odds);
                this.money += winAmount;
                title.style.color = "#2ecc71";
                info.innerText = `TEBRİKLER! 🪙${winAmount} kazandınız.`;
            } else {
                title.style.color = "#e74c3c";
                info.innerText = `KAYBETTİNİZ! Bahis yattı.`;
            }
            this.updateUI();
        }, 1000);
    },

    reset() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('track-container').style.display = 'none';
        document.getElementById('betting-panel').style.display = 'block';
        this.selectedHorse = null;
        document.querySelectorAll('.horse-option').forEach(x => x.classList.remove('selected'));
        if(this.money < 10) {
            alert("İflas ettiniz! Kaptan size 500 kredi hibe etti.");
            this.money = 500;
            this.updateUI();
        }
    },

    updateUI() {
        document.getElementById('player-money').innerText = this.money;
        document.getElementById('hud-money').innerText = this.money;
    }
};

Game.init();
</script>
</body>
</html>
