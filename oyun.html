<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SURVIVOR ZERO: ULTIMATE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: #fff; }
        canvas { display: block; cursor: crosshair; }
        
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .bar-container { width: 250px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid #333; margin-bottom: 10px; border-radius: 6px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff004c, #ff5e00); transition: 0.3s; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #006aff); transition: 0.3s; }
        
        #stats { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #444; backdrop-filter: blur(5px); }
        .stat-line { font-size: 14px; margin: 3px 0; color: #aaa; }
        .stat-line span { color: #00ffcc; font-weight: bold; }

        #upgrade-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .cards-wrapper { display: flex; gap: 20px; margin-top: 30px; }
        .card {
            width: 220px; background: #1a1a1a; border: 2px solid #333; padding: 25px;
            border-radius: 15px; cursor: pointer; text-align: center; transition: all 0.3s;
        }
        .card:hover { border-color: #00ffcc; transform: translateY(-15px); box-shadow: 0 0 30px rgba(0,255,204,0.3); }
        .card h3 { margin: 0 0 10px 0; color: #00ffcc; }
        .card p { font-size: 13px; color: #888; line-height: 1.5; }

        #weapon-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .slot { width: 50px; height: 50px; background: rgba(0,0,0,0.7); border: 2px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .slot.active { border-color: #fff; box-shadow: 0 0 15px #fff; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .boss-warning { position: absolute; top: 20%; width: 100%; text-align: center; color: #ff004c; font-size: 50px; font-weight: 900; animation: pulse 0.5s infinite; display: none; }
    </style>
</head>
<body>

<div id="hud">
    <div class="bar-container"><div id="hp-bar"></div></div>
    <div class="bar-container"><div id="xp-bar"></div></div>
    <div id="stats">
        <div class="stat-line">DALGA: <span id="ui-wave">1</span></div>
        <div class="stat-line">SEVİYE: <span id="ui-lvl">1</span></div>
        <div class="stat-line">SİLAH: <span id="ui-weapon">TABANCA</span></div>
    </div>
</div>

<div class="boss-warning" id="boss-alert">BOSS YAKLAŞIYOR!</div>

<div id="upgrade-overlay">
    <h1 style="font-size: 40px; letter-spacing: 5px;">GELİŞTİRME SEÇ</h1>
    <div class="cards-wrapper" id="cards-container"></div>
</div>

<div id="weapon-dock">
    <div class="slot active" id="slot-1">1</div>
    <div class="slot" id="slot-2">2</div>
    <div class="slot" id="slot-3">3</div>
</div>

<canvas id="game"></canvas>

<script>
/** * OYUN AYARLARI & GLOBAL DEĞİŞKENLER
 */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, enemies, projectiles, particles, loots;
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let frame = 0;
let isPaused = false;
let screenShake = 0;

// Oyun Durumu
const gameState = {
    wave: 0,
    lvl: 1,
    xp: 0,
    nextLvlXp: 100,
    weaponType: 'pistol', // pistol, shotgun, smg
    worldX: 0,
    worldY: 0
};

// Silah Konfigürasyonları
const WEAPONS = {
    pistol: { dmg: 35, speed: 12, rate: 400, spread: 0, count: 1, color: '#fff' },
    shotgun: { dmg: 20, speed: 10, rate: 800, spread: 0.3, count: 6, color: '#ffcc00' },
    smg: { dmg: 15, speed: 15, rate: 100, spread: 0.1, count: 1, color: '#00f2ff' }
};

/**
 * NESNE SINIFLARI
 */

class Player {
    constructor() {
        this.x = canvas.width/2;
        this.y = canvas.height/2;
        this.r = 20;
        this.hp = 100;
        this.maxHp = 100;
        this.speed = 4.5;
        this.lastShot = 0;
    }

    update() {
        // Hareket Mantığı
        if(keys['w']) gameState.worldY += this.speed;
        if(keys['s']) gameState.worldY -= this.speed;
        if(keys['a']) gameState.worldX += this.speed;
        if(keys['d']) gameState.worldX -= this.speed;

        // Ateş Etme
        if(mouse.down) this.shoot();

        this.draw();
    }

    draw() {
        const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);
        
        // Gövde
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fillStyle = '#00f2ff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00f2ff';
        ctx.fill();
        
        // Silah Namlusu
        ctx.fillStyle = '#333';
        ctx.fillRect(15, -5, 25, 10);
        ctx.restore();
    }

    shoot() {
        const now = Date.now();
        const w = WEAPONS[gameState.weaponType];
        if(now - this.lastShot > w.rate) {
            screenShake = 5;
            for(let i=0; i < w.count; i++) {
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x) + (Math.random() - 0.5) * w.spread;
                projectiles.push(new Bullet(this.x, this.y, angle, w));
            }
            this.lastShot = now;
        }
    }
}

class Enemy {
    constructor(x, y, type = 'normal') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.r = type === 'boss' ? 70 : 22;
        this.hp = type === 'boss' ? 1500 + (gameState.wave * 500) : 50 + (gameState.wave * 15);
        this.maxHp = this.hp;
        this.speed = type === 'boss' ? 1.2 : 2 + Math.random();
        this.color = type === 'boss' ? '#ff004c' : '#76ff03';
    }

    update() {
        // AI: Oyuncuya yönel ama hafif sapmalarla (sürü mantığı)
        const targetX = canvas.width/2 - gameState.worldX;
        const targetY = canvas.height/2 - gameState.worldY;
        const angle = Math.atan2(targetY - this.y, targetX - this.x);
        
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;

        this.draw();
    }

    draw() {
        const drawX = this.x + gameState.worldX;
        const drawY = this.y + gameState.worldY;

        ctx.beginPath();
        ctx.arc(drawX, drawY, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fill();

        // Health Bar
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(drawX - this.r, drawY - this.r - 15, this.r*2, 6);
        ctx.fillStyle = '#ff004c';
        ctx.fillRect(drawX - this.r, drawY - this.r - 15, (this.r*2) * (this.hp/this.maxHp), 6);
    }
}

class Bullet {
    constructor(x, y, angle, config) {
        this.x = x - gameState.worldX;
        this.y = y - gameState.worldY;
        this.vx = Math.cos(angle) * config.speed;
        this.vy = Math.sin(angle) * config.speed;
        this.dmg = config.dmg;
        this.color = config.color;
        this.life = 100;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
        
        ctx.beginPath();
        ctx.arc(this.x + gameState.worldX, this.y + gameState.worldY, 4, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

class Loot {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.r = 8;
        this.color = '#00f2ff';
    }
    draw() {
        const dx = this.x + gameState.worldX;
        const dy = this.y + gameState.worldY;
        ctx.beginPath();
        ctx.arc(dx, dy, this.r + Math.sin(frame/10)*3, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

/**
 * OYUN MANTIĞI FONKSİYONLARI
 */

function init() {
    player = new Player();
    enemies = [];
    projectiles = [];
    particles = [];
    loots = [];
    spawnWave();
    animate();
}

function spawnWave() {
    gameState.wave++;
    if(gameState.wave % 5 === 0) {
        document.getElementById('boss-alert').style.display = 'block';
        setTimeout(() => {
            enemies.push(new Enemy(Math.random()*2000 - 1000, -1000, 'boss'));
            document.getElementById('boss-alert').style.display = 'none';
        }, 3000);
    }

    for(let i=0; i < 5 + (gameState.wave * 3); i++) {
        const ang = Math.random() * Math.PI*2;
        const dist = 1000 + Math.random()*500;
        enemies.push(new Enemy(Math.cos(ang)*dist, Math.sin(ang)*dist));
    }
}

function showUpgrade() {
    isPaused = true;
    const overlay = document.getElementById('upgrade-overlay');
    const container = document.getElementById('cards-container');
    overlay.style.display = 'flex';
    container.innerHTML = '';

    const opts = [
        { t: "POMPALI TÜFEK", d: "Geniş alan hasarı verir.", a: () => { gameState.weaponType = 'shotgun'; switchSlot(2); }},
        { t: "HIZLI SMG", d: "Çok hızlı ateş eder.", a: () => { gameState.weaponType = 'smg'; switchSlot(3); }},
        { t: "ZIRH TAKVİYESİ", d: "Canını ve savunmanı artırır.", a: () => { player.maxHp += 50; player.hp = player.maxHp; }},
        { t: "HİPER HIZ", d: "Hareket hızını %30 artırır.", a: () => { player.speed *= 1.3; }},
        { t: "ADRENALİN", d: "Tüm silahların hasarını artırır.", a: () => { 
            Object.values(WEAPONS).forEach(w => w.dmg += 15);
        }}
    ];

    opts.sort(() => Math.random() - 0.5).slice(0,3).forEach(opt => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${opt.t}</h3><p>${opt.d}</p>`;
        div.onclick = () => {
            opt.a();
            overlay.style.display = 'none';
            isPaused = false;
        };
        container.appendChild(div);
    });
}

function animate() {
    if(isPaused) return requestAnimationFrame(animate);
    
    frame++;
    ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Screen Shake Uygula
    if(screenShake > 0) {
        ctx.save();
        ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
        screenShake *= 0.9;
    }

    player.update();

    // Loot Toplama
    loots.forEach((l, i) => {
        l.draw();
        const dist = Math.hypot(l.x + gameState.worldX - player.x, l.y + gameState.worldY - player.y);
        if(dist < 30) {
            loots.splice(i, 1);
            gameState.xp += 25;
            if(gameState.xp >= gameState.nextLvlXp) {
                gameState.lvl++;
                gameState.xp = 0;
                gameState.nextLvlXp *= 1.2;
                showUpgrade();
            }
        }
    });

    // Düşman İşleme
    enemies.forEach((en, ei) => {
        en.update();
        
        // Oyuncuyla çarpışma
        const dist = Math.hypot(en.x + gameState.worldX - player.x, en.y + gameState.worldY - player.y);
        if(dist < en.r + player.r) {
            player.hp -= 0.5;
            if(player.hp <= 0) { alert("OYUN BİTTİ! DALGA: " + gameState.wave); location.reload(); }
        }

        // Mermi çarpışma
        projectiles.forEach((p, pi) => {
            const pd = Math.hypot(p.x - en.x, p.y - en.y);
            if(pd < en.r) {
                en.hp -= p.dmg;
                projectiles.splice(pi, 1);
                if(en.hp <= 0) {
                    loots.push(new Loot(en.x, en.y));
                    enemies.splice(ei, 1);
                }
            }
        });
    });

    projectiles.forEach((p, i) => {
        p.update();
        if(p.life <= 0) projectiles.splice(i, 1);
    });

    if(enemies.length === 0) spawnWave();

    // UI Güncelleme
    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('xp-bar').style.width = (gameState.xp / gameState.nextLvlXp * 100) + "%";
    document.getElementById('ui-wave').innerText = gameState.wave;
    document.getElementById('ui-lvl').innerText = gameState.lvl;
    document.getElementById('ui-weapon').innerText = gameState.weaponType.toUpperCase();

    if(screenShake > 0) ctx.restore();

    requestAnimationFrame(animate);
}

function switchSlot(n) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById(`slot-${n}`).classList.add('active');
}

/**
 * EVENT LISTENERS
 */
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
window.onmousemove = e => { mouse.x = e.clientX; mouse.y = e.clientY; };
window.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;

init();
</script>
</body>
</html>
