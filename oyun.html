<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>GameArea Fight</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#game-container{
position:relative;
width:1250px;
height:800px;
}

canvas{
background:#111;
display:block;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.char-card{
background:#222;
border:2px solid cyan;
padding:10px;
text-align:center;
cursor:pointer;
}

#level-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
width:600px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="game-container">

<canvas id="gameCanvas" width="1250" height="800"></canvas>


<!-- START -->

<div id="start-screen" class="overlay">

<h1>GameArea Fight</h1>

<button onclick="openLevelMenu()">BAŞLAT</button>

</div>


<!-- LEVEL MENU -->

<div id="level-screen" class="overlay" style="display:none">

<h2>BÖLÜM SEÇ</h2>

<div id="level-grid"></div>

</div>


<!-- GAME FINISHED -->

<div id="game-finished" class="overlay" style="display:none">

<h1>OYUN BİTTİ</h1>

<p>Tekrar oynamak için güncellemeyi bekle!</p>

</div>


</div>


<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let player={x:600,y:400,hp:100};

let enemies=[];
let bullets=[];

let keys={};

let gameState={
isRunning:false,
wave:0,
currentLevel:0,
completedLevels:[]
};


function getLevelWaveLimit(level){

return level*5;

}



function openLevelMenu(){

document.getElementById("start-screen").style.display="none";
document.getElementById("level-screen").style.display="flex";

renderLevels();

}



function renderLevels(){

const grid=document.getElementById("level-grid");

grid.innerHTML="";

for(let i=1;i<=20;i++){

let div=document.createElement("div");

div.className="char-card";

if(gameState.completedLevels.includes(i)){

div.innerHTML=i+"<br>GEÇİLDİ";

}else{

div.innerText=i;

}

div.onclick=()=>selectLevel(i);

grid.appendChild(div);

}

}



function selectLevel(level){

if(gameState.completedLevels.includes(level)){

alert("Bu bölümü geçtiniz");

return;

}

gameState.currentLevel=level;

document.getElementById("level-screen").style.display="none";

startGame();

}



function startGame(){

player.hp=100;

enemies=[];
bullets=[];

gameState.wave=0;

gameState.isRunning=true;

nextWave();

loop();

}



function nextWave(){

let limit=getLevelWaveLimit(gameState.currentLevel);

if(gameState.wave>=limit){

if(!gameState.completedLevels.includes(gameState.currentLevel)){

gameState.completedLevels.push(gameState.currentLevel);

}

gameState.isRunning=false;

if(gameState.currentLevel>=20){

document.getElementById("game-finished").style.display="flex";

}else{

setTimeout(()=>{

openLevelMenu();

},2000);

}

return;

}

gameState.wave++;

spawnEnemies();

}



function spawnEnemies(){

for(let i=0;i<gameState.wave+2;i++){

enemies.push({

x:Math.random()*1200,

y:-20,

hp:20

});

}

}



window.onkeydown=e=>keys[e.code]=true;

window.onkeyup=e=>keys[e.code]=false;



function loop(){

if(!gameState.isRunning) return;

ctx.clearRect(0,0,1250,800);


if(keys["KeyW"])player.y-=3;
if(keys["KeyS"])player.y+=3;
if(keys["KeyA"])player.x-=3;
if(keys["KeyD"])player.x+=3;



ctx.fillStyle="cyan";

ctx.beginPath();

ctx.arc(player.x,player.y,20,0,7);

ctx.fill();



enemies.forEach((e,i)=>{

let ang=Math.atan2(player.y-e.y,player.x-e.x);

e.x+=Math.cos(ang)*1.5;
e.y+=Math.sin(ang)*1.5;

ctx.fillStyle="red";

ctx.fillRect(e.x-10,e.y-10,20,20);


if(Math.hypot(player.x-e.x,player.y-e.y)<20){

player.hp--;

if(player.hp<=0){

location.reload();

}

}

});


if(enemies.length===0){

nextWave();

}

requestAnimationFrame(loop);

}


</script>

</body>
</html>
