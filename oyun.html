<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monster Devour IO</title>
<style>
body{
margin:0;
overflow:hidden;
background:#0b0f1a;
font-family:Arial;
color:white;
}
canvas{
display:block;
background:#0f1628;
}
#info{
position:fixed;
left:10px;
top:10px;
background:rgba(0,0,0,0.6);
padding:10px;
font-size:12px;
border:1px solid #555;
}
#hud{
position:fixed;
right:15px;
top:10px;
text-align:right;
font-size:14px;
}
</style>
</head>
<body>

<div id="info">
<b>HOW TO PLAY</b><br><br>
WASD / Mouse: Move<br>
Eat smaller monsters<br>
Avoid bigger monsters<br>
Boss every 5 levels<br>
Grow infinitely
</div>

<div id="hud"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

let camera = {x:0,y:0};

let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let mouse = {x:0,y:0};
canvas.addEventListener("mousemove",e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

function rand(min,max){ return Math.random()*(max-min)+min; }

class Monster{
constructor(x,y,size,color){
this.x=x;
this.y=y;
this.size=size;
this.color=color;
this.speed=2/(size*0.05);
}
draw(){
ctx.beginPath();
ctx.fillStyle=this.color;
ctx.arc(this.x-camera.x,this.y-camera.y,this.size,0,Math.PI*2);
ctx.fill();
}
moveRandom(){
this.x += rand(-this.speed,this.speed);
this.y += rand(-this.speed,this.speed);
}
}

let player = new Monster(0,0,25,"lime");
player.level=1;
player.xp=0;
player.hp=100;
player.maxHp=100;
player.mass=50;

let monsters=[];
function spawnMonster(){
let size = rand(10,80);
let x = rand(-3000,3000);
let y = rand(-3000,3000);
let color = size > player.size ? "red" : "orange";
monsters.push(new Monster(x,y,size,color));
}

for(let i=0;i<150;i++) spawnMonster();

function spawnBoss(){
let size = player.size*1.8;
monsters.push(new Monster(player.x+rand(-500,500),player.y+rand(-500,500),size,"purple"));
}

function updatePlayer(){
let speed = 4/(player.size*0.05);

if(keys["w"]) player.y -= speed;
if(keys["s"]) player.y += speed;
if(keys["a"]) player.x -= speed;
if(keys["d"]) player.x += speed;

camera.x = player.x - canvas.width/2;
camera.y = player.y - canvas.height/2;
}

function collision(){
for(let i=monsters.length-1;i>=0;i--){
let m = monsters[i];
let dx = player.x - m.x;
let dy = player.y - m.y;
let dist = Math.sqrt(dx*dx+dy*dy);

if(dist < player.size + m.size){
if(player.size > m.size){
player.xp += Math.floor(m.size);
player.mass += m.size;
player.size += m.size*0.05;
monsters.splice(i,1);
spawnMonster();
}else{
alert("You were eaten! Level reached: "+player.level);
location.reload();
}
}
}
}

function levelSystem(){
if(player.xp >= player.level*100){
player.xp = 0;
player.level++;
player.size += 5;
player.maxHp += 20;
player.hp = player.maxHp;
if(player.level % 5 === 0){
spawnBoss();
}
}
}

function drawMiniMap(){
let mapSize=150;
ctx.fillStyle="rgba(0,0,0,0.5)";
ctx.fillRect(canvas.width-mapSize-20,canvas.height-mapSize-20,mapSize,mapSize);

ctx.fillStyle="lime";
let px = (player.x+3000)/6000*mapSize;
let py = (player.y+3000)/6000*mapSize;
ctx.fillRect(canvas.width-mapSize-20+px,canvas.height-mapSize-20+py,4,4);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let m of monsters){
m.moveRandom();
m.draw();
}

player.draw();
drawMiniMap();

document.getElementById("hud").innerHTML=
"Mass: "+Math.floor(player.mass)+"<br>"+
"HP: "+player.hp+"/"+player.maxHp+"<br>"+
"Level: "+player.level+"<br>"+
"XP: "+player.xp+"/"+(player.level*100);
}

function gameLoop(){
updatePlayer();
collision();
levelSystem();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
