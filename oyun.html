<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Dash: Chrono-Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --warn: #ff0055; --slow: #ffcc00; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #010103; font-family: 'Syncopate'; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }
        
        #ui {
            position: absolute; inset: 0; pointer-events: none; padding: 30px;
            display: flex; flex-direction: column; color: white;
        }
        .energy-bar { width: 200px; height: 10px; border: 1px solid var(--neon); margin-top: 10px; position: relative; }
        #energy-fill { width: 100%; height: 100%; background: var(--neon); transition: 0.1s; box-shadow: 0 0 15px var(--neon); }
        .chrono-active { color: var(--slow); text-shadow: 0 0 10px var(--slow); animation: blink 0.2s infinite; display: none; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 20px;">CHRONO_UNIT: <span id="lvl">01</span></div>
    <div class="energy-bar"><div id="energy-fill"></div></div>
    <div style="font-size: 10px; margin-top: 5px;">TIME_ENERGY_BUFFER</div>
    <div id="chrono-label" class="chrono-active">TIME_DILATION_ACTIVE</div>
</div>

<canvas id="game"></canvas>

<script>
/**
 * DYNAMIC AUDIO SYSTEM
 */
const AudioEngine = {
    ctx: null,
    init() { this.ctx = new AudioContext(); this.loop(); },
    play(f, t, d, v=0.1) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = t; o.frequency.value = f * (Game.timeScale < 1 ? 0.5 : 1);
        g.gain.value = v; g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + d);
    },
    loop() {
        setInterval(() => {
            this.play(50, 'sine', 0.4, 0.3); // Bass kick
            if(Math.random() > 0.8) this.play(400, 'triangle', 0.1, 0.05);
        }, 400);
    }
};

/**
 * ELITE GAME ENGINE
 */
const Game = {
    level: 1, timeScale: 1, energy: 100,
    player: { x: 100, y: 100, vx: 0, vy: 0, w: 25, h: 25, jumps: 0 },
    lasers: [], particles: [], keys: {}, shake: 0,
    celebs: ["ELON", "RONALDO", "BEAST", "TARKAN", "MESSI"],

    init() {
        this.cvs = document.getElementById('game');
        this.ctx = this.cvs.getContext('2d');
        this.resize();
        window.onresize = () => this.resize();
        window.onkeydown = (e) => this.keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => this.keys[e.key.toLowerCase()] = false;
        
        document.addEventListener('mousedown', (e) => {
            if(e.button === 2 || e.ctrlKey) this.dash(); // Right click or Ctrl for dash
        });
        window.oncontextmenu = (e) => e.preventDefault();

        AudioEngine.init();
        this.load(1);
        this.run();
    },

    resize() { this.cvs.width = window.innerWidth; this.cvs.height = window.innerHeight; },

    dash() {
        if(this.energy < 30) return;
        const speed = 40;
        if(this.keys['a']) this.player.vx = -speed;
        else if(this.keys['d']) this.player.vx = speed;
        else this.player.vy = -speed;
        
        this.energy -= 30;
        this.shake = 15;
        AudioEngine.play(600, 'square', 0.1);
        this.burst(this.player.x, this.player.y, '#00f2ff', 30);
    },

    load(n) {
        this.level = n; this.energy = 100;
        this.player.x = 100; this.player.y = 500; this.player.vx = 0; this.player.vy = 0;
        document.getElementById('lvl').innerText = n.toString().padStart(2, '0');
        
        const W = this.cvs.width; const H = this.cvs.height;
        this.platforms = [
            {x: 0, y: H-40, w: W, h: 40}, // Floor
            {x: 300, y: H-200, w: 200, h: 20},
            {x: 600, y: H-350, w: 200, h: 20}
        ];

        this.lasers = [];
        for(let i=0; i<3+n; i++) {
            this.lasers.push({
                x: 400 + (Math.random()*(W-600)), 
                y: 100 + (Math.random()*(H-300)),
                angle: 0, speed: (0.02 + n*0.005), len: 150 + (n*20)
            });
        }
        this.exit = { x: W-150, y: 100, w: 60, h: 100 };
    },

    burst(x, y, c, n) {
        for(let i=0; i<n; i++) this.particles.push({ 
            x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, l: 1, c 
        });
    },

    die() {
        this.shake = 30;
        AudioEngine.play(80, 'sawtooth', 0.5);
        this.load(this.level);
    },

    update() {
        // Time Dilation Logic
        if(this.keys['shift'] && this.energy > 0) {
            this.timeScale = 0.2;
            this.energy -= 0.5;
            document.getElementById('chrono-label').style.display = 'block';
        } else {
            this.timeScale = 1;
            if(this.energy < 100) this.energy += 0.2;
            document.getElementById('chrono-label').style.display = 'none';
        }
        document.getElementById('energy-fill').style.width = this.energy + '%';

        const p = this.player;
        const ts = this.timeScale;

        if(this.keys['a']) p.vx -= 1 * ts;
        if(this.keys['d']) p.vx += 1 * ts;
        if((this.keys['w'] || this.keys[' ']) && p.jumps < 2 && !this.jumpLock) {
            p.vy = -12; p.jumps++; this.jumpLock = true;
            AudioEngine.play(200, 'triangle', 0.2);
        }
        if(!(this.keys['w'] || this.keys[' '])) this.jumpLock = false;

        p.vy += 0.6 * ts;
        p.vx *= (0.85);
        p.x += p.vx * ts; p.y += p.vy * ts;

        // Platform Collision
        this.platforms.forEach(b => {
            if(p.x < b.x+b.w && p.x+p.w > b.x && p.y < b.y+b.h && p.y+p.h > b.y) {
                if(p.vy > 0) { p.y = b.y-p.h; p.vy = 0; p.jumps = 0; }
                else { p.vx = 0; }
            }
        });

        // Laser Rotation & Collision
        this.lasers.forEach(l => {
            l.angle += l.speed * ts;
            const lx2 = l.x + Math.cos(l.angle) * l.len;
            const ly2 = l.y + Math.sin(l.angle) * l.len;
            
            // Simple line-point collision check
            const dist = Math.hypot(p.x - l.x, p.y - l.y);
            if(dist < l.len) {
                const angleToPlayer = Math.atan2(p.y - l.y, p.x - l.x);
                if(Math.abs(angleToPlayer - l.angle) < 0.1) this.die();
            }
        });

        if(p.x > this.exit.x && p.y < this.exit.y + this.exit.h) this.load(this.level + 1);
        if(p.y > this.cvs.height) this.die();

        this.particles.forEach((pt, i) => {
            pt.x += pt.vx * ts; pt.y += pt.vy * ts; pt.l -= 0.02;
            if(pt.l <= 0) this.particles.splice(i, 1);
        });

        if(this.shake > 0) this.shake *= 0.9;
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, this.cvs.width, this.cvs.height);
        
        ctx.save();
        if(this.shake > 1) ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);

        // Grid & Glow
        ctx.strokeStyle = this.timeScale < 1 ? '#ffcc0011' : '#00f2ff11';
        for(let i=0; i<this.cvs.width; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,this.cvs.height); ctx.stroke(); }

        // Platforms
        ctx.fillStyle = '#0a0a15'; ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        this.platforms.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

        // Rotating Lasers
        this.lasers.forEach(l => {
            ctx.strokeStyle = varName('--warn'); ctx.lineWidth = 3; ctx.shadowColor = varName('--warn');
            ctx.beginPath(); ctx.moveTo(l.x, l.y);
            ctx.lineTo(l.x + Math.cos(l.angle)*l.len, l.y + Math.sin(l.angle)*l.len);
            ctx.stroke();
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(l.x, l.y, 5, 0, Math.PI*2); ctx.fill();
        });

        // Player
        ctx.fillStyle = 'white'; ctx.shadowColor = this.timeScale < 1 ? '#ffcc00' : '#00f2ff';
        ctx.shadowBlur = 20;
        ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);

        // Particles
        this.particles.forEach(pt => { ctx.globalAlpha = pt.l; ctx.fillStyle = pt.c; ctx.fillRect(pt.x, pt.y, 3, 3); });

        // Exit Portal (Celebrity Hologram placeholder)
        ctx.shadowColor = '#0dff00'; ctx.strokeStyle = '#0dff00';
        ctx.strokeRect(this.exit.x, this.exit.y, this.exit.w, this.exit.h);
        ctx.fillStyle = 'white'; ctx.font = '10px Syncopate';
        ctx.fillText("EXIT_PORTAL", this.exit.x - 10, this.exit.y - 10);

        ctx.restore();
        requestAnimationFrame(() => this.run());
    },

    run() { this.update(); this.draw(); }
};

function varName(n) { return getComputedStyle(document.documentElement).getPropertyValue(n); }
Game.init();
</script>
</body>
</html>
