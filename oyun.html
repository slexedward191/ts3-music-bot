<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monster Ascent</title>
<style>
body{margin:0;overflow:hidden;background:#10151f;font-family:Arial}
canvas{display:block}
#ui{
position:absolute;top:10px;right:10px;
color:white;font-size:14px;text-align:right
}
#controls{
position:absolute;top:10px;left:10px;
background:rgba(0,0,0,0.6);
color:white;font-size:12px;
padding:8px;border:1px solid #444
}
#controls table{border-collapse:collapse}
#controls td{padding:2px 6px}
#overlay{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
flex-direction:column;
background:rgba(0,0,0,0.7);
color:white;visibility:hidden
}
button{
padding:10px 20px;margin-top:10px;
background:#222;color:#0f0;border:1px solid #0f0;
cursor:pointer
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="controls">
<b>HOW TO PLAY</b>
<table>
<tr><td>Mouse</td><td>Move</td></tr>
<tr><td>WASD</td><td>Move</td></tr>
<tr><td>Goal</td><td>Eat smaller</td></tr>
<tr><td>Danger</td><td>Avoid bigger</td></tr>
<tr><td>Boss</td><td>Every 5 Lv</td></tr>
</table>
</div>

<div id="ui"></div>
<div id="overlay"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let mouse = {x:canvas.width/2,y:canvas.height/2};
canvas.addEventListener("mousemove", e=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

function rand(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

let player = {
x:0,y:0,
mass:60,
hp:100,
maxHp:100,
level:1,
xp:0,
nextXp:100
};

let entities=[];
let spawnTimer=0;
let bossActive=false;
let gameOver=false;

function radius(m){ return Math.sqrt(m)*3; }

function spawnEntity(){
entities.push({
x:rand(-3000,3000),
y:rand(-3000,3000),
mass:rand(20,200+player.level*15),
type:"normal"
});
}

function spawnBoss(){
bossActive=true;
entities.push({
x:rand(-1000,1000),
y:rand(-1000,1000),
mass:1000+player.level*200,
type:"boss"
});
}

function gainXP(v){
player.xp += v;
if(player.xp >= player.nextXp){
player.xp = 0;
player.level++;
player.nextXp *= 1.4;
player.mass += 40;
if(player.level % 5 === 0) spawnBoss();
}
}

function update(dt){
if(gameOver) return;

let angle = Math.atan2(mouse.y-canvas.height/2, mouse.x-canvas.width/2);
let speed = 250/(Math.sqrt(player.mass)*0.25);

player.x += Math.cos(angle)*speed*dt;
player.y += Math.sin(angle)*speed*dt;

if(keys["w"]) player.y -= speed*dt;
if(keys["s"]) player.y += speed*dt;
if(keys["a"]) player.x -= speed*dt;
if(keys["d"]) player.x += speed*dt;

for(let i=entities.length-1;i>=0;i--){
let e = entities[i];
let dx = player.x - e.x;
let dy = player.y - e.y;
let dist = Math.hypot(dx,dy);

if(e.mass < player.mass*0.9){
if(dist < radius(player.mass)){
player.mass += e.mass*0.5;
gainXP(e.mass*0.3);
entities.splice(i,1);
}
}
else if(e.mass > player.mass*1.1){
let a = Math.atan2(player.y-e.y, player.x-e.x);
e.x += Math.cos(a)*60*dt;
e.y += Math.sin(a)*60*dt;

if(dist < radius(e.mass)){
player.hp -= 50*dt;
}
}
else{
if(dist < radius(player.mass)){
player.hp -= 20*dt;
}
}

if(player.hp <= 0){
endGame();
}
}

spawnTimer -= dt;
if(spawnTimer <= 0){
spawnEntity();
spawnTimer = 0.7;
}

player.hp = clamp(player.hp,0,player.maxHp);
}

function draw(){
ctx.fillStyle="#10151f";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.save();
ctx.translate(canvas.width/2-player.x, canvas.height/2-player.y);

for(let e of entities){
ctx.beginPath();
ctx.arc(e.x,e.y,radius(e.mass),0,Math.PI*2);
ctx.fillStyle = e.type==="boss" ? "purple" : "red";
ctx.fill();
}

ctx.beginPath();
ctx.arc(player.x,player.y,radius(player.mass),0,Math.PI*2);
ctx.fillStyle="lime";
ctx.fill();

ctx.restore();

document.getElementById("ui").innerHTML =
"Mass: "+Math.floor(player.mass)+
"<br>HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+Math.floor(player.xp)+"/"+Math.floor(player.nextXp);
}

function endGame(){
gameOver = true;
let overlay = document.getElementById("overlay");
overlay.style.visibility="visible";
overlay.innerHTML="<h1>You Were Eaten</h1><button onclick='location.reload()'>Restart</button>";
}

let last=0;
function loop(t){
let dt = (t-last)/1000;
last = t;
update(dt);
draw();
requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
