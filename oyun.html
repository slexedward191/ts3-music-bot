<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Lordz: Legacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f; --dark-bg: #0d1117; --panel: #161b22;
            --fire: #e74c3c; --water: #3498db; --nature: #2ecc71;
        }

        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* --- ANA ARAYÜZ --- */
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        #top-nav {
            height: 60px; background: var(--panel); display: flex; justify-content: space-around;
            align-items: center; border-bottom: 2px solid var(--gold); z-index: 10;
        }

        .res-item { display: flex; align-items: center; gap: 10px; font-weight: bold; font-family: 'Cinzel'; }

        /* --- OYUN ALANI (HABITAT MODU) --- */
        #world-view {
            flex-grow: 1; position: relative; overflow: hidden;
            background: radial-gradient(circle, #1a472a 0%, #0d1117 100%);
            cursor: grab;
        }

        .habitat {
            position: absolute; width: 150px; height: 120px; background: rgba(255,255,255,0.1);
            border: 2px dashed var(--gold); border-radius: 15px; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .habitat:hover { background: rgba(241, 196, 15, 0.2); }

        /* --- SAVAŞ MODU (TURN BASED) --- */
        #battle-screen {
            position: absolute; inset: 0; background: url('https://img.freepik.com/free-vector/dark-cave-landscape-scene_1308-56450.jpg') center/cover;
            display: none; z-index: 100; flex-direction: column;
        }

        .battle-stage { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 10%; }
        
        .dragon-entity { width: 250px; height: 250px; position: relative; text-align: center; }
        .hp-container { width: 100%; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; margin-top: 10px; }
        .hp-fill { height: 100%; background: var(--nature); transition: 0.5s; width: 100%; }

        #action-bar {
            height: 150px; background: rgba(0,0,0,0.9); border-top: 3px solid var(--gold);
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }

        /* --- MENÜLER --- */
        .side-btn { 
            position: absolute; right: 20px; width: 60px; height: 60px; 
            background: var(--panel); border: 2px solid var(--gold); border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20;
        }

        #inventory-panel {
            position: absolute; right: -400px; top: 80px; width: 350px; height: 70%;
            background: var(--panel); border: 2px solid var(--gold); transition: 0.5s; z-index: 50;
            padding: 20px; overflow-y: auto;
        }

        .dragon-card {
            background: #21262d; padding: 10px; margin-bottom: 10px; border-radius: 8px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #30363d;
        }

        .btn-main {
            padding: 10px 20px; background: var(--gold); border: none; border-radius: 5px;
            font-family: 'Cinzel'; font-weight: bold; cursor: pointer;
        }

        #log { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 24px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <nav id="top-nav">
        <div class="res-item">💰 ALTIN: <span id="res-gold">500</span></div>
        <div class="res-item">💎 ELMAS: <span id="res-dia">10</span></div>
        <div class="res-item">🥩 YEMEK: <span id="res-food">100</span></div>
        <button class="btn-main" onclick="openShop()">MARKET</button>
    </nav>

    <main id="world-view">
        <div id="habitat-layer"></div>
        <div id="log">Ejderha Diyarına Hoş Geldin!</div>
    </main>

    <section id="battle-screen">
        <div class="battle-stage">
            <div class="dragon-entity" id="p-entity">
                <h2 id="p-b-name">EJDERHAN</h2>
                <div id="p-sprite">🐉</div>
                <div class="hp-container"><div id="p-hp-fill" class="hp-fill"></div></div>
                <p id="p-hp-text">100/100</p>
            </div>

            <div class="dragon-entity" id="b-entity">
                <h2 id="b-b-name">VAHŞİ EJDER</h2>
                <div id="b-sprite">🐲</div>
                <div class="hp-container"><div id="b-hp-fill" class="hp-fill"></div></div>
                <p id="b-hp-text">150/150</p>
            </div>
        </div>
        <div id="action-bar">
            <button class="btn-main" onclick="combat.executeMove('basic')">PENÇE (Fiziksel)</button>
            <button class="btn-main" style="background: var(--fire)" onclick="combat.executeMove('elemental')">NEFES (Element)</button>
            <button class="btn-main" style="background: var(--water)" onclick="combat.executeMove('heal')">DİNLEN (Heal)</button>
        </div>
    </section>

    <div id="inventory-panel">
        <h2 style="font-family: 'Cinzel'; border-bottom: 1px solid var(--gold);">EJDERHALARIM</h2>
        <div id="dragon-list"></div>
        <button class="btn-main" style="width:100%; margin-top:20px;" onclick="combat.startBattle()">SAVAŞA GİT (BOTLARA KARŞI)</button>
    </div>

    <div class="side-btn" style="bottom: 100px;" onclick="toggleInventory()">🎒</div>
</div>

<script>
/* ================================================================
   DRAGON LORDZ: LEGACY ENGINE v1.0
   Bu kod modüler bir yapıdadır. Habitat, Savaş ve Ekonomi sistemlerini yönetir.
   ================================================================
*/

const state = {
    gold: 500, dia: 10, food: 100,
    myDragons: [
        { id: 1, name: "Ateş Yavrusu", type: "fire", lvl: 1, hp: 100, maxHp: 100, atk: 15, sprite: "🔥🐉" }
    ],
    habitats: [],
    shopOpen: false,
    invOpen: false
};

// --- EKONOMİ MOTORU ---
const economy = {
    updateUI() {
        document.getElementById('res-gold').innerText = Math.floor(state.gold);
        document.getElementById('res-dia').innerText = state.dia;
        document.getElementById('res-food').innerText = state.food;
        this.renderInventory();
    },
    renderInventory() {
        const list = document.getElementById('dragon-list');
        list.innerHTML = "";
        state.myDragons.forEach(d => {
            list.innerHTML += `
                <div class="dragon-card">
                    <div style="font-size: 30px;">${d.sprite}</div>
                    <div>
                        <strong>${d.name}</strong><br>
                        <small>Seviye: ${d.lvl} | Tip: ${d.type}</small><br>
                        <button onclick="economy.feed(${d.id})" style="font-size:10px;">BESLE (10 YEMEK)</button>
                    </div>
                </div>
            `;
        });
    },
    feed(id) {
        if(state.food >= 10) {
            state.food -= 10;
            const d = state.myDragons.find(x => x.id === id);
            d.lvl++;
            d.atk += 5;
            d.maxHp += 20;
            this.updateUI();
            showLog(`${d.name} Seviye Atladı!`);
        }
    }
};

// --- SAVAŞ MOTORU ---
const combat = {
    active: false,
    playerHp: 0,
    botHp: 0,
    currentDragon: null,

    startBattle() {
        this.currentDragon = state.myDragons[0];
        this.playerHp = this.currentDragon.maxHp;
        this.botHp = 100 + (this.currentDragon.lvl * 20);
        
        document.getElementById('battle-screen').style.display = 'flex';
        document.getElementById('p-b-name').innerText = this.currentDragon.name;
        document.getElementById('p-sprite').innerText = this.currentDragon.sprite;
        this.updateBattleUI();
        showLog("Vahşi bir ejderha belirdi! Senin sıran.");
    },

    updateBattleUI() {
        document.getElementById('p-hp-fill').style.width = (this.playerHp / this.currentDragon.maxHp * 100) + "%";
        document.getElementById('b-hp-fill').style.width = (this.botHp / (100 + this.currentDragon.lvl * 20) * 100) + "%";
        document.getElementById('p-hp-text').innerText = `${Math.ceil(this.playerHp)} / ${this.currentDragon.maxHp}`;
    },

    executeMove(type) {
        let dmg = 0;
        if(type === 'basic') dmg = this.currentDragon.atk;
        if(type === 'elemental') dmg = this.currentDragon.atk * 1.5;
        if(type === 'heal') {
            this.playerHp = Math.min(this.currentDragon.maxHp, this.playerHp + 30);
            showLog("İyileştin!");
        }

        if(dmg > 0) {
            this.botHp -= dmg;
            showLog(`Düşmana ${Math.floor(dmg)} hasar verdin!`);
        }

        this.updateBattleUI();
        if(this.botHp <= 0) return this.win();

        // Bot Sırası
        setTimeout(() => this.botMove(), 1000);
    },

    botMove() {
        let bDmg = 10 + (this.currentDragon.lvl * 2);
        this.playerHp -= bDmg;
        showLog(`Düşman sana ${bDmg} vurdu!`);
        this.updateBattleUI();
        
        if(this.playerHp <= 0) this.lose();
    },

    win() {
        showLog("ZAFER! 200 Altın ve 20 Yemek kazandın.");
        state.gold += 200;
        state.food += 20;
        setTimeout(() => this.end(), 2000);
    },

    lose() {
        showLog("Yenildin... Ejderhan yorgun düştü.");
        setTimeout(() => this.end(), 2000);
    },

    end() {
        document.getElementById('battle-screen').style.display = 'none';
        economy.updateUI();
    }
};

// --- YARDIMCI FONKSİYONLAR ---
function showLog(msg) {
    const logEl = document.getElementById('log');
    logEl.innerText = msg;
    logEl.style.opacity = 1;
    setTimeout(() => { logEl.style.opacity = 0.7; }, 2000);
}

function toggleInventory() {
    state.invOpen = !state.invOpen;
    document.getElementById('inventory-panel').style.right = state.invOpen ? "0px" : "-400px";
}

function openShop() {
    if(state.gold >= 500) {
        state.gold -= 500;
        const newId = state.myDragons.length + 1;
        state.myDragons.push({
            id: newId, 
            name: "Yenice Ejder", 
            type: "nature", 
            lvl: 1, 
            hp: 120, 
            maxHp: 120, 
            atk: 10, 
            sprite: "🍃🐉" 
        });
        showLog("Yeni bir yumurta aldın ve hemen çıktı!");
        economy.updateUI();
    } else {
        showLog("Yetersiz Altın!");
    }
}

// Oyunu Başlat
window.onload = () => {
    economy.updateUI();
};
</script>
</body>
</html>
