<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Diep.io MOBA: Tower Control</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #b9bbbe; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; background-color: #cdcdcd; }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7); padding: 15px;
            border-radius: 10px; color: white; pointer-events: none;
            border: 2px solid #444; min-width: 200px;
        }
        #announcement {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            text-align: center; color: white; text-shadow: 2px 2px #000; pointer-events: none;
        }
        .buff-active { color: #ffeb3b; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="announcement">
        <h1 id="msg">MERKEZİ KULEYİ ELE GEÇİR!</h1>
        <p id="sub-msg">Kule Kontrolü: Tarafsız</p>
    </div>

    <div id="ui">
        <div id="scoreDisplay">Puan: 0</div>
        <div id="classDisplay" style="color: #00b2e1; font-size: 1.2em;">Sınıf: Basic</div>
        <div id="buffDisplay">Buff: Yok</div>
        <progress id="hpBar" value="100" max="100" style="width: 100%; height: 10;"></progress>
    </div>
