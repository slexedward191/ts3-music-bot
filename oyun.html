<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval Reborn: Golden Age</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --ocean-dark: #002d4d;
            --ocean-light: #0077be;
            --danger: #ff4757;
            --ui-bg: rgba(10, 20, 30, 0.85);
        }

        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; }
        canvas { display: block; filter: contrast(110%) brightness(105%); }

        /* --- PROFESYONEL UI KATMANLARI --- */
        #hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Sol Üst: Oyuncu Durumu */
        .player-card {
            position: absolute;
            top: 20px; left: 20px;
            background: var(--ui-bg);
            padding: 15px;
            border-left: 5px solid var(--gold);
            min-width: 250px;
            backdrop-filter: blur(10px);
            pointer-events: all;
        }

        .bar-outer { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .bar-inner { height: 100%; width: 100%; transition: width 0.3s ease-out; }
        #hp-bar { background: linear-gradient(90deg, #ff4757, #ff6b81); }
        #xp-bar { background: linear-gradient(90deg, var(--gold), #ffa502); width: 0%; }

        /* Sağ Üst: Leaderboard & Zaman */
        .leaderboard {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--ui-bg);
            padding: 10px;
            width: 180px;
            font-size: 14px;
        }
        .leaderboard h4 { margin: 0 0 10px 0; color: var(--gold); border-bottom: 1px solid #333; }

        /* Sağ Alt: Mini Harita */
        #mini-map {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Orta Bildirimler */
        #announcer {
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Pirata One';
            font-size: 60px;
            color: var(--danger);
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        /* Giriş Paneli */
        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #004d7a 0%, #000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .start-box {
            background: var(--ui-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        input {
            background: #000;
            border: 2px solid var(--gold);
            padding: 12px;
            color: #fff;
            font-size: 18px;
            border-radius: 8px;
            width: 250px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--gold); }

        /* Market */
        #shop-trigger {
            position: absolute;
            top: 130px; left: 20px;
            pointer-events: all;
            display: none;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="font-family: 'Pirata One'; font-size: 80px; color: var(--gold); margin: 0;">NAVAL REBORN</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Denizlerin Hakimi Olmaya Hazır Mısın?</p>
    <div class="start-box">
        <input type="text" id="username" placeholder="KAPTAN İSMİ" maxlength="15">
        <br>
        <button class="btn" onclick="Game.start()">DENİZE AÇIL</button>
    </div>
</div>

<div id="hud">
    <div class="player-card">
        <div id="ui-name" style="font-weight: 900; color: var(--gold);">Kaptan</div>
        <div style="font-size: 11px; margin-top: 5px;">GEMİ SAĞLIĞI</div>
        <div class="bar-outer"><div id="hp-bar" class="bar-inner"></div></div>
        <div style="font-size: 11px; margin-top: 5px;">TECRÜBE (LVL <span id="ui-lvl">1</span>)</div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner"></div></div>
        <div style="margin-top: 10px; font-weight: 900; color: #fff;">🪙 <span id="ui-gold">0</span></div>
    </div>

    <div class="leaderboard">
        <h4>EN İYİLER</h4>
        <div id="lb-list">1. Korsan Kralı<br>2. Siyah İnci</div>
    </div>

    <div id="shop-trigger">
        <button class="btn" style="padding: 10px 20px; font-size: 12px; background: #2ecc71;" onclick="Game.openShop()">MARKETİ AÇ [E]</button>
    </div>

    <canvas id="mini-map"></canvas>
    <div id="announcer">ADANIZA SALDIRI!</div>
</div>

<canvas id="mainCanvas"></canvas>

<script>
/**
 * NAVAL REBORN: ENGINE CORE
 * Bu bölüm oyunun fizik, render ve logic motorunu içerir.
 */

const Game = {
    canvas: document.getElementById('mainCanvas'),
    ctx: null,
    width: window.innerWidth,
    height: window.innerHeight,
    worldSize: 5000, // Devasa dünya
    camera: { x: 0, y: 0, zoom: 1 },
    player: null,
    entities: [],
    particles: [],
    bullets: [],
    input: { w: false, a: false, s: false, d: false, mouseX: 0, mouseY: 0, mouseDown: false },
    time: 0,
    isDay: true,
    gold: 0,
    islandHp: 5000000,

    async init() {
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.ctx.imageSmoothingEnabled = true;

        window.addEventListener('keydown', e => this.input[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => this.input[e.key.toLowerCase()] = false);
        window.addEventListener('mousemove', e => {
            this.input.mouseX = e.clientX;
            this.input.mouseY = e.clientY;
        });
        window.addEventListener('mousedown', () => this.input.mouseDown = true);
        window.addEventListener('mouseup', () => this.input.mouseDown = false);
        window.addEventListener('resize', () => {
            this.width = this.canvas.width = window.innerWidth;
            this.height = this.canvas.height = window.innerHeight;
        });
    },

    start() {
        const name = document.getElementById('username').value || "Kaptan";
        document.getElementById('ui-name').innerText = name;
        document.getElementById('overlay').style.display = 'none';
        
        this.player = new Player(this.worldSize / 2, this.worldSize / 2, name);
        this.generateWorld();
        this.loop();
    },

    generateWorld() {
        // Canavarlar ve Adalar
        for(let i=0; i<100; i++) {
            this.entities.push(new Entity('monster', Math.random()*this.worldSize, Math.random()*this.worldSize));
        }
        // Market Adası (Sabit)
        this.entities.push(new Entity('shop_island', 400, 400));
        // Oyuncu Adası (Sabit)
        this.entities.push(new Entity('player_island', this.worldSize - 600, this.worldSize - 600));
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },

    update() {
        this.time += 0.01;
        this.isDay = (Math.sin(this.time * 0.2) > -0.3);

        this.player.update();
        
        // Kamera takibi
        this.camera.x += (this.player.x - this.width/2 - this.camera.x) * 0.1;
        this.camera.y += (this.player.y - this.height/2 - this.camera.y) * 0.1;

        // Varlıklar
        this.entities.forEach((en, index) => {
            en.update();
            // Çarpışma: Oyuncu mermisi vs Düşman
            this.bullets.forEach((b, bi) => {
                if(Math.hypot(b.x - en.x, b.y - en.y) < en.size) {
                    en.hp -= this.player.stats.dmg;
                    this.bullets.splice(bi, 1);
                    if(en.hp <= 0) {
                        this.gold += en.reward;
                        this.player.xp += 25;
                        this.entities.splice(index, 1);
                        if(en.type === 'monster') {
                            setTimeout(() => this.entities.push(new Entity('monster', Math.random()*this.worldSize, Math.random()*this.worldSize)), 5000);
                        }
                    }
                }
            });
        });

        this.bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            b.life--;
            if(b.life <= 0) this.bullets.splice(i, 1);
        });

        // UI Sync
        document.getElementById('ui-gold').innerText = Math.floor(this.gold);
        document.getElementById('hp-bar').style.width = (this.player.hp / this.player.maxHp * 100) + '%';
        document.getElementById('xp-bar').style.width = (this.player.xp % 100) + '%';
        document.getElementById('ui-lvl').innerText = Math.floor(this.player.xp / 100) + 1;
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0,0,this.width, this.height);

        ctx.save();
        ctx.translate(-this.camera.x, -this.camera.y);

        // Okyanus Çizimi (Sonsuz Izgara)
        this.drawOcean();

        // Varlıklar
        this.entities.forEach(en => en.draw(ctx));
        this.bullets.forEach(b => {
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
        });

        this.player.draw(ctx);

        ctx.restore();

        // Gece Efekti (Overlay)
        if(!this.isDay) {
            ctx.fillStyle = 'rgba(0, 5, 20, 0.4)';
            ctx.fillRect(0,0,this.width, this.height);
        }

        this.drawMiniMap();
    },

    drawOcean() {
        const ctx = this.ctx;
        const spacing = 100;
        const startX = Math.floor(this.camera.x / spacing) * spacing;
        const startY = Math.floor(this.camera.y / spacing) * spacing;

        ctx.strokeStyle = this.isDay ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)';
        ctx.beginPath();
        for(let x = startX; x < startX + this.width + spacing; x += spacing) {
            ctx.moveTo(x, this.camera.y); ctx.lineTo(x, this.camera.y + this.height);
        }
        for(let y = startY; y < startY + this.height + spacing; y += spacing) {
            ctx.moveTo(this.camera.x, y); ctx.lineTo(this.camera.x + this.width, y);
        }
        ctx.stroke();
    },

    drawMiniMap() {
        const mc = document.getElementById('mini-map');
        const mctx = mc.getContext('2d');
        mc.width = 150; mc.height = 150;
        mctx.fillStyle = "rgba(0,40,80,0.5)";
        mctx.fillRect(0,0,150,150);

        const r = 150 / this.worldSize;
        mctx.fillStyle = varGold;
        mctx.fillRect(this.player.x * r - 2, this.player.y * r - 2, 4, 4);
        
        mctx.fillStyle = "red";
        this.entities.forEach(en => {
            if(en.type === 'monster') mctx.fillRect(en.x * r, en.y * r, 2, 2);
        });
    }
};

/**
 * ENTITY & PLAYER CLASSES
 */

class Player {
    constructor(x, y, name) {
        this.x = x; this.y = y; this.name = name;
        this.angle = 0; this.speed = 4;
        this.hp = 1000; this.maxHp = 1000;
        this.xp = 0;
        this.stats = { dmg: 50, fireRate: 20 };
        this.lastShot = 0;
    }

    update() {
        let mx = 0, my = 0;
        if(Game.input.w) my -= this.speed;
        if(Game.input.s) my += this.speed;
        if(Game.input.a) mx -= this.speed;
        if(Game.input.d) mx += this.speed;

        this.x += mx; this.y += my;
        this.angle = Math.atan2(Game.input.mouseY - (this.y - Game.camera.y), Game.input.mouseX - (this.x - Game.camera.x));

        if(Game.input.mouseDown && Game.time * 100 - this.lastShot > this.stats.fireRate) {
            this.shoot();
            this.lastShot = Game.time * 100;
        }
    }

    shoot() {
        Game.bullets.push({
            x: this.x, y: this.y, 
            vx: Math.cos(this.angle) * 12, 
            vy: Math.sin(this.angle) * 12,
            life: 100
        });
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // Gemi Tasarımı
        ctx.fillStyle = '#5d4037';
        ctx.beginPath();
        ctx.moveTo(30, 0); ctx.lineTo(-20, -15); ctx.lineTo(-20, 15); ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-10, -2, 5, 4); // Yelken direği
        
        ctx.restore();
        
        // İsim etiketi
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px Roboto";
        ctx.textAlign = "center";
        ctx.fillText(this.name, this.x, this.y - 30);
    }
}

class Entity {
    constructor(type, x, y) {
        this.type = type; this.x = x; this.y = y;
        this.hp = 200; this.size = 30;
        this.reward = 100;
        this.color = type === 'monster' ? '#ff4757' : '#2ecc71';
        this.wobble = Math.random() * Math.PI;
    }

    update() {
        if(this.type === 'monster') {
            this.wobble += 0.05;
            this.x += Math.cos(this.wobble) * 0.5;
            this.y += Math.sin(this.wobble) * 0.5;
        }
    }

    draw(ctx) {
        ctx.save();
        if(this.type === 'monster') {
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size + Math.sin(this.wobble)*5, 0, Math.PI*2);
            ctx.fill();
        } else if(this.type === 'shop_island') {
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath(); ctx.arc(this.x, this.y, 150, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.fillText("MARKET ADASI", this.x, this.y);
        } else if(this.type === 'player_island') {
            ctx.fillStyle = "#2ecc71";
            ctx.beginPath(); ctx.arc(this.x, this.y, 200, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.fillText("SİZİN ADANIZ", this.x, this.y);
        }
        ctx.restore();
    }
}

const varGold = "#ffcc00";

// Başlat
Game.init();
</script>
</body>
</html>
