<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gemini-Dash | Pro Platformer</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --primary: #00f2ff;
            --hazard: #ff004c;
            --finish: #00ff88;
        }

        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'JetBrains Mono', monospace; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.2)); }

        /* UI Katmanları */
        #ui {
            position: absolute; inset: 0; pointer-events: none;
            padding: 30px; display: flex; justify-content: space-between;
            color: #fff; z-index: 100;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 25px; border-left: 4px solid var(--primary);
            font-size: 18px; text-transform: uppercase;
        }

        #level-counter { color: var(--primary); font-size: 32px; font-weight: 900; }
        
        #death-screen {
            position: fixed; inset: 0; background: rgba(255, 0, 76, 0.2);
            display: none; justify-content: center; align-items: center;
            font-size: 80px; font-family: 'Oswald'; color: #fff; z-index: 1000;
        }

        .controls-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.3); font-size: 12px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-box">
        LEVEL <span id="level-counter">1</span><br>
        <small id="difficulty-tag" style="color: #666;">EASY</small>
    </div>
    <div class="stat-box" style="text-align: right; border-left: none; border-right: 4px solid var(--finish);">
        DEATHS: <span id="death-count">0</span><br>
        <small id="timer">00:00.00</small>
    </div>
</div>

<div id="death-screen">WASTED</div>
<div class="controls-hint">WASD / OK TUŞLARI: HAREKET | R: RESET | SEVİYELER 100'E KADAR ZORLAŞIR</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * GEMINI-DASH PRO ENGINE
 * 100 SEVİYE DİNAMİK ZORLUK MOTORU
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dCount = document.getElementById('death-count');
const lCount = document.getElementById('level-counter');

// Oyun Ayarları
const CONFIG = {
    gravity: 0.25,
    friction: 0.85,
    accel: 0.6,
    jump: -7.5,
    tileSize: 40,
    deathLimit: 0
};

let game = {
    level: 1,
    deaths: 0,
    player: null,
    platforms: [],
    hazards: [],
    particles: [],
    finishLine: null,
    keys: {},
    camera: { x: 0, y: 0 },
    startTime: Date.now()
};

class Player {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.w = 24; this.h = 24;
        this.onGround = false;
        this.color = "#00f2ff";
        this.trail = [];
    }

    update() {
        // Hareket Girdisi
        if (game.keys['ArrowLeft'] || game.keys['a']) this.vx -= CONFIG.accel;
        if (game.keys['ArrowRight'] || game.keys['d']) this.vx += CONFIG.accel;
        
        // Zıplama (Coyote Time & Buffer eklemesi yapılabilir)
        if ((game.keys['ArrowUp'] || game.keys['w'] || game.keys[' ']) && this.onGround) {
            this.vy = CONFIG.jump;
            this.onGround = false;
            createExplosion(this.x + 12, this.y + 24, "#fff", 5);
        }

        // Fizik Uygulama
        this.vy += CONFIG.gravity;
        this.vx *= CONFIG.friction;
        this.x += this.vx;
        this.y += this.vy;

        // Trail Efekti
        this.trail.push({x: this.x, y: this.y, alpha: 0.5});
        if(this.trail.length > 10) this.trail.shift();

        // Çarpışma Kontrolü (Zemin/Platform)
        this.onGround = false;
        game.platforms.forEach(p => {
            if (this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                // Hangi yönden çarptı?
                let overlapX = Math.min(this.x + this.w - p.x, p.x + p.w - this.x);
                let overlapY = Math.min(this.y + this.h - p.y, p.y + p.h - this.y);

                if (overlapX > overlapY) {
                    if (this.vy > 0) { // Üstten çarptı
                        this.y = p.y - this.h;
                        this.vy = 0;
                        this.onGround = true;
                    } else { // Alttan çarptı
                        this.y = p.y + p.h;
                        this.vy = 0;
                    }
                } else {
                    if (this.vx > 0) this.x = p.x - this.w;
                    else this.x = p.x + p.w;
                    this.vx = 0;
                }
            }
        });

        // Ölüm Kontrolü (Dikenler)
        game.hazards.forEach(h => {
            if (this.x < h.x + h.w - 5 && this.x + this.w > h.x + 5 && this.y < h.y + h.h && this.y + this.h > h.y + 5) {
                die();
            }
        });

        // Bitiş Kontrolü
        if (this.x < game.finishLine.x + game.finishLine.w && this.x + this.w > game.finishLine.x && this.y < game.finishLine.y + game.finishLine.h && this.y + this.h > game.finishLine.y) {
            nextLevel();
        }

        // Dünya dışına düşme
        if (this.y > 2000) die();
    }

    draw() {
        // Trail çizimi
        this.trail.forEach((t, i) => {
            ctx.fillStyle = `rgba(0, 242, 255, ${t.alpha * (i/10)})`;
            ctx.fillRect(t.x - game.camera.x, t.y - game.camera.y, this.w, this.h);
        });

        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x - game.camera.x, this.y - game.camera.y, this.w, this.h);
        ctx.shadowBlur = 0;
    }
}

/**
 * PRO LEVEL GENERATOR (1-100)
 * Seviye ilerledikçe platformlar küçülür, dikenler artar.
 */
function buildLevel(num) {
    game.platforms = [];
    game.hazards = [];
    game.particles = [];
    
    // Zorluk parametreleri
    const difficulty = num / 100;
    const gapMultiplier = 1 + (difficulty * 2);
    
    let curX = 100;
    let curY = 500;

    // Start Platform
    game.platforms.push({x: 0, y: 550, w: 200, h: 40});
    game.player = new Player(50, 500);

    // Procedural Generation (Zorluk Odaklı)
    for (let i = 0; i < 15 + (num * 2); i++) {
        let pW = Math.max(30, 150 - (difficulty * 120));
        let jumpX = 100 + (Math.random() * 50 * gapMultiplier);
        let jumpY = (Math.random() - 0.5) * 150;

        curX += jumpX + pW;
        curY += jumpY;

        game.platforms.push({x: curX, y: curY, w: pW, h: 20});

        // Seviye 5'ten sonra diken ekle
        if (num > 5 && Math.random() < 0.3 + (difficulty * 0.5)) {
            game.hazards.push({x: curX + 10, y: curY - 15, w: pW - 20, h: 15});
        }
    }

    // Finish
    game.finishLine = {x: curX + 150, y: curY - 100, w: 60, h: 150};
    
    lCount.innerText = num;
    document.getElementById('difficulty-tag').innerText = num < 30 ? "EASY" : (num < 70 ? "HARDCORE" : "INSANE");
    document.getElementById('difficulty-tag').style.color = num < 30 ? "#00ff88" : (num < 70 ? "#ffcc00" : "#ff004c");
}

function die() {
    game.deaths++;
    dCount.innerText = game.deaths;
    createExplosion(game.player.x, game.player.y, "#ff004c", 20);
    
    const ds = document.getElementById('death-screen');
    ds.style.display = 'flex';
    setTimeout(() => {
        ds.style.display = 'none';
        buildLevel(game.level);
    }, 300);
}

function nextLevel() {
    createExplosion(game.player.x, game.player.y, "#00ff88", 30);
    game.level++;
    if(game.level > 100) {
        alert("TEBRİKLER! TÜM PARKURU BİTİRDİN!");
        game.level = 1;
    }
    setTimeout(() => buildLevel(game.level), 100);
}

function createExplosion(x, y, color, count) {
    for(let i=0; i<count; i++) {
        game.particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1,
            color: color
        });
    }
}

// Input Handling
window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

function update() {
    game.player.update();
    
    // Smooth Camera
    game.camera.x += (game.player.x - canvas.width/2 - game.camera.x) * 0.1;
    game.camera.y += (game.player.y - canvas.height/2 - game.camera.y) * 0.1;

    // Particles
    game.particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.02;
        if(p.life <= 0) game.particles.splice(i, 1);
    });

    // Timer
    let elapsed = (Date.now() - game.startTime) / 1000;
    document.getElementById('timer').innerText = elapsed.toFixed(2);
}

function draw() {
    ctx.fillStyle = "#050505";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Arka Plan Izgarası (Dinamik)
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.beginPath();
    for(let i = -game.camera.x % 100; i < canvas.width; i += 100) {
        ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height);
    }
    for(let i = -game.camera.y % 100; i < canvas.height; i += 100) {
        ctx.moveTo(0, i); ctx.lineTo(canvas.width, i);
    }
    ctx.stroke();

    ctx.save();
    
    // Platformlar
    game.platforms.forEach(p => {
        ctx.fillStyle = "#1e1e1e";
        ctx.fillRect(p.x - game.camera.x, p.y - game.camera.y, p.w, p.h);
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.strokeRect(p.x - game.camera.x, p.y - game.camera.y, p.w, p.h);
    });

    // Tehlikeler (Dikenler)
    game.hazards.forEach(h => {
        ctx.fillStyle = "#ff004c";
        ctx.beginPath();
        let step = h.w / 5;
        for(let i=0; i<=5; i++) {
            let tx = h.x + (i * step);
            if(i==0) ctx.moveTo(tx - game.camera.x, h.y + h.h - game.camera.y);
            ctx.lineTo(tx - game.camera.x, h.y - game.camera.y);
            ctx.lineTo(tx + (step/2) - game.camera.x, h.y + h.h - game.camera.y);
        }
        ctx.fill();
    });

    // Bitiş Kapısı
    ctx.fillStyle = "rgba(0, 255, 136, 0.2)";
    ctx.fillRect(game.finishLine.x - game.camera.x, game.finishLine.y - game.camera.y, game.finishLine.w, game.finishLine.h);
    ctx.strokeStyle = "#00ff88";
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(game.finishLine.x - game.camera.x, game.finishLine.y - game.camera.y, game.finishLine.w, game.finishLine.h);
    ctx.setLineDash([]);

    // Particles
    game.particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x - game.camera.x, p.y - game.camera.y, 4, 4);
    });
    ctx.globalAlpha = 1;

    game.player.draw();

    ctx.restore();
    
    requestAnimationFrame(() => {
        update();
        draw();
    });
}

// Başlat
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
buildLevel(1);
draw();
</script>
</body>
</html>
