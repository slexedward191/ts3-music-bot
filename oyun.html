<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Z-SURVIVOR: HELL PROTOCOL</title>
    <style>
        :root { --neon: #00f2ff; --danger: #ff004c; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Orbitron', sans-serif; color: #fff; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        
        /* Gelişmiş Arayüz */
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stats-box { background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid var(--neon); border-radius: 4px; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .bar { width: 300px; height: 10px; background: #222; margin: 5px 0; border-radius: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff004c, #ff7b00); transition: 0.2s; }
        #xp-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #7d00ff); transition: 0.2s; }
        
        /* Geliştirme Kartları */
        #level-up {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .card-container { display: flex; gap: 20px; perspective: 1000px; }
        .card {
            width: 240px; height: 320px; background: #111; border: 2px solid #333;
            border-radius: 15px; cursor: pointer; padding: 20px; text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { border-color: var(--neon); transform: scale(1.1) rotateY(10deg); box-shadow: 0 0 40px rgba(0,242,255,0.4); }
        .card h2 { color: var(--neon); font-size: 18px; margin-bottom: 15px; }
        .card p { color: #888; font-size: 14px; }

        #kill-count { position: absolute; top: 20px; right: 20px; font-size: 24px; color: var(--danger); font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
    <div class="stats-box">
        <div>ZIRH: <span id="hp-text">100</span></div>
        <div class="bar"><div id="hp-fill"></div></div>
        <div>DENEYİM: <span id="lvl-text">LVL 1</span></div>
        <div class="bar"><div id="xp-fill"></div></div>
    </div>
</div>

<div id="kill-count">KILLS: 0</div>

<div id="level-up">
    <h1 style="text-shadow: 0 0 20px var(--neon);">PROTOKOL GÜNCELLEMESİ</h1>
    <div class="card-container" id="cards"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- OYUN AYARLARI ---
let player, enemies = [], particles = [], projectiles = [], gems = [];
let keys = {};
let mouse = { x: 0, y: 0, pressed: false };
let frame = 0, kills = 0, isPaused = false;
let shakeTime = 0;

const WEAPONS = {
    Pistol: { damage: 40, fireRate: 350, spread: 0.05, count: 1, speed: 15, color: '#fff' },
    Uzi: { damage: 15, fireRate: 100, spread: 0.2, count: 1, speed: 18, color: '#00f2ff' },
    Shotgun: { damage: 25, fireRate: 800, spread: 0.5, count: 8, speed: 12, color: '#ffea00' }
};

class Player {
    constructor() {
        this.x = canvas.width/2; this.y = canvas.height/2;
        this.r = 20; this.hp = 100; this.maxHp = 100;
        this.lvl = 1; this.xp = 0; this.nextXp = 50;
        this.speed = 5; this.weapon = "Pistol";
        this.lastShot = 0;
    }
    draw() {
        const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
        
        // Gövde
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(angle);
        
        // Neon halka
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#0a0a0a';
        ctx.fill();
        
        // Silah
        ctx.fillStyle = '#fff';
        ctx.fillRect(15, -4, 20, 8);
        ctx.restore();
    }
    update() {
        if(keys['w'] && this.y > this.r) this.y -= this.speed;
        if(keys['s'] && this.y < canvas.height - this.r) this.y += this.speed;
        if(keys['a'] && this.x > this.r) this.x -= this.speed;
        if(keys['d'] && this.x < canvas.width - this.r) this.x += this.speed;
        
        if(mouse.pressed) this.shoot();
        this.draw();
    }
    shoot() {
        const now = Date.now();
        const w = WEAPONS[this.weapon];
        if(now - this.lastShot > w.fireRate) {
            shakeTime = 5;
            for(let i=0; i<w.count; i++) {
                const angle = Math.atan2(mouse.y - this.y, mouse.x - this.x) + (Math.random()-0.5)*w.spread;
                projectiles.push(new Bullet(this.x, this.y, angle, w));
            }
            this.lastShot = now;
        }
    }
}

class Enemy {
    constructor(type) {
        this.type = type; // 'runner', 'tank', 'swarmer'
        const side = Math.floor(Math.random()*4);
        if(side==0) { this.x = Math.random()*canvas.width; this.y = -50; }
        if(side==1) { this.x = canvas.width+50; this.y = Math.random()*canvas.height; }
        if(side==2) { this.x = Math.random()*canvas.width; this.y = canvas.height+50; }
        if(side==3) { this.x = -50; this.y = Math.random()*canvas.height; }

        this.hp = type === 'tank' ? 200 : 50;
        this.maxHp = this.hp;
        this.r = type === 'tank' ? 35 : 18;
        this.speed = type === 'runner' ? 3.5 : 2;
        this.color = type === 'tank' ? '#ff004c' : (type === 'runner' ? '#ff7b00' : '#76ff03');
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Bullet {
    constructor(x, y, angle, config) {
        this.x = x; this.y = y;
        this.vx = Math.cos(angle) * config.speed;
        this.vy = Math.sin(angle) * config.speed;
        this.damage = config.damage;
        this.color = config.color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.v = { x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*8 };
        this.a = 1;
    }
    update() {
        this.x += this.v.x; this.y += this.v.y;
        this.a -= 0.02;
        ctx.globalAlpha = this.a;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 3, 3);
        ctx.globalAlpha = 1;
    }
}

class Gem {
    constructor(x, y) { this.x = x; this.y = y; this.r = 6; }
    draw() {
        ctx.fillStyle = '#00f2ff';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r + Math.sin(frame/10)*2, 0, Math.PI*2); ctx.fill();
    }
}

// --- ANA DÖNGÜ ---
function init() {
    player = new Player();
    animate();
}

function spawnEnemies() {
    if(frame % 60 === 0) {
        let type = 'swarmer';
        if(kills > 20 && Math.random() < 0.3) type = 'runner';
        if(kills > 50 && Math.random() < 0.1) type = 'tank';
        enemies.push(new Enemy(type));
    }
}

function showLevelUp() {
    isPaused = true;
    const menu = document.getElementById('level-up');
    const container = document.getElementById('cards');
    menu.style.display = 'flex';
    container.innerHTML = '';

    const upgrades = [
        { t: "Gatling Gun", d: "Ateş hızını inanılmaz artırır.", f: () => { player.weapon = "Uzi"; }},
        { t: "Flak Cannon", d: "Pompalı tüfeğe geçiş yap.", f: () => { player.weapon = "Shotgun"; }},
        { t: "Nano-Armor", d: "Max canını 50 artırır.", f: () => { player.maxHp += 50; player.hp = player.maxHp; }},
        { t: "Hyper Drive", d: "Hareket hızını %20 artırır.", f: () => { player.speed += 1.5; }},
        { t: "Overload", d: "Hasarı %50 artırır.", f: () => { Object.values(WEAPONS).forEach(w => w.damage *= 1.5); }}
    ];

    upgrades.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(upg => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h2>${upg.t}</h2><p>${upg.d}</p>`;
        card.onclick = () => {
            upg.f();
            isPaused = false;
            menu.style.display = 'none';
        };
        container.appendChild(card);
    });
}

function animate() {
    if(isPaused) return requestAnimationFrame(animate);
    
    ctx.fillStyle = 'rgba(5, 5, 5, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if(shakeTime > 0) {
        ctx.save();
        ctx.translate((Math.random()-0.5)*shakeTime, (Math.random()-0.5)*shakeTime);
        shakeTime *= 0.9;
    }

    player.update();
    spawnEnemies();

    // Mermi - Düşman Kontrolü
    projectiles.forEach((p, pi) => {
        p.update();
        if(p.x<0 || p.x>canvas.width || p.y<0 || p.y>canvas.height) projectiles.splice(pi, 1);
        
        enemies.forEach((en, ei) => {
            if(Math.hypot(p.x - en.x, p.y - en.y) < en.r) {
                en.hp -= p.damage;
                projectiles.splice(pi, 1);
                for(let i=0; i<5; i++) particles.push(new Particle(p.x, p.y, en.color));
                
                if(en.hp <= 0) {
                    kills++;
                    gems.push(new Gem(en.x, en.y));
                    enemies.splice(ei, 1);
                    document.getElementById('kill-count').innerText = `KILLS: ${kills}`;
                }
            }
        });
    });

    // Düşman - Oyuncu Kontrolü
    enemies.forEach((en, ei) => {
        en.update();
        if(Math.hypot(en.x - player.x, en.y - player.y) < en.r + player.r) {
            player.hp -= 0.5;
            if(player.hp <= 0) location.reload();
        }
    });

    // Gem toplama
    gems.forEach((g, gi) => {
        g.draw();
        if(Math.hypot(g.x - player.x, g.y - player.y) < 40) {
            gems.splice(gi, 1);
            player.xp += 10;
            if(player.xp >= player.nextXp) {
                player.lvl++;
                player.xp = 0;
                player.nextXp *= 1.4;
                showLevelUp();
            }
        }
    });

    particles.forEach((p, i) => {
        p.update();
        if(p.a <= 0) particles.splice(i, 1);
    });

    // UI Update
    document.getElementById('hp-fill').style.width = (player.hp/player.maxHp*100) + '%';
    document.getElementById('xp-fill').style.width = (player.xp/player.nextXp*100) + '%';
    document.getElementById('hp-text').innerText = Math.ceil(player.hp);
    document.getElementById('lvl-text').innerText = `LVL ${player.lvl}`;

    if(shakeTime > 0) ctx.restore();
    frame++;
    requestAnimationFrame(animate);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => mouse.pressed = true);
window.addEventListener('mouseup', () => mouse.pressed = false);

init();
</script>
</body>
</html>
