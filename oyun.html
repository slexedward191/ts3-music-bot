<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yapay Zekaya Karşı Okey</title>
    <style>
        body { background-color: #064e3b; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #board { display: flex; gap: 10px; margin-top: 50px; background: #3d2b1f; padding: 20px; border-radius: 10px; border: 5px solid #2d1b0f; }
        .tile { width: 45px; height: 60px; background: #fffbeb; color: black; border-radius: 5px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .red { color: red; } .blue { color: blue; } .black { color: black; } .yellow { color: #d97706; }
        #controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #059669; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Okey - Botlara Karşı</h1>
    <div id="info">Taşlar dağıtılmayı bekliyor...</div>

    <div id="board">
        </div>

    <div id="controls">
        <button onclick="startGame()">Oyunu Başlat / Dağıt</button>
    </div>

    <script>
        const colors = ['red', 'blue', 'black', 'yellow'];
        let deck = [];
        let playerHand = [];

        function createDeck() {
            deck = [];
            for (let i = 0; i < 2; i++) { // Her taştan 2 adet var
                for (let color of colors) {
                    for (let num = 1; num <= 13; num++) {
                        deck.push({ color, num });
                    }
                }
            }
            deck.push({ color: 'joker', num: 'SAHTE' }); // Sahte okey
            deck.push({ color: 'joker', num: 'SAHTE' });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startGame() {
            createDeck();
            shuffle(deck);
            
            // Oyuncuya 21, botlara 20'şer (Basit versiyon)
            playerHand = deck.splice(0, 21);
            // Elini sırala
            playerHand.sort((a, b) => a.num - b.num);

            renderHand();
            document.getElementById('info').innerText = "Senin sıran! Botlar hazır.";
        }

        function renderHand() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            playerHand.forEach(tile => {
                const div = document.createElement('div');
                div.className = `tile ${tile.color}`;
                div.innerText = tile.num;
                board.appendChild(div);
            });
        }
    </script>
</body>
</html>
