<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emoji Arena</title>
<style>
body{margin:0;overflow:hidden;background:#0f172a;font-family:Arial;color:white}
canvas{display:block}
#hud{position:fixed;top:10px;left:10px;font-size:14px}
#upgradePanel{
position:fixed;right:10px;bottom:10px;
background:rgba(0,0,0,0.7);
padding:10px;border-radius:10px;width:200px;
}
.upg{background:#1f2937;margin:5px 0;padding:8px;border-radius:8px;cursor:pointer}
.upg:hover{background:#374151}
#howto{
position:fixed;left:10px;top:120px;
background:#1f2937;padding:10px;border-radius:10px;width:210px;
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="https://playerservices.streamtheworld.com/api/livestream-redirect/VIRGINRADIO.mp3">
</audio>

<div id="hud"></div>
<div id="howto">
<b>🎮 HOW TO PLAY</b><br><br>
WASD - Move<br>
Mouse - Aim<br>
Left Click - Shoot<br>
E - Auto Fire Toggle<br>
Right Click - ULTI 💥<br>
Shift - Dash<br>
Every 10 Level = Boss
</div>
<div id="upgradePanel"></div>
<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const arena={x:100,y:100,w:canvas.width-200,h:canvas.height-200};

let keys={},mouse={x:0,y:0,down:false,right:false};
let autoFire=false;

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key.toLowerCase()==="e") autoFire=!autoFire;
});
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
canvas.addEventListener("mousedown",e=>{
if(e.button===0)mouse.down=true;
if(e.button===2){e.preventDefault();mouse.right=true;}
});
canvas.addEventListener("mouseup",e=>{
if(e.button===0)mouse.down=false;
if(e.button===2)mouse.right=false;
});
canvas.addEventListener("contextmenu",e=>e.preventDefault());

function rand(a,b){return Math.random()*(b-a)+a;}

let player={
x:canvas.width/2,y:canvas.height/2,size:30,
speed:4,hp:100,maxHp:100,
damage:20,fireRate:350,lastShot:0,
xp:0,level:1,ultiCD:0,dashCD:0
};

let enemies=[],bullets=[],particles=[],trees=[];
let bossesAlive=0;

/* --- TREES (visual only) --- */
for(let i=0;i<25;i++){
trees.push({
x:rand(arena.x,arena.x+arena.w),
y:rand(arena.y,arena.y+arena.h),
size:rand(20,40)
});
}

/* --- 4 KÖŞE 3 SPAWN --- */
const spawns=[
{ x:arena.x+50, y:arena.y+50 },
{ x:arena.x+arena.w-50, y:arena.y+50 },
{ x:arena.x+50, y:arena.y+arena.h-50 },
{ x:arena.x+arena.w-50, y:arena.y+arena.h-50 }
];

function spawnEnemy(){
if(player.level%10===0) return; // boss zamanı
if(enemies.length>120) return;

spawns.forEach(s=>{
for(let i=0;i<3;i++){
enemies.push({
x:s.x+rand(-40,40),
y:s.y+rand(-40,40),
size:rand(20,35),
hp:60+player.level*5,
maxHp:60+player.level*5,
speed:0.8+player.level*0.01,
shape:Math.floor(rand(0,3))
});
}
});
}
setInterval(spawnEnemy,2000);

/* --- BOSS --- */
function spawnBoss(){
if(bossesAlive>=3)return;
bossesAlive++;
let difficulty=player.level/10;
enemies.push({
x:arena.x+arena.w/2,
y:arena.y+arena.h/2,
size:80+difficulty*10,
hp:800*difficulty,
maxHp:800*difficulty,
speed:0.6,
boss:true,
shape:Math.floor(rand(0,3))
});
}

/* --- SHOOT --- */
function shoot(){
let now=Date.now();
if(now-player.lastShot<player.fireRate)return;
player.lastShot=now;
let angle=Math.atan2(mouse.y-player.y,mouse.x-player.x);
bullets.push({
x:player.x,y:player.y,
dx:Math.cos(angle)*9,
dy:Math.sin(angle)*9
});
particles.push({x:player.x,y:player.y,life:10});
}

/* --- ULTI --- */
function ulti(){
if(player.ultiCD>0)return;
player.ultiCD=300;
enemies.forEach(e=>e.hp*=0.5);
for(let i=0;i<40;i++){
particles.push({
x:player.x,y:player.y,
dx:rand(-5,5),dy:rand(-5,5),life:40
});
}
}

/* --- UPDATE --- */
function update(){

if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

if(keys["shift"] && player.dashCD<=0){
player.x+=(mouse.x-player.x)*0.3;
player.y+=(mouse.y-player.y)*0.3;
player.dashCD=100;
}

player.x=Math.max(arena.x,Math.min(arena.x+arena.w,player.x));
player.y=Math.max(arena.y,Math.min(arena.y+arena.h,player.y));

if(mouse.down || autoFire)shoot();
if(mouse.right)ulti();

if(player.ultiCD>0)player.ultiCD--;
if(player.dashCD>0)player.dashCD--;

bullets.forEach((b,i)=>{
b.x+=b.dx;b.y+=b.dy;
if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height)
bullets.splice(i,1);
});

enemies.forEach((e,ei)=>{
let angle=Math.atan2(player.y-e.y,player.x-e.x);
e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

let dx=e.x-player.x,dy=e.y-player.y;
if(Math.sqrt(dx*dx+dy*dy)<e.size+player.size){
player.hp-=0.2;
if(player.hp<=0)location.reload();
}

bullets.forEach((b,bi)=>{
let dx=e.x-b.x,dy=e.y-b.y;
if(Math.sqrt(dx*dx+dy*dy)<e.size){
e.hp-=player.damage;
bullets.splice(bi,1);
if(e.hp<=0){
player.xp+=40; // XP hızlandı
if(e.boss)bossesAlive--;
enemies.splice(ei,1);
}
}
});
});

if(player.xp>=player.level*80 && player.level<100){
player.xp=0;
player.level++;
player.maxHp+=15;
player.hp=player.maxHp;
player.damage+=3;
player.fireRate=Math.max(80,player.fireRate-10);
if(player.level%10===0)spawnBoss();
}
}

/* --- DRAW --- */
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="white";
ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

/* Trees */
trees.forEach(t=>{
ctx.fillStyle="#065f46";
ctx.beginPath();
ctx.arc(t.x,t.y,t.size,0,Math.PI*2);
ctx.fill();
});

/* Player */
ctx.font="40px Arial";
ctx.fillText("😀",player.x-20,player.y+15);
ctx.font="20px Arial";
ctx.fillText("🔫",player.x+20,player.y);

/* Bullets + fire */
bullets.forEach(b=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(b.x,b.y,5,0,Math.PI*2);
ctx.fill();
});

/* Particles */
particles.forEach((p,i)=>{
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();
if(p.dx){p.x+=p.dx;p.y+=p.dy;}
p.life--;
if(p.life<=0)particles.splice(i,1);
});

/* Enemies */
enemies.forEach(e=>{
ctx.fillStyle=e.boss?"purple":"red";
ctx.beginPath();
if(e.shape===0)ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
if(e.shape===1)ctx.rect(e.x-e.size,e.y-e.size,e.size*2,e.size*2);
if(e.shape===2){
ctx.moveTo(e.x,e.y-e.size);
ctx.lineTo(e.x-e.size,e.y+e.size);
ctx.lineTo(e.x+e.size,e.y+e.size);
}
ctx.fill();

ctx.fillStyle="green";
ctx.fillRect(e.x-e.size,e.y-e.size-10,(e.hp/e.maxHp)*e.size*2,5);
});

document.getElementById("hud").innerHTML=
"HP: "+Math.floor(player.hp)+"/"+player.maxHp+
"<br>Level: "+player.level+
"<br>XP: "+player.xp+"/"+(player.level*80)+
"<br>Damage: "+player.damage+
"<br>FireRate: "+player.fireRate+
"<br>AutoFire: "+autoFire+
"<br>UltiCD: "+Math.floor(player.ultiCD/60);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
