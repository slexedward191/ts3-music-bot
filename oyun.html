<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Fight</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

:root{
--neon-blue:#00f2ff;
--neon-red:#ff003c;
--neon-purple:#bc13fe;
--neon-gold:#ffcc00;
}

body{
margin:0;
background:#050505;
color:white;
font-family:Orbitron;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* ARENA */

#arena-wrapper{
width:1250px;
height:800px;
border:10px solid;
border-image:linear-gradient(90deg,var(--neon-red) 50%,#fff 50%) 1;
background:#111;
position:relative;
}

canvas{
display:block;
}

/* UI LAYER */

#ui-layer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#ui-layer *{
pointer-events:auto;
}

.ui-panel{
position:absolute;
background:rgba(0,0,0,0.85);
border:2px solid var(--neon-blue);
padding:10px;
border-radius:8px;
}

#gold-display{
top:10px;
left:10px;
color:var(--neon-gold);
border-color:var(--neon-gold);
}

#enemy-counter{
top:10px;
right:10px;
color:var(--neon-red);
display:none;
}

#stats-panel{
bottom:10px;
left:10px;
width:170px;
}

#xp-log{
right:10px;
top:50%;
transform:translateY(-50%);
width:150px;
border-color:var(--neon-purple);
}

#market-btn{
position:absolute;
bottom:10px;
right:10px;
background:var(--neon-gold);
color:black;
font-weight:bold;
padding:10px 25px;
cursor:pointer;
border-radius:6px;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.level-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

.level-card{
background:#222;
border:2px solid #444;
padding:15px;
text-align:center;
cursor:pointer;
opacity:.4;
pointer-events:none;
}

.level-card.unlocked{
opacity:1;
border-color:var(--neon-blue);
pointer-events:auto;
}

#announcement{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:5rem;
color:var(--neon-red);
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<div id="arena-wrapper">

<canvas id="gameCanvas" width="1250" height="800"></canvas>
<div id="announcement">DALGA 1</div>

</div>

<div id="ui-layer">

<div id="gold-display" class="ui-panel">
ALTIN: <span id="gold-count">0</span>
</div>

<div id="enemy-counter" class="ui-panel">
KALAN: <span id="enemy-count">0</span>
</div>

<div id="stats-panel" class="ui-panel">
<h5>STATS</h5>
<div>• Henüz eklenti yok</div>
</div>

<div id="xp-log" class="ui-panel">
<h5>ÖLDÜRME</h5>
<div id="log-list"></div>
</div>

<div id="market-btn" onclick="toggleMarket()">
MARKET
</div>

</div>

<!-- LOGIN -->

<div id="auth-screen" class="overlay">

<h2>GİRİŞ</h2>

<input id="username" placeholder="Kullanıcı Adı">
<input id="password" type="password" placeholder="Şifre">

<button onclick="handleAuth('login')">GİRİŞ</button>
<button onclick="handleAuth('guest')">MİSAFİR</button>

</div>

<!-- LEVEL SELECT -->

<div id="start-screen" class="overlay" style="display:none">

<h1>BÖLÜM SEÇ</h1>

<p id="welcome-msg"></p>

<div id="level-grid" class="level-grid"></div>

</div>

<script>

const canvas=document.getElementById("gameCanvas")
const ctx=canvas.getContext("2d")

let currentUser=null
let isGuest=false

const ENEMY_COLORS=[
"#ff003c","#00ff00","#bc13fe","#ffcc00","#ffffff","#00f2ff"
]

const CHARS=[
{id:'std',hp:100,armor:0,color:'#00f2ff'}
]

let gameState={
isRunning:false,
wave:0,
gold:0,
unlockedLevel:1,
currentMission:1
}

let enemies=[]
let keys={}
let player={}
let particles=[]

window.onkeydown=e=>keys[e.code]=true
window.onkeyup=e=>keys[e.code]=false

/* AUTH */

function handleAuth(type){

if(type==="guest"){

isGuest=true
currentUser="Misafir"

}else{

const u=username.value
const p=password.value

if(!u||!p)return alert("Alanları doldur")

let users=JSON.parse(localStorage.getItem("gf_users")||"{}")

if(users[u]){

if(users[u].password!==p)
return alert("Hatalı şifre")

gameState=users[u].state

}else{

users[u]={password:p,state:gameState}

localStorage.setItem("gf_users",JSON.stringify(users))

}

currentUser=u

}

showStart()

}

/* START MENU */

function showStart(){

auth-screen.style.display="none"
start-screen.style.display="flex"

welcome-msg.innerText="Hoşgeldin "+currentUser

renderLevels()

}

function renderLevels(){

const grid=document.getElementById("level-grid")

grid.innerHTML=""

for(let i=1;i<=20;i++){

const div=document.createElement("div")

div.className="level-card "+(i<=gameState.unlockedLevel?"unlocked":"")

div.innerText="Bölüm "+i

if(i<=gameState.unlockedLevel)
div.onclick=()=>startGame(i)

grid.appendChild(div)

}

}

/* START GAME */

function startGame(level){

gameState.currentMission=level

const char=CHARS[0]

player={
x:625,
y:400,
hp:char.hp,
maxHp:char.hp,
armor:char.armor,
speed:4,
color:char.color
}

enemies=[]

start-screen.style.display="none"
enemy-counter.style.display="block"

gameState.wave=0
gameState.isRunning=true

nextWave()

}

/* WAVE */

function nextWave(){

if(gameState.wave>=5){

alert("Bölüm tamamlandı")

location.reload()

return

}

gameState.wave++

announcement.innerText="DALGA "+gameState.wave
announcement.style.display="block"

setTimeout(()=>{

announcement.style.display="none"

spawnEnemies()

},2000)

}

function spawnEnemies(){

const count=gameState.wave*4

for(let i=0;i<count;i++){

enemies.push({

x:Math.random()*1200,
y:Math.random()<.5?-50:850,
hp:100+gameState.wave*20,
size:25,
speed:1.5+Math.random(),
color:ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)]

})

}

updateEnemyUI()

}

function updateEnemyUI(){

enemy-count.innerText=enemies.length

}

/* LOOP */

function loop(){

ctx.clearRect(0,0,1250,800)

if(gameState.isRunning){

if(keys["KeyW"])player.y-=player.speed
if(keys["KeyS"])player.y+=player.speed
if(keys["KeyA"])player.x-=player.speed
if(keys["KeyD"])player.x+=player.speed

enemies.forEach((e,i)=>{

const ang=Math.atan2(player.y-e.y,player.x-e.x)

e.x+=Math.cos(ang)*e.speed
e.y+=Math.sin(ang)*e.speed

ctx.fillStyle=e.color
ctx.fillRect(e.x-12,e.y-12,25,25)

if(Math.hypot(player.x-e.x,player.y-e.y)<30){

if(player.armor>0)
player.armor-=0.2
else
player.hp-=0.5

}

if(e.hp<=0){

enemies.splice(i,1)

gameState.gold+=5

gold-count.innerText=gameState.gold

updateEnemyUI()

if(enemies.length===0)
nextWave()

}

})

}

/* PLAYER */

ctx.fillStyle=player.color

ctx.beginPath()
ctx.arc(player.x,player.y,20,0,Math.PI*2)
ctx.fill()

requestAnimationFrame(loop)

}

requestAnimationFrame(loop)

function toggleMarket(){

alert("Market şu an kapalı")

}

</script>

</body>
</html>
