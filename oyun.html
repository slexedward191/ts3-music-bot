<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Piano Highway | Rhythm Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --s: #ff00ff; --bg: #020205; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Orbitron'; color: white; }
        canvas { display: block; }

        /* MENU UI */
        #menu {
            position: fixed; inset: 0; background: rgba(2,2,5,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            border: 5px solid var(--p); margin: 50px;
        }
        .stat { font-size: 20px; margin: 10px; color: var(--s); }
        .btn {
            background: var(--p); color: black; border: none; padding: 20px 50px;
            font-family: 'Syncopate'; cursor: pointer; font-weight: 900; margin-top: 30px;
        }

        #hud {
            position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around;
            pointer-events: none; text-shadow: 0 0 10px var(--p);
        }
    </style>
</head>
<body>

<div id="hud">
    <div>TRACK: <span id="track-name">STORM_SONATA</span></div>
    <div>SCORE: <span id="score">0000</span></div>
    <div>PROGRESS: <span id="prog">0%</span></div>
</div>

<div id="menu">
    <h1 style="font-family: 'Syncopate'; font-size: 40px;">COMPOSITION COMPLETE</h1>
    <div class="stat">ACCURACY: <span id="stat-acc">0%</span></div>
    <div class="stat">NOTES HIT: <span id="stat-hits">0</span></div>
    <button class="btn" onclick="Engine.nextTrack()">NEXT TRACK</button>
</div>

<canvas id="view"></canvas>

<script>
/**
 * PRO AUDIO SAMPLES
 */
const AudioEngine = {
    ctx: null,
    freqs: [261.63, 293.66, 329.63, 349.23], // C, D, E, F
    init() { this.ctx = new AudioContext(); },
    play(i) {
        const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
        o.type = 'triangle'; o.frequency.value = this.freqs[i];
        g.gain.setValueAtTime(0.2, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.5);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + 0.5);
    }
};

/**
 * HIGHWAY ENGINE
 */
const Engine = {
    lvl: 1, score: 0, hits: 0, totalInTrack: 40,
    notes: [], keys: [false, false, false, false],
    tracks: [
        { name: "NEON_BEETHOVEN", speed: 5, count: 30 },
        { name: "CYBER_MOZART", speed: 8, count: 50 },
        { name: "QUANTUM_SYNTH", speed: 12, count: 80 }
    ],

    init() {
        this.cvs = document.getElementById('view');
        this.ctx = this.cvs.getContext('2d');
        this.resize();
        window.onresize = () => this.resize();
        
        AudioEngine.init();
        
        window.onkeydown = (e) => this.handleKey(e.key, true);
        window.onkeyup = (e) => this.handleKey(e.key, false);
        
        this.startTrack(0);
        this.loop();
    },

    resize() { this.cvs.width = window.innerWidth; this.cvs.height = window.innerHeight; },

    handleKey(k, s) {
        const map = { 'a': 0, 's': 1, 'd': 2, 'f': 3 };
        const idx = map[k.toLowerCase()];
        if(idx !== undefined) {
            this.keys[idx] = s;
            if(s) {
                AudioEngine.play(idx);
                this.checkHit(idx);
            }
        }
    },

    startTrack(idx) {
        this.currentTrackIdx = idx;
        const t = this.tracks[idx];
        this.lvl = idx + 1;
        this.score = 0; this.hits = 0;
        this.notes = [];
        this.totalInTrack = t.count;
        this.spawned = 0;
        document.getElementById('track-name').innerText = t.name;
        document.getElementById('menu').style.display = 'none';
        this.active = true;
    },

    checkHit(lane) {
        const hitZoneY = this.cvs.height - 100;
        this.notes.forEach(n => {
            if(!n.hit && n.lane === lane && Math.abs(n.y - hitZoneY) < 50) {
                n.hit = true;
                this.hits++;
                this.score += 100;
                document.getElementById('score').innerText = this.score;
            }
        });
    },

    nextTrack() {
        const next = (this.currentTrackIdx + 1) % this.tracks.length;
        this.startTrack(next);
    },

    update() {
        if(!this.active) return;
        const t = this.tracks[this.currentTrackIdx];
        
        // Spawn notes based on rhythm
        if(this.spawned < t.count && Math.random() < 0.05) {
            this.notes.push({ lane: Math.floor(Math.random()*4), y: -50, hit: false });
            this.spawned++;
        }

        this.notes.forEach((n, i) => {
            n.y += t.speed;
            if(n.y > this.cvs.height) {
                if(!n.hit) this.score = Math.max(0, this.score - 50);
                this.notes.splice(i, 1);
                if(this.spawned >= t.count && this.notes.length === 0) this.endTrack();
            }
        });

        document.getElementById('prog').innerText = Math.floor((this.spawned / t.count) * 100) + "%";
    },

    endTrack() {
        this.active = false;
        document.getElementById('menu').style.display = 'flex';
        document.getElementById('stat-acc').innerText = Math.floor((this.hits / this.totalInTrack) * 100) + "%";
        document.getElementById('stat-hits').innerText = this.hits;
    },

    draw() {
        const ctx = this.ctx;
        ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, this.cvs.width, this.cvs.height);

        const laneW = 100;
        const startX = this.cvs.width/2 - 200;

        // Highway Lanes
        for(let i=0; i<4; i++) {
            ctx.strokeStyle = this.keys[i] ? varName('--p') : '#111122';
            ctx.lineWidth = this.keys[i] ? 4 : 1;
            ctx.strokeRect(startX + i*laneW, 0, laneW, this.cvs.height);
            
            // Hit Zone
            ctx.fillStyle = this.keys[i] ? 'rgba(0, 242, 255, 0.2)' : 'rgba(255,255,255,0.02)';
            ctx.fillRect(startX + i*laneW, this.cvs.height - 120, laneW, 40);
        }

        // Notes
        this.notes.forEach(n => {
            if(n.hit) return;
            ctx.fillStyle = n.lane % 2 === 0 ? varName('--p') : varName('--s');
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(startX + n.lane*laneW + 10, n.y, laneW - 20, 20);
        });

        ctx.shadowBlur = 0;
        requestAnimationFrame(() => this.loop());
    },

    loop() { this.update(); this.draw(); }
};

function varName(n) { return getComputedStyle(document.documentElement).getPropertyValue(n); }
Engine.init();
</script>
</body>
</html>
