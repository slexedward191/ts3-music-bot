<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Arena Zombi</title>
<style>
body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}
canvas{
    background:#181818;
    border:4px solid #333;
}
</style>
</head>
<body>

<canvas id="game" width="1200" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

let lastTime=0;
let wave=1;

let keys={};
let mouse={x:0,y:0};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

canvas.addEventListener("mousemove",e=>{
    const rect=canvas.getBoundingClientRect();
    mouse.x=e.clientX-rect.left;
    mouse.y=e.clientY-rect.top;
});

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

/* PLAYER */

class Player{
    constructor(){
        this.x=WIDTH/2;
        this.y=HEIGHT/2;
        this.r=16;
        this.speed=220;

        this.maxHp=100;
        this.hp=100;

        this.damage=20;

        this.maxAmmo=40;
        this.ammo=40;
        this.reloadTime=1;
        this.reloadTimer=0;
        this.fireRate=0.15;
        this.fireTimer=0;

        this.level=1;
        this.xp=0;
        this.xpNeeded=100;

        this.magnetRange=120;
    }

    update(dt){

        let vx=0,vy=0;
        if(keys["w"])vy-=1;
        if(keys["s"])vy+=1;
        if(keys["a"])vx-=1;
        if(keys["d"])vx+=1;

        let len=Math.hypot(vx,vy);
        if(len>0){vx/=len;vy/=len;}

        this.x+=vx*this.speed*dt;
        this.y+=vy*this.speed*dt;

        this.x=clamp(this.x,this.r,WIDTH-this.r);
        this.y=clamp(this.y,this.r,HEIGHT-this.r);

        if(this.reloadTimer>0){
            this.reloadTimer-=dt;
            if(this.reloadTimer<=0) this.ammo=this.maxAmmo;
        }

        if(this.ammo<=0 && this.reloadTimer<=0)
            this.reloadTimer=this.reloadTime;

        this.fireTimer-=dt;
        if(this.fireTimer<=0 && this.ammo>0 && this.reloadTimer<=0){
            this.shoot();
            this.fireTimer=this.fireRate;
        }
    }

    shoot(){
        this.ammo--;
        let angle=Math.atan2(mouse.y-this.y,mouse.x-this.x);
        bullets.push(new Bullet(
            this.x,this.y,
            Math.cos(angle),Math.sin(angle),
            this.damage
        ));
    }

    gainXP(amount){
        this.xp+=amount;
        if(this.xp>=this.xpNeeded){
            this.level++;
            this.xp=0;
            this.xpNeeded+=50;
        }
    }

    draw(){
        ctx.fillStyle="#3498db";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();

        ctx.strokeStyle="rgba(0,255,255,0.2)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.magnetRange,0,Math.PI*2);
        ctx.stroke();
    }
}

/* BULLET */

class Bullet{
    constructor(x,y,dx,dy,damage){
        this.x=x;
        this.y=y;
        this.dx=dx;
        this.dy=dy;
        this.speed=700;
        this.r=4;
        this.damage=damage;
        this.pierce=3;
    }

    update(dt){
        this.x+=this.dx*this.speed*dt;
        this.y+=this.dy*this.speed*dt;
    }

    draw(){
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

/* XP ORB */

class XPOrb{
    constructor(x,y,value){
        this.x=x;
        this.y=y;
        this.r=6;
        this.value=value;
    }

    update(dt){
        let dist=Math.hypot(player.x-this.x,player.y-this.y);
        if(dist<player.magnetRange){
            let angle=Math.atan2(player.y-this.y,player.x-this.x);
            this.x+=Math.cos(angle)*300*dt;
            this.y+=Math.sin(angle)*300*dt;
        }

        if(dist<15){
            player.gainXP(this.value);
            xpOrbs.splice(xpOrbs.indexOf(this),1);
        }
    }

    draw(){
        ctx.fillStyle="#9b59b6";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

/* ZOMBIE */

class Zombie{
    constructor(type){

        this.type=type;
        this.damageReduction=0;
        this.rageActivated=false;

        if(type==="normal"){
            this.r=18; this.speed=100; this.maxHp=60;
            this.color="green"; this.damage=25;
        }

        if(type==="tank"){
            this.r=32;
            this.speed=45;
            this.damage=60;
            this.color="#063d06";

            let hpTier=Math.floor((wave-4)/5);
            if(hpTier<0)hpTier=0;
            this.maxHp=3000+(hpTier*5000);

            let reductionBonus=Math.floor(wave/10)*0.05;
            this.damageReduction=0.35+reductionBonus;
            if(this.damageReduction>0.6)
                this.damageReduction=0.6;
        }

        this.hp=this.maxHp;
        this.x=Math.random()<0.5?0:WIDTH;
        this.y=Math.random()*HEIGHT;
    }

    update(dt){

        if(this.type==="tank" && !this.rageActivated){
            if(this.hp<=this.maxHp*0.3){
                this.rageActivated=true;
                this.speed*=1.6;
                this.damage*=1.25;
                this.color="#8b0000";
            }
        }

        let angle=Math.atan2(player.y-this.y,player.x-this.x);
        this.x+=Math.cos(angle)*this.speed*dt;
        this.y+=Math.sin(angle)*this.speed*dt;
    }

    draw(){
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fill();
    }
}

const player=new Player();
let bullets=[];
let zombies=[];
let xpOrbs=[];

/* SPAWN */

function spawnZombie(){
    let type="normal";
    if(wave>=4 && Math.random()<0.3) type="tank";
    zombies.push(new Zombie(type));
}

/* LOOP */

function update(timestamp){
    let dt=(timestamp-lastTime)/1000;
    lastTime=timestamp;

    player.update(dt);

    if(Math.random()<0.02)
        spawnZombie();

    bullets.forEach((b,bi)=>{
        b.update(dt);

        zombies.forEach((z,zi)=>{
            if(Math.hypot(b.x-z.x,b.y-z.y)<z.r){

                let dmg=b.damage;
                if(z.type==="tank")
                    dmg*=(1-z.damageReduction);

                z.hp-=dmg;
                b.pierce--;

                if(z.hp<=0){
                    xpOrbs.push(new XPOrb(z.x,z.y,20));
                    zombies.splice(zi,1);
                }

                if(b.pierce<=0)
                    bullets.splice(bi,1);
            }
        });
    });

    xpOrbs.forEach(o=>o.update(dt));

    draw();
    requestAnimationFrame(update);
}

function draw(){
    ctx.clearRect(0,0,WIDTH,HEIGHT);
    xpOrbs.forEach(o=>o.draw());
    bullets.forEach(b=>b.draw());
    zombies.forEach(z=>z.draw());
    player.draw();
}

requestAnimationFrame(update);

</script>
</body>
</html>
