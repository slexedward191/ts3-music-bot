<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEON SIEGE</title>
<style>
body { margin:0; overflow:hidden; background:#0a0a0f; font-family:Arial; }
canvas { display:block; }
#ui {
  position:absolute;
  top:10px; left:10px;
  color:white;
  font-size:14px;
}
#skillMenu {
  position:absolute;
  right:20px; top:20px;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border:1px solid cyan;
}
button { background:black; color:cyan; border:1px solid cyan; margin:2px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"></div>
<div id="skillMenu"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

let mouse = {x:0,y:0};
canvas.addEventListener("mousemove", e=>{
 mouse.x = e.clientX;
 mouse.y = e.clientY;
});

function rand(min,max){ return Math.random()*(max-min)+min; }

let player = {
 x:canvas.width/2,
 y:canvas.height/2,
 radius:15,
 hp:100,
 maxHp:100,
 damage:10,
 fireRate:400,
 bulletSpeed:6,
 speed:3,
 xp:0,
 level:1,
 nextXp:100,
 skillPoints:0,
 crit:0.05,
 xpBoost:1,
 lastShot:0,
 shield:false,
 rapid:false
};

let bullets=[];
let enemies=[];
let particles=[];
let wave=1;
let gameOver=false;

function spawnEnemy(){
 let type = Math.random();
 let e = {
   x: rand(0,canvas.width),
   y: rand(0,canvas.height),
   radius: rand(10,25),
   hp: rand(20,50)*wave,
   speed: rand(1,2)+wave*0.1,
   type:type
 };
 enemies.push(e);
}

function shoot(){
 if(Date.now()-player.lastShot < player.fireRate) return;
 player.lastShot = Date.now();
 bullets.push({
   x:player.x,
   y:player.y,
   angle:Math.atan2(mouse.y-player.y, mouse.x-player.x),
   speed:player.bulletSpeed
 });
}

function gainXP(amount){
 player.xp += amount*player.xpBoost;
 if(player.xp >= player.nextXp){
   player.xp=0;
   player.level++;
   player.skillPoints++;
   player.nextXp *=1.3;
 }
}

function update(){
 if(gameOver) return;

 // Movement
 if(keys["w"]) player.y -= player.speed;
 if(keys["s"]) player.y += player.speed;
 if(keys["a"]) player.x -= player.speed;
 if(keys["d"]) player.x += player.speed;

 // Shoot
 if(keys[" "]) shoot();

 // Bullets
 bullets.forEach((b,i)=>{
   b.x += Math.cos(b.angle)*b.speed;
   b.y += Math.sin(b.angle)*b.speed;
 });

 // Enemies
 enemies.forEach((e,i)=>{
   let angle = Math.atan2(player.y-e.y, player.x-e.x);
   e.x += Math.cos(angle)*e.speed;
   e.y += Math.sin(angle)*e.speed;

   // Collision
   let dx=e.x-player.x;
   let dy=e.y-player.y;
   let dist=Math.sqrt(dx*dx+dy*dy);
   if(dist < e.radius+player.radius){
     if(!player.shield){
       player.hp -= 1;
       if(player.hp<=0) gameOver=true;
     }
   }
 });

 // Bullet hit
 bullets.forEach((b,bi)=>{
   enemies.forEach((e,ei)=>{
     let dx=b.x-e.x;
     let dy=b.y-e.y;
     if(Math.sqrt(dx*dx+dy*dy)<e.radius){
       let dmg=player.damage;
       if(Math.random()<player.crit) dmg*=2;
       e.hp-=dmg;
       bullets.splice(bi,1);
       if(e.hp<=0){
         gainXP(20);
         enemies.splice(ei,1);
       }
     }
   });
 });

 if(enemies.length < wave*5){
   spawnEnemy();
 }

 if(player.level%5==0) wave++;
}

function draw(){
 ctx.fillStyle="rgba(10,10,15,0.4)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // Player
 ctx.beginPath();
 ctx.arc(player.x,player.y,player.radius,0,Math.PI*2);
 ctx.fillStyle=player.shield?"cyan":"white";
 ctx.fill();

 // Bullets
 ctx.fillStyle="yellow";
 bullets.forEach(b=>{
   ctx.beginPath();
   ctx.arc(b.x,b.y,4,0,Math.PI*2);
   ctx.fill();
 });

 // Enemies
 enemies.forEach(e=>{
   ctx.beginPath();
   ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
   ctx.fillStyle="red";
   ctx.fill();
 });

 document.getElementById("ui").innerHTML=
   "HP: "+Math.floor(player.hp)+"/"+player.maxHp+
   "<br>Level: "+player.level+
   "<br>XP: "+Math.floor(player.xp)+"/"+Math.floor(player.nextXp)+
   "<br>Wave: "+wave+
   "<br>Skill Points: "+player.skillPoints;
}

function skillMenu(){
 let div=document.getElementById("skillMenu");
 if(player.skillPoints>0){
   div.innerHTML=`
   <button onclick="upgrade('damage')">Damage</button>
   <button onclick="upgrade('hp')">HP</button>
   <button onclick="upgrade('fire')">Fire Rate</button>
   <button onclick="upgrade('speed')">Speed</button>
   <button onclick="upgrade('crit')">Crit</button>
   `;
 } else div.innerHTML="";
}

function upgrade(stat){
 if(player.skillPoints<=0) return;
 player.skillPoints--;
 if(stat=="damage") player.damage+=5;
 if(stat=="hp"){ player.maxHp+=20; player.hp+=20; }
 if(stat=="fire") player.fireRate-=30;
 if(stat=="speed") player.speed+=0.5;
 if(stat=="crit") player.crit+=0.02;
}

function loop(){
 update();
 draw();
 skillMenu();
 requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
