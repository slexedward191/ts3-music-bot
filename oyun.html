<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameArea Mini Oyun</title>
<style>
body {
  margin:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

#game {
  position:relative;
  width:600px;
  height:200px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

#player {
  width:40px;
  height:40px;
  background:#22c55e;
  position:absolute;
  bottom:0;
  left:50px;
  border-radius:6px;
}

#obstacle {
  width:20px;
  height:40px;
  background:#ef4444;
  position:absolute;
  bottom:0;
  right:-20px;
}

.score {
  position:absolute;
  top:10px;
  right:20px;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="game">
  <div class="score" id="score">0</div>
  <div id="player"></div>
  <div id="obstacle"></div>
</div>

<script>
let player = document.getElementById("player");
let obstacle = document.getElementById("obstacle");
let scoreText = document.getElementById("score");

let jumping = false;
let score = 0;

document.addEventListener("keydown", function(e){
  if(e.code === "Space" && !jumping){
    jump();
  }
});

function jump(){
  jumping = true;
  let position = 0;
  let up = setInterval(()=>{
    if(position >= 100){
      clearInterval(up);
      let down = setInterval(()=>{
        if(position <= 0){
          clearInterval(down);
          jumping = false;
        }
        position -= 5;
        player.style.bottom = position + "px";
      },20);
    }
    position += 5;
    player.style.bottom = position + "px";
  },20);
}

function moveObstacle(){
  let obstaclePos = 600;
  let move = setInterval(()=>{
    if(obstaclePos < -20){
      obstaclePos = 600;
      score++;
      scoreText.innerText = score;
    }

    if(obstaclePos < 90 && obstaclePos > 50 && parseInt(player.style.bottom) < 40){
      alert("Oyun Bitti! Skor: " + score);
      score = 0;
      scoreText.innerText = score;
    }

    obstaclePos -= 5;
    obstacle.style.right = (600 - obstaclePos) + "px";
  },20);
}

moveObstacle();
</script>

</body>
</html>
