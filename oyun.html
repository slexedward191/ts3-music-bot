<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameArea Fight - Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff003c;
            --neon-purple: #bc13fe;
            --neon-gold: #ffcc00;
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 1250px; 
            height: 800px;
        }

        #arena-wrapper {
            position: relative;
            width: 1250px;
            height: 800px;
            border: 8px solid var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
            background: #111;
            overflow: hidden;
        }

        canvas { display: block; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }

        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--neon-blue);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
        }

        #stats-panel { bottom: 20px; left: -160px; width: 140px; color: var(--neon-blue); }
        #xp-log { right: -160px; top: 50%; transform: translateY(-50%); width: 140px; border-color: var(--neon-purple); }
        #gold-display { top: 20px; left: 20px; color: var(--neon-gold); font-weight: bold; border-color: var(--neon-gold); }

        #market-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 25px;
            background: var(--neon-gold);
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-gold);
            z-index: 20;
            border: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .btn-gif {
            width: 200px;
            height: 60px;
            background: #ff003c;
            color: white;
            font-family: 'Press Start 2P';
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid white;
            margin-top: 20px;
        }

        #announcement {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            font-size: 5rem;
            color: var(--neon-red);
            display: none;
            z-index: 500;
            text-shadow: 0 0 20px var(--neon-red);
        }

        #xp-bar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 12px;
            background: #222;
            border: 2px solid #fff;
        }
        #xp-bar-fill { height: 100%; width: 0%; background: var(--neon-purple); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="arena-wrapper">
        <canvas id="gameCanvas" width="1250" height="800"></canvas>
        <div id="announcement">DALGA 1</div>
        <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
    </div>

    <div id="gold-display" class="ui-panel">ALTIN: <span id="gold-count">0</span></div>
    <button id="market-btn" onclick="toggleMarket()">MARKET</button>

    <div id="auth-screen" class="overlay">
        <h2 style="color:var(--neon-blue)">GİRİŞ / KAYIT</h2>
        <input type="text" id="username" placeholder="Kullanıcı Adı" style="padding:10px; margin:5px;">
        <button onclick="handleAuth('guest')" class="btn-gif">MİSAFİR OLARAK OYNA</button>
    </div>

    <div id="start-screen" class="overlay" style="display:none">
        <h1 style="color: var(--neon-red); font-size: 60px;">GameArea Fight</h1>
        <div class="btn-gif" onclick="startGame()">BAŞLAT</div>
    </div>

    <div id="death-screen" class="overlay" style="display:none">
        <h1 style="color: white;">ELENDİN!</h1>
        <div class="btn-gif" onclick="location.reload()">TEKRAR DENE</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // GÖRSELLER
    const imgPlayer = new Image();
    imgPlayer.src = 'https://r.jina.ai/i/6c21e69da59846399c546e339f993319'; // Ninja
    
    const imgEnemy = new Image();
    imgEnemy.src = 'https://r.jina.ai/i/9e0bb662fb1642c6b328a8d11d013ac0'; // Kurukafa
    
    const imgBoss = new Image();
    imgBoss.src = 'https://r.jina.ai/i/05e10e7ca10f443586c57f2ca29388c3'; // Boss Hulk

    let player, enemies, bullets, particles, gameState;
    let keys = {};
    let mx = 0, my = 0;

    function initGameState() {
        gameState = {
            wave: 0, gold: 0, xp: 0, xpReq: 100, level: 1, isRunning: false
        };
    }

    function handleAuth(type) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        initGameState();
    }

    function startGame() {
        player = {
            x: 625, y: 400, r: 25, hp: 100, maxHp: 100, speed: 4, 
            dmg: 25, lastShot: 0, shootDelay: 250
        };
        enemies = []; bullets = []; particles = [];
        document.getElementById('start-screen').style.display = 'none';
        gameState.isRunning = true;
        nextWave();
        requestAnimationFrame(gameLoop);
    }

    function nextWave() {
        gameState.wave++;
        const ann = document.getElementById('announcement');
        ann.style.display = 'block';
        ann.innerText = gameState.wave % 5 === 0 ? "BOSS DALGASI!" : `DALGA ${gameState.wave}`;
        
        setTimeout(() => {
            ann.style.display = 'none';
            spawnWave();
        }, 2000);
    }

    function spawnWave() {
        let isBossWave = gameState.wave % 5 === 0;
        let count = isBossWave ? 1 : 5 + gameState.wave * 2;
        
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let dist = 800;
            enemies.push({
                x: player.x + Math.cos(angle) * dist,
                y: player.y + Math.sin(angle) * dist,
                r: isBossWave ? 80 : 20,
                hp: isBossWave ? 1000 * (gameState.wave/5) : 40 + (gameState.wave * 10),
                isBoss: isBossWave,
                speed: isBossWave ? 1.5 : 2 + Math.random()
            });
        }
    }

    function drawCircularImg(img, x, y, r, auraColor) {
        ctx.save();
        // Aura
        ctx.beginPath();
        ctx.arc(x, y, r + 5, 0, Math.PI*2);
        ctx.strokeStyle = auraColor;
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Maske
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
        ctx.restore();
    }

    function gameLoop() {
        if(!gameState.isRunning) return;
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // Hareket
        if(keys['KeyW'] && player.y > player.r) player.y -= player.speed;
        if(keys['KeyS'] && player.y < 800 - player.r) player.y += player.speed;
        if(keys['KeyA'] && player.x > player.r) player.x -= player.speed;
        if(keys['KeyD'] && player.x < 1250 - player.r) player.x += player.speed;

        // Ateş Etme
        let now = Date.now();
        if(now - player.lastShot > player.shootDelay) {
            let angle = Math.atan2(my - player.y, mx - player.x);
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10 });
            player.lastShot = now;
        }

        // Mermiler
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            if(b.x < 0 || b.x > 1250 || b.y < 0 || b.y > 800) bullets.splice(i, 1);
        });

        // Düşmanlar
        enemies.forEach((e, ei) => {
            let angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(angle) * e.speed;
            e.y += Math.sin(angle) * e.speed;

            // Çarpışma: Mermi -> Düşman
            bullets.forEach((b, bi) => {
                let dist = Math.hypot(e.x - b.x, e.y - b.y);
                if(dist < e.r) {
                    e.hp -= player.dmg;
                    bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        gameState.gold += e.isBoss ? 100 : 10;
                        gameState.xp += e.isBoss ? 200 : 20;
                        enemies.splice(ei, 1);
                        updateUI();
                    }
                }
            });

            // Çarpışma: Düşman -> Oyuncu
            if(Math.hypot(e.x - player.x, e.y - player.y) < e.r + player.r) {
                player.hp -= 0.5;
                if(player.hp <= 0) endGame();
            }
        });

        if(enemies.length === 0 && gameState.isRunning) nextWave();
        
        // XP Kontrol
        if(gameState.xp >= gameState.xpReq) {
            gameState.level++;
            gameState.xp = 0;
            gameState.xpReq *= 1.5;
            player.dmg += 10;
            player.hp = player.maxHp;
        }
    }

    function render() {
        ctx.clearRect(0, 0, 1250, 800);

        // Mermiler
        bullets.forEach(b => {
            ctx.fillStyle = varColor('--neon-blue');
            ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
        });

        // Düşmanlar
        enemies.forEach(e => {
            if(e.isBoss) {
                drawCircularImg(imgBoss, e.x, e.y, e.r, '#ff0000');
            } else {
                drawCircularImg(imgEnemy, e.x, e.y, e.r, '#ffffff');
            }
            // Can Barı
            ctx.fillStyle = 'red';
            ctx.fillRect(e.x - 20, e.y - e.r - 10, 40, 5);
        });

        // Oyuncu
        drawCircularImg(imgPlayer, player.x, player.y, player.r, varColor('--neon-blue'));
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function updateUI() {
        document.getElementById('gold-count').innerText = Math.floor(gameState.gold);
        document.getElementById('xp-bar-fill').style.width = (gameState.xp / gameState.xpReq * 100) + "%";
    }

    function endGame() {
        gameState.isRunning = false;
        document.getElementById('death-screen').style.display = 'flex';
    }

    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;
    canvas.onmousemove = e => {
        const rect = canvas.getBoundingClientRect();
        mx = e.clientX - rect.left;
        my = e.clientY - rect.top;
    };

    function toggleMarket() { alert("Market sistemi yükleniyor..."); }

</script>
</body>
</html>
